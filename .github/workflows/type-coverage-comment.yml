name: PR type-coverage comment
# Posts the heron-pr-type-coverage sticky -- runs `type-coverage` over
# the TypeScript source and reports the `any` count delta vs main.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.svelte'
      - 'tsconfig.json'
      - 'ui/tsconfig.json'

permissions: {}

concurrency:
  group: type-coverage-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-type-coverage sticky
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run type-coverage on PR head
        working-directory: ui
        # 2>/dev/null isolates stderr (engine warnings + pnpm chatter) so it
        # doesn't smuggle non-JSON into the output. Falls back to `{}` when
        # the run fails entirely so the formatter still has parseable input.
        run: |
          npx --yes type-coverage --detail --reportType json 2>/dev/null > ../type-coverage-current.json || echo '{}' > ../type-coverage-current.json
          # Guard: if non-JSON snuck in anyway, swap for empty object.
          head -c1 ../type-coverage-current.json | grep -qE '[\[{]' || echo '{}' > ../type-coverage-current.json
      - name: Run type-coverage on main
        run: |
          set -euo pipefail
          git fetch origin main --depth 1
          git stash push -m pr-changes -- || true
          git checkout origin/main -- .
          if (cd ui && pnpm install --frozen-lockfile && npx --yes type-coverage --detail --reportType json 2>/dev/null > ../type-coverage-baseline.json); then
            :
          else
            echo '{}' > type-coverage-baseline.json
          fi
          head -c1 type-coverage-baseline.json | grep -qE '[\[{]' || echo '{}' > type-coverage-baseline.json
          git checkout HEAD -- .
          git stash pop || true
      - name: Format type-coverage sticky
        run: node .github/scripts/sticky/format-type-coverage.mjs type-coverage-current.json type-coverage-baseline.json --out body.md
      - name: Post sticky comment
        uses: ./.github/actions/sticky-comment
        with:
          marker: heron-pr-type-coverage
          body-path: body.md
          pr-number: ${{ github.event.pull_request.number }}
