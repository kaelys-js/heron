name: PR bundle comment
# Posts the heron-pr-bundle sticky after the Bundle size workflow finishes.

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ['Bundle size']
    types: [completed]

permissions: {}

concurrency:
  group: bundle-comment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-bundle sticky
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1
      - name: Download size-report artifact
        # bundle-size.yml uploads `size-report` (not `bundle-size`) and the
        # file inside is `size-report.json` (not `bundle-size.json`). Match
        # the upstream's actual names so the sticky has real data instead
        # of falling back to "no bundle-size report found".
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v5
        with:
          name: size-report
          path: bundle
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Format bundle sticky
        run: |
          mkdir -p bundle
          if [ ! -f bundle/size-report.json ]; then echo "[]" > bundle/size-report.json; fi
          node .github/scripts/sticky/format-bundle.mjs bundle/size-report.json --out body.md
      - name: Stage bundle summary
        run: |
          if [ -f body.md ]; then cp body.md bundle.md; fi
      - name: Upload bundle summary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: summary-bundle
          path: bundle.md
          if-no-files-found: ignore
          retention-days: 7
