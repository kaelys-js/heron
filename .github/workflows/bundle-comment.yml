name: PR bundle comment
# Posts the heron-pr-bundle sticky after the Bundle size workflow finishes.

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ['Bundle size']
    types: [completed]

permissions: {}

concurrency:
  group: bundle-comment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-bundle sticky
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
      pull-requests: write
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1
      - name: Download size-report artifact
        # bundle-size.yml uploads `size-report` (not `bundle-size`) and the
        # file inside is `size-report.json` (not `bundle-size.json`). Match
        # the upstream's actual names so the sticky has real data instead
        # of falling back to "no bundle-size report found".
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v5
        with:
          name: size-report
          path: bundle
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Format bundle sticky
        run: |
          mkdir -p bundle
          if [ ! -f bundle/size-report.json ]; then echo "[]" > bundle/size-report.json; fi
          node .github/scripts/sticky/format-bundle.mjs bundle/size-report.json --out body.md
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          NUM=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH" || true)
          if [ -z "$NUM" ]; then
            NUM=$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')
          fi
          if [ -z "$NUM" ]; then echo "skip=true" >>"$GITHUB_OUTPUT"; fi
          echo "number=$NUM" >>"$GITHUB_OUTPUT"
      - name: Post sticky comment
        if: steps.pr.outputs.skip != 'true'
        uses: ./.github/actions/sticky-comment
        with:
          marker: heron-pr-bundle
          body-path: body.md
          pr-number: ${{ steps.pr.outputs.number }}
