name: Secret scan
# HP27 — TruffleHog secret-scanning in CI as a defense-in-depth layer on
# top of:
#   1. lefthook pre-commit (no-secrets regex)
#   2. GitHub Advanced Security secret-scanning + push-protection (free
#      for public repos; toggle in Settings → Code security)
#
# TruffleHog catches credential patterns the lefthook regex doesn't
# (130+ verified-credential detectors covering AWS, GCP, Azure,
# Stripe, Slack, Anthropic, OpenAI, JWT secrets, SSH keys, etc.) AND
# verifies them against the issuing service so we don't fail PRs on
# false-positive base64 strings.
#
# HP45 — once the repo flips public, enable secret-scanning push
# protection in Settings → Code security. Free for OSS, blocks
# secrets at `git push` time before they ever land on GitHub.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "47 4 * * 1" # Weekly Monday 04:47 UTC (catches old commits)

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history needed so TruffleHog can scan every commit on
          # the PR branch (not just the merge head). 0 = unshallow.
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          # `--only-verified` filters out unverifiable patterns to
          # avoid false-positive floods. Verified leaks are real
          # leaks — fail the build.
          extra_args: --only-verified --fail
