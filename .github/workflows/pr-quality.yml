name: PR quality
# G20 -- PR-title + size + body + semantic-content enforcement.
#
# Seven jobs, all fast (<5s each on the typical PR):
#
# 1. **Conventional Commits PR title** -- amannn/action-semantic-pull-request
#    validates the title matches the Conventional Commits grammar
#    (`<type>(<scope>): <subject>`). The 11 allowed types match
#    release-please-config.json so the title becomes the squash-merge
#    commit message that Release Please then categorises into
#    CHANGELOG.md. `subjectPattern` enforces lowercase subject so
#    `feat: Add retry helper` is rejected in favour of
#    `feat(api): add retry helper`.
#
# 2. **PR size label** -- pascalgn/size-label-action tags every PR
#    with `size/XS|S|M|L|XL` based on additions+deletions excluding
#    auto-generated noise (lockfile, snapshots, icons, CHANGELOG).
#    Bot PRs are skipped (Renovate / Dependabot self-size via their
#    own labels). Helps reviewers budget time + flags mega-PRs early.
#
# 3. **Max-size hard fail** -- block PRs over 2000 LOC unless they
#    carry the `oversize-ok` label. Prevents accidental mega-PRs.
#    Bot PRs are exempt (Renovate lockfile bumps can legitimately
#    cross 2000 LOC).
#
# 4. **PR description validation** -- assert the body has non-template
#    content in the `## Summary` and `## Test plan` sections. Catches
#    "I forgot to fill the template" before reviewer notices.
#
# 5. **feat-needs-issue** -- `feat:` / `feat!:` PRs must reference an
#    issue (Fixes/Closes/Refs/Resolves #N) in the body. Issue-first
#    workflow: features get traced back to the discussion that
#    motivated them. Bug fixes + chores exempt.
#
# 6. **breaking-change body** -- `<type>!:` titles must contain a
#    `BREAKING CHANGE:` block in the body so release-please picks the
#    change up as a MAJOR bump + categorises it correctly in CHANGELOG.
#
# 7. **missing-tests soft-warning** -- non-blocking comment when the
#    PR touches code paths (`ui/src/lib/**`, `scripts/**`) but no
#    `*.test.*` file changed. Surface only -- reviewer decides whether
#    the omission is OK (e.g. trivial type-only refactor).
#
# Fires on every PR edit (opened/edited/synchronize/reopened) so a
# title rename or force-push gets re-validated.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-pr:
    name: Conventional Commits PR title
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write # action-semantic-pull-request posts status checks
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Validate Conventional Commits title
        id: semantic
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Must match the conventional-commit pattern used by
          # release-please-config.json + .github/rulesets/main.json.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            style
            perf
            revert
          requireScope: false
          # Reject the lazy "fix bug" titles. Subject must start with
          # lowercase + be at least 3 words OR 10 chars.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR-title subject (after the `type:` prefix) must start
            lowercase. e.g. `feat(api): add retry helper`, not
            `feat: Add retry helper`.

      - name: Log title-check outcome
        if: always()
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ steps.semantic.outcome }}" = "success" ]; then
            echo "::notice::Conventional Commits title check passed: \"$TITLE\""
            {
              echo "### ✅ Conventional Commits title check passed"
              echo ""
              echo "PR title: \`$TITLE\`"
              echo ""
              echo "This title becomes the squash-merge commit subject + feeds Release Please into CHANGELOG.md."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::PR title \"$TITLE\" failed the Conventional Commits check. Rename to match \`<type>(<scope>): <lowercase subject>\`."
          fi

  size-label:
    name: PR size label
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write # size-label-action applies XS/S/M/L/XL labels
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'renovate[bot]'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Apply size labels (XS / S / M / L / XL)
        uses: pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff # v0.5.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Customised thresholds -- Heron PRs skew larger than the
          # default because of the SvelteKit-component diffs.
          IGNORED: |
            pnpm-lock.yaml
            *.snap
            *.svg
            *.png
            *.jpg
            CHANGELOG.md
            .release-please-manifest.json
            branding/.brand-snapshot.json
          sizes: >
            {"0": "size/XS", "20": "size/S", "100": "size/M",
             "400": "size/L", "1000": "size/XL"}

  # ── max-size hard fail ──────────────────────────────────────────
  # The size-label job above tags every PR but doesn't block. This
  # job hard-fails when additions+deletions exceed 2000 LOC, unless
  # the PR carries the `oversize-ok` label (the explicit "yes I know
  # this is huge, here's why" escape hatch). Bot PRs are exempt --
  # a Renovate lockfile bump or a Dependabot major-version PR can
  # legitimately cross 2000 LOC without being a review problem.
  max-size:
    name: PR size budget (≤ 2000 LOC)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check additions + deletions against budget (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push hook. The 2000-LOC limit + the
        # `oversize-ok` bypass live in the script.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
        run: |
          set -euo pipefail
          PR_LABELS=$(gh pr view "$PR_NUM" --json labels --jq '[.labels[].name] | join(",")')
          export PR_LABELS
          node scripts/system/check-pr-metadata.mjs size

  # ── PR description validation ───────────────────────────────────
  # Catches "I forgot to fill the template" before a reviewer notices.
  # The check is intentionally narrow: validate that the `## Summary`
  # and `## Test plan` sections contain non-template content. Other
  # sections (Related issue, Screenshots, Notes for reviewers) stay
  # advisory in the template -- they're situational.
  pr-description:
    name: PR description has Summary + Test plan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Validate Summary + Test plan sections are non-empty (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push hook. The >=50-char Summary/Test-plan
        # thresholds + the >=1 completed-checkbox rule live in the script.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body // ""')
          export PR_BODY
          node scripts/system/check-pr-metadata.mjs pr-description

  # ── feat: requires issue link ───────────────────────────────────
  # New features should trace back to the discussion that motivated
  # them. The PR body must reference an issue via one of the standard
  # closing keywords + `#N`: Fixes / Closes / Resolves / Refs. Bug
  # fixes + chores + docs are exempt -- they're often self-evident or
  # cross-reference a CHANGELOG entry instead. The `no-issue` label
  # is the explicit "intentionally no issue -- here's why in the
  # body" escape hatch.
  feat-needs-issue:
    name: feat PRs must link an issue
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    if: |
      github.event.pull_request.user.type != 'Bot' &&
      startsWith(github.event.pull_request.title, 'feat')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Look for issue reference in PR body (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push hook. The closing-keyword regex + the
        # `no-issue` bypass live in the script.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body // ""')
          PR_LABELS=$(gh pr view "$PR_NUM" --json labels --jq '[.labels[].name] | join(",")')
          export PR_BODY PR_LABELS
          node scripts/system/check-pr-metadata.mjs feat-issue

  # ── breaking-change body validation ─────────────────────────────
  # Conventional Commits `<type>!:` marks a breaking change. Release
  # Please uses this AND the `BREAKING CHANGE:` body block together
  # to (a) bump the major version and (b) populate the "BREAKING
  # CHANGES" section of CHANGELOG.md. A `!` title without the body
  # block bumps major correctly but the CHANGELOG entry is empty.
  # This job enforces both halves of the contract.
  breaking-change-body:
    name: "<type>!: requires BREAKING CHANGE body"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    # Title pattern: `feat!:`, `fix!:`, `feat(scope)!:`, etc.
    # The action-semantic-pull-request job catches malformed titles
    # earlier; here we just check the `!` marker is present.
    if: |
      github.event.pull_request.user.type != 'Bot' &&
      contains(github.event.pull_request.title, '!:')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Require BREAKING CHANGE block in body (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push hook. The `BREAKING CHANGE:` marker
        # rule lives in the script.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body // ""')
          export PR_BODY
          node scripts/system/check-pr-metadata.mjs breaking-body

  # ── missing-tests soft-warning ──────────────────────────────────
  # Non-blocking comment when the PR touches code paths but no test
  # file changed. Surface only -- reviewer decides whether the
  # omission is OK (e.g. trivial type-only refactor, doc move, etc.).
  # Catches the "I forgot to add a test" reflex before the reviewer
  # has to mention it.
  missing-tests-check:
    name: Missing tests soft-warning
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write # comment only -- never fails the job
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Detect code-without-tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Get the list of changed files from the PR. --json files
          # returns the per-file additions/deletions; we just want the
          # path strings.
          files=$(gh pr view "$PR_NUM" --json files --jq '[.files[].path]')
          # Split into code vs test. Code paths under ui/src/lib/server,
          # ui/src/lib/client, ui/src/routes, ui/electron/src, and
          # scripts/. Test paths are anything matching *.test.* or
          # *.spec.* under those trees.
          has_code=$(printf '%s' "$files" | jq '[.[] | select(
            (test("^ui/src/lib/server/") or
             test("^ui/src/lib/client/") or
             test("^ui/src/routes/") or
             test("^ui/electron/src/") or
             test("^scripts/")) and
            (test("\\.test\\.") | not) and
            (test("\\.spec\\.") | not) and
            (test("\\.(ts|tsx|js|mjs|svelte|py)$"))
          )] | length')
          has_tests=$(printf '%s' "$files" | jq '[.[] | select(
            test("\\.test\\.") or test("\\.spec\\.")
          )] | length')
          echo "::notice::PR #$PR_NUM touched $has_code code file(s) + $has_tests test file(s)."
          if [ "$has_code" -gt 0 ] && [ "$has_tests" -eq 0 ]; then
            # Soft-warning: post a comment, but exit 0 (don't fail the job).
            # Skip the warning if the PR already carries a `no-tests-needed`
            # label (e.g. type-only changes, doc moves, etc.).
            BYPASS=$(gh pr view "$PR_NUM" --json labels --jq '[.labels[].name] | contains(["no-tests-needed"])')
            if [ "$BYPASS" = "true" ]; then
              echo "::notice::PR #$PR_NUM touched code without tests but has \`no-tests-needed\` label. Skipping warning."
              exit 0
            fi
            # Avoid spamming -- only post if we haven't already commented
            # for this signature on this PR.
            EXISTING=$(gh pr view "$PR_NUM" --json comments --jq '[.comments[] | select(.body | contains("[pr-quality/missing-tests]"))] | length')
            if [ "$EXISTING" -gt 0 ]; then
              echo "::notice::Missing-tests soft-warning already posted on PR #$PR_NUM; not duplicating."
              exit 0
            fi
            cat > /tmp/missing-tests.md <<'EOF'
          📝 **Missing tests?** This PR touches code paths (ui/src/lib/**, ui/src/routes, ui/electron/src/**, or scripts/**) but no `*.test.*` file changed.

          That's often fine (type-only refactor, doc move, formatting) -- in which case add the `no-tests-needed` label and ignore this. But if the change is behavioural, tests are usually the right complement.

          _Soft-warning from .github/workflows/pr-quality.yml::missing-tests-check. [pr-quality/missing-tests]_
          EOF
            gh pr comment "$PR_NUM" --body-file /tmp/missing-tests.md
            echo "::warning::PR #$PR_NUM touched code without adding tests. Posted soft-warning."
          fi
          {
            echo "### Missing-tests check"
            echo ""
            echo "Code files: $has_code · Test files: $has_tests"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── feat: requires `## Motivation` ──────────────────────────────
  # New features should ship with their "why" recorded in the PR
  # body. The PR-description gate above asserts Summary + Test plan
  # are non-template; this job adds the type-specific `## Motivation`
  # (or `## Why`) requirement only for `feat:` PRs. `chore:` and
  # `fix:` are exempt -- they're typically self-evident.
  feat-needs-motivation:
    name: feat PRs need a Motivation section
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    if: |
      github.event.pull_request.user.type != 'Bot' &&
      startsWith(github.event.pull_request.title, 'feat')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Look for Motivation or Why section (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push hook. The >=30-char `## Motivation`
        # (or `## Why`) rule lives in the script.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body // ""')
          export PR_BODY
          node scripts/system/check-pr-metadata.mjs feat-motivation

  # ── <type>!: requires `## Migration` section ─────────────────────
  # Breaking changes need a documented upgrade path so users know
  # how to adapt. Pairs with the BREAKING CHANGE: footer + the
  # `breaking-change-body` gate.
  breaking-needs-migration:
    name: "<type>!: needs Migration section"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    if: |
      github.event.pull_request.user.type != 'Bot' &&
      contains(github.event.pull_request.title, '!:')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Look for Migration or Rollback section (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push hook. The >=30-char `## Migration`
        # (or `## Rollback plan` / `## Upgrade`) rule lives in the script.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body // ""')
          export PR_BODY
          node scripts/system/check-pr-metadata.mjs breaking-migration

  # ── Lockfile / package.json consistency ─────────────────────────
  # When `package.json` changes, `pnpm-lock.yaml` MUST change too
  # (and vice versa). A package.json change without a lockfile bump
  # means CI passes via the OLD lockfile + the new entry only takes
  # effect on the next `pnpm install`, which is a foot-gun. Bot PRs
  # are exempt -- Dependabot intentionally lands lockfile-only or
  # manifest-only updates in batches that the framework handles.
  lockfile-consistency:
    name: pnpm-lock + package.json change together
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout PR + base for diff inspection
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check that dep-touching package.json changes carry a lockfile bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Changed package.json files in this PR (any workspace).
          changed_pkgs=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" \
            | grep -E '(^|/)package\.json$' || true)
          has_lock=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" \
            | grep -c '^pnpm-lock\.yaml$' || true)

          # Scripts-only / metadata-only package.json changes are
          # lockfile-irrelevant. Inspect each changed package.json for
          # a diff line that touches a dependency-section key. The
          # check fails ONLY when a dep-section changed + the lockfile
          # didn't move in tandem.
          DEP_KEY_RE='^[+-][[:space:]]*"(dependencies|devDependencies|peerDependencies|optionalDependencies|engines|packageManager)"[[:space:]]*:'
          dep_touch=0
          for pkg in $changed_pkgs; do
            if git diff "${BASE_SHA}..${HEAD_SHA}" -- "$pkg" | grep -qE "$DEP_KEY_RE"; then
              dep_touch=1
              break
            fi
            # Also fail if the diff has any +/- line INSIDE a dep block.
            # We approximate this by looking for a +/- line that matches
            # the typical `"@scope/pkg": "version"` shape AND is not in
            # the scripts block (best-effort regex over the unified diff).
            if git diff "${BASE_SHA}..${HEAD_SHA}" -- "$pkg" \
              | awk '
                /^@@/ { context = ""; next }
                /^[+-][[:space:]]*"(dependencies|devDependencies|peerDependencies|optionalDependencies)"[[:space:]]*:/ { in_deps = 1; next }
                /^[+-][[:space:]]*"[^"]+"[[:space:]]*:[[:space:]]*\{/ && in_deps { next }
                /^[+-][[:space:]]*\}/ { in_deps = 0; next }
                in_deps && /^[+-][[:space:]]*"[^"]+"[[:space:]]*:[[:space:]]*"[^"]+"/ { print; exit 1 }
              ' >/dev/null; then
              :
            else
              dep_touch=1
              break
            fi
          done

          if [ -z "$changed_pkgs" ] && [ "$has_lock" -gt 0 ]; then
            echo "::warning::PR changed pnpm-lock.yaml but no package.json. Verify this is an intentional lockfile-only refresh (e.g. \`pnpm install\` rerun)."
          fi
          # Shared decision rule (also used by the local pre-push hook): a
          # dependency-section change must carry a lockfile bump. Detection
          # of dep_touch / has_lock stays here (needs the git diff); the
          # pass/fail rule lives in scripts/system/check-pr-metadata.mjs.
          node scripts/system/check-pr-metadata.mjs lockfile \
            --dep-touch "$dep_touch" --lock-changed "$has_lock"

  # ── PR title length ≤ 72 chars ──────────────────────────────────
  # Git's commit-message convention is ≤ 72 chars on the subject
  # line. The PR title becomes the squash-merge commit subject, so
  # enforcing 72 here keeps `git log --oneline` readable.
  title-length:
    name: PR title <= 72 chars
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check title length (scripts/system/check-pr-metadata.mjs)
        # Shared with the local pre-push `pr-preflight` hook so the 72-char
        # budget can't drift between CI and local. Limit lives in the script.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/system/check-pr-metadata.mjs title-length
