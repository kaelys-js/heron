name: PR perf comment
# Posts the heron-pr-perf sticky after Lighthouse CI finishes.

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ['Lighthouse CI']
    types: [completed]

permissions: {}

concurrency:
  group: perf-comment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-perf sticky
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
      pull-requests: write
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1
      - name: Download lighthouse manifest
        # treosh/lighthouse-ci-action uploads `.lighthouseci/` as artifact
        # named `lighthouse-results`. We extract to `lhci/`, then locate
        # the manifest.json wherever it landed (may be at the root OR
        # under a `.lighthouseci/` subdir depending on the action version).
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v5
        with:
          name: lighthouse-results
          path: lhci
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Format perf sticky
        run: |
          mkdir -p lhci
          # Locate manifest.json. v12 of treosh's action may flatten or
          # preserve the `.lighthouseci/` prefix; try both.
          MANIFEST=""
          if [ -f lhci/manifest.json ]; then
            MANIFEST=lhci/manifest.json
          elif [ -f lhci/.lighthouseci/manifest.json ]; then
            MANIFEST=lhci/.lighthouseci/manifest.json
          else
            echo "[]" > lhci/manifest.json
            MANIFEST=lhci/manifest.json
          fi
          # Belt-and-suspenders: ensure JSON-parseable.
          head -c1 "$MANIFEST" | grep -qE '[\[{]' || echo "[]" > "$MANIFEST"
          node .github/scripts/sticky/format-perf.mjs "$MANIFEST" --out body.md
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          NUM=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH" || true)
          if [ -z "$NUM" ]; then
            NUM=$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')
          fi
          if [ -z "$NUM" ]; then echo "skip=true" >>"$GITHUB_OUTPUT"; fi
          echo "number=$NUM" >>"$GITHUB_OUTPUT"
      - name: Post sticky comment
        if: steps.pr.outputs.skip != 'true'
        uses: ./.github/actions/sticky-comment
        with:
          marker: heron-pr-perf
          body-path: body.md
          pr-number: ${{ steps.pr.outputs.number }}
