name: PR perf comment
# Posts the heron-pr-perf sticky after Lighthouse CI finishes.

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ['Lighthouse CI']
    types: [completed]

permissions: {}

concurrency:
  group: perf-comment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-perf sticky
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1
      - name: Download lighthouse manifest
        # treosh/lighthouse-ci-action uploads `.lighthouseci/` as artifact
        # named `lighthouse-results`. We extract to `lhci/`, then locate
        # the manifest.json wherever it landed (may be at the root OR
        # under a `.lighthouseci/` subdir depending on the action version).
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v5
        with:
          name: lighthouse-results
          path: lhci
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Format perf sticky
        run: |
          mkdir -p lhci
          # Locate manifest.json. v12 of treosh's action may flatten or
          # preserve the `.lighthouseci/` prefix; try both.
          MANIFEST=""
          if [ -f lhci/manifest.json ]; then
            MANIFEST=lhci/manifest.json
          elif [ -f lhci/.lighthouseci/manifest.json ]; then
            MANIFEST=lhci/.lighthouseci/manifest.json
          else
            echo "[]" > lhci/manifest.json
            MANIFEST=lhci/manifest.json
          fi
          # Belt-and-suspenders: ensure JSON-parseable.
          head -c1 "$MANIFEST" | grep -qE '[\[{]' || echo "[]" > "$MANIFEST"
          node .github/scripts/sticky/format-perf.mjs "$MANIFEST" --out body.md
      - name: Stage perf summary
        run: |
          if [ -f body.md ]; then cp body.md perf.md; fi
      - name: Upload perf summary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: summary-perf
          path: perf.md
          if-no-files-found: ignore
          retention-days: 7
