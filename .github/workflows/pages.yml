name: Pages
# Publishes `docs/` to GitHub Pages on every push to main.
#
# Strategy: upload the docs/ directory as a Pages artifact + deploy.
# Jekyll (Pages default processor) renders the .md files with a basic
# theme. For richer docs we can swap in mkdocs/Astro/etc. later; this
# bootstraps the hosted site without that decision blocking the
# infrastructure.
#
# Pages source must be set to "GitHub Actions" before this works.
# `.github/workflows/maintain-features.yml` reconciles it via
# `PUT /repos/{owner}/{repo}/pages` -- trigger that workflow manually
# (Actions → "Maintain repo features" → Run workflow) after this lands
# for the first time, or wait for the weekly cron sweep.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false # never cancel a deploy mid-publish

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Assemble site directory
        run: |
          set -euo pipefail
          mkdir -p _site
          # Drop the README into the site root as index.md so Pages
          # serves it as the landing page.
          cp README.md _site/index.md
          # Mirror the entire docs/ folder.
          cp -r docs _site/docs
          # Bring along branding assets the README references.
          if [ -d branding/assets ]; then
            mkdir -p _site/branding
            cp -r branding/assets _site/branding/
          fi
          # Minimal Jekyll config so the root README renders cleanly.
          cat > _site/_config.yml <<'YML'
          title: Heron
          description: Job-search automation for AI coding CLIs
          theme: jekyll-theme-cayman
          markdown: kramdown
          relative_links:
            enabled: true
          include:
            - docs
          YML

      # upload-pages-artifact internally references actions/upload-artifact@v4
      # (a tag, not a SHA) which trips the repo's "Require SHA-pinning"
      # toggle. Inline the equivalent manual steps -- tar the site +
      # upload as the `github-pages` artifact `deploy-pages` expects.
      - name: Tar the site
        run: |
          set -euo pipefail
          tar \
            --dereference --hard-dereference \
            --directory _site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - name: Upload tarball as github-pages artifact (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
