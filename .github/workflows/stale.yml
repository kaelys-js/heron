name: 'Close stale issues and PRs'
# Weekly housekeeping for inactive issues + PRs. Cadence:
#
# **Issues**: stale at 60 days inactivity, closed 14 days later (so
# 74 days total to auto-close).
# **PRs**:    stale at 30 days inactivity, closed 14 days later (so
# 44 days total to auto-close).
#
# Stale + closed states post a friendly comment explaining how to
# revive (rebase + comment). The pr-bots workflow's stale-pinger job
# pings 7 days before close as an extra nudge.
#
# Exempt labels:
#   - `pinned`     (manual override -- "keep this regardless")
#   - `security`   (security-sensitive work shouldn't bit-rot silently)
#   - `roadmap`    (long-running planning issues)
#   - `hired`      (success stories from i-got-hired.yml -- the social
#                   proof Hall of Fame; HP24)
#
# Fires:
#   - Mondays 06:00 UTC (off-peak)
#   - workflow_dispatch (manual sweep)
on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stale
  cancel-in-progress: false

jobs:
  stale:
    name: Auto-stale + auto-close housekeeping
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Run actions/stale (close inactive issues + PRs)
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 14 days if no further activity occurs.
            If this is still relevant, please comment to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 14 days if no further activity occurs.
            If you're still working on this, please rebase and comment to keep it open.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen with a fresh rebase if you want to continue.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          # HP24 -- `hired` exempts the "I got hired" success stories
          # (issue template `i-got-hired.yml`) from auto-close. Those
          # stories are the social-proof Hall of Fame; auto-closing them
          # at 60+14 days would silently delete the best signal we have
          # that Heron works.
          exempt-issue-labels: 'pinned,security,roadmap,hired'
          exempt-pr-labels: 'pinned,security'
