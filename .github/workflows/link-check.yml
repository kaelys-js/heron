# Markdown link check.
#
# markdownlint-cli2 (already in pre-commit) catches malformed link syntax,
# orphaned reference definitions, and broken anchor fragments -- but it
# does NOT validate that `[text](./path/file.md)` actually points at a
# file that exists. This workflow fills that gap.
#
# Why lychee (not markdown-link-check):
#   • Rust-based, ~10x faster on this repo's 90+ md files
#   • Resolves macOS paths correctly (markdown-link-check confuses /var
#     and /private/var symlinks)
#   • Offline mode by default so we don't hammer external services in CI
#   • Honors `.lycheeignore` for explicit exclusions
#
# Mode: `--offline` validates only relative paths + anchor fragments.
# External URLs are skipped -- they flake too often to justify CI fails
# (Discord redirects, GitHub rate limits, etc.). Run lychee locally
# without `--offline` periodically to spot-check external links.
name: link-check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.markdown'
      - '.github/workflows/link-check.yml'
      - '.lycheeignore'

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore lychee cache
        # Lychee caches per-URL results so consecutive runs skip URLs
        # already validated. Cache key includes the lychee binary tag
        # so an upgrade invalidates safely.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-cache-v1

      - name: Lychee (offline mode — paths + anchors only)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --offline                -- skip external URL probes
          # --include-fragments      -- validate #anchors against headings
          # --no-progress            -- clean CI output
          # --cache + --max-cache-age -- reuse the restored cache
          # Targets: every md outside node_modules and CHANGELOG.md
          # (CHANGELOG references historical commits that may have
          # moved across renames; not a maintenance signal worth gating
          # PRs on).
          #
          # NB: lychee's --exclude-path takes a REGEX (not a glob).
          # The earlier `**/node_modules/**` form failed with
          # "regex parse error: repetition operator missing expression"
          # because `*` is a regex quantifier. The patterns below are
          # plain substrings that anchor against the path string lychee
          # walks (e.g. "node_modules/" matches any path containing
          # that segment).
          args: >-
            --offline
            --include-fragments
            --no-progress
            --cache
            --max-cache-age 7d
            --exclude-path 'node_modules'
            --exclude-path 'CHANGELOG\.md'
            --exclude-path 'TODO\.md'
            --exclude-path 'TODO2\.md'
            './**/*.md'
          fail: true
