name: Verify GitHub config (drift detection)
# Daily drift check — asserts the live repository state matches the
# source-of-truth files (branding/brand.json + .github/rulesets/*.json).
#
# Catches: silent topic drift (someone toggled a topic in the UI),
# silent GHAS toggle drift (someone turned off secret scanning),
# ruleset enforcement changes, deleted/added rules, description /
# homepage drift.
#
# When it fires: opens an issue with the diff if `pnpm gh:verify`
# reports drift. The maintainer either reverts the UI change OR
# updates the source-of-truth file + commits.
#
# The actual diff logic lives in scripts/system/apply-github-config.mjs
# so the local `pnpm gh:verify` produces the same output as this
# workflow — no surprise differences between local + CI.
on:
  schedule:
    - cron: "13 6 * * *" # Daily 06:13 UTC (off-peak; avoids cron-storm)
  push:
    branches: [main]
    paths:
      - "branding/brand.json"
      - ".github/rulesets/**"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: verify-gh-config-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify live GitHub config matches SSOT
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          install_deps: "false" # script needs only `gh` + node, not pnpm install

      - name: Verify (no writes — exits 1 on drift)
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUTPUT=$(node scripts/system/apply-github-config.mjs --verify 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          {
            echo "exit_status=$STATUS"
            echo 'output<<DRIFTEOF'
            echo "$OUTPUT"
            echo 'DRIFTEOF'
          } >> "$GITHUB_OUTPUT"
          # Add a step summary so the diff is visible in Actions UI
          {
            echo "## GH config drift check"
            echo ""
            if [ "$STATUS" -eq 0 ]; then
              echo "✓ No drift — repo state matches SSOT."
            else
              echo "✗ Drift detected. See below + run \`pnpm gh:apply\` locally to reconcile."
              echo ""
              echo '```'
              echo "$OUTPUT"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$STATUS"

      - name: Open drift issue (only if drift + not already open)
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRIFT: ${{ steps.verify.outputs.output }}
        run: |
          set -euo pipefail
          # Don't double-open: if an open issue with this label exists, just comment.
          EXISTING=$(gh issue list --label "drift" --state open --json number --jq '.[0].number // empty')
          {
            echo "Drift detected by daily \`verify-gh-config.yml\`."
            echo ""
            echo "Reconcile with:"
            echo ""
            echo '```sh'
            echo 'pnpm gh:apply'
            echo '```'
            echo ""
            echo "Or revert the UI change that caused the drift."
            echo ""
            echo "<details><summary>Drift report</summary>"
            echo ""
            echo '```'
            printf '%s\n' "$DRIFT"
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/issue.md
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file /tmp/issue.md
            echo "::notice::Drift recurred — commented on existing issue #$EXISTING"
          else
            gh issue create \
              --title "GH config drift detected ($(date -u +%Y-%m-%d))" \
              --label "drift,maintenance" \
              --body-file /tmp/issue.md
          fi
