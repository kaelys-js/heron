name: Auto-approve screenshot-refresh PRs

# Auto-approves the `chore(screenshots): refresh README PNGs` PRs that
# screenshots-refresh.yml opens. Without this approval, those PRs sit
# forever -- main's ruleset requires `required_approving_review_count:
# 1` and the workflow's GITHUB_TOKEN (which authored the PR) can't
# approve its own PR.
#
# Auth: GH_USER_PAT. Approving via the maintainer's PAT satisfies the
# "approver != author" branch-protection rule (PR author is
# github-actions[bot]; approver is kaelys-js). Auto-merge (already
# enabled by screenshots-refresh.yml) then fires once CI is green.
#
# Tight scope by design:
#   • Only acts on PRs from `github-actions[bot]`
#   • Title must START WITH `chore(screenshots):` -- no wildcards
#   • If GH_USER_PAT isn't set, no-op with a notice
#
# Adding more bot patterns? Keep the scope explicit -- a fall-through
# auto-approve is how rubber-stamping accidents happen.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions: {}

concurrency:
  group: auto-approve-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approve:
    name: Approve screenshot-refresh PR
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Workflow-level permission is empty; the step uses GH_USER_PAT
    # exclusively (an admin-token approval).
    if: |
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.title, 'chore(screenshots):')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Auto-approve via GH_USER_PAT
        env:
          GH_TOKEN: ${{ secrets.GH_USER_PAT }}
          PR_NUM: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::GH_USER_PAT not set -- cannot auto-approve PR #${PR_NUM}. Approve manually OR land the secret."
            exit 0
          fi
          # Idempotent: if we already approved (e.g. on a synchronize
          # event after a push), don't post a duplicate review.
          EXISTING=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "::notice::PR #${PR_NUM} already has $EXISTING approving review(s); skipping."
            exit 0
          fi
          gh pr review "$PR_NUM" --repo "$GH_REPO" \
            --approve \
            --body "Auto-approved by .github/workflows/auto-approve-screenshots.yml -- this is a bot-generated screenshot refresh."
          echo "::notice::Approved PR #${PR_NUM} via GH_USER_PAT."
