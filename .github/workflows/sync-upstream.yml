name: Sync from upstream

# Mirrors santifer/career-ops into this private fork.
#
# Two paths:
#   1. Fast-forward — main has no divergent commits beyond upstream/main.
#      Merge directly to main, push, done. No PR.
#   2. Diverged — your local commits + upstream changes both touch shared
#      files. Open (or update) a single ongoing PR from `sync/upstream`
#      so you can review the merge and resolve any conflicts on GitHub.
#
# Schedule: Mondays 12:00 UTC. Manual run: Actions tab → "Sync from upstream"
# → "Run workflow" — or call from CLI with `gh workflow run sync-upstream.yml`.

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: santifer/career-ops
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: sync/upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          # full history so merge can resolve common ancestors
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

      - name: Detect how far behind upstream we are
        id: check
        run: |
          BEHIND=$(git rev-list --count "HEAD..upstream/${UPSTREAM_BRANCH}")
          AHEAD=$(git rev-list --count "upstream/${UPSTREAM_BRANCH}..HEAD")
          echo "behind=${BEHIND}" >> "$GITHUB_OUTPUT"
          echo "ahead=${AHEAD}" >> "$GITHUB_OUTPUT"
          echo "Behind upstream by ${BEHIND} commit(s); ahead by ${AHEAD}."

      - name: Nothing to do
        if: steps.check.outputs.behind == '0'
        run: echo "Up to date with upstream — exiting."

      # ---------------------------------------------------------------
      # Path 1: fast-forward — only possible when ahead == 0.
      # ---------------------------------------------------------------
      - name: Try fast-forward
        if: steps.check.outputs.behind != '0' && steps.check.outputs.ahead == '0'
        id: ff
        continue-on-error: true
        run: git merge --ff-only "upstream/${UPSTREAM_BRANCH}"

      - name: Push fast-forwarded main
        if: steps.ff.outcome == 'success'
        run: |
          git push origin "${TARGET_BRANCH}"
          echo "::notice::Fast-forwarded ${TARGET_BRANCH} by ${{ steps.check.outputs.behind }} commit(s)."

      # ---------------------------------------------------------------
      # Path 2: divergent or non-FF — produce/update sync PR.
      #   - Resets sync branch from current main
      #   - Attempts merge of upstream/main
      #   - On conflict: commits the conflict markers so the PR shows them
      #   - Force-pushes (sync branch is fully managed by this workflow)
      #   - Opens a new PR if none exists; the existing PR auto-updates if open
      # ---------------------------------------------------------------
      - name: Build sync branch
        if: steps.check.outputs.behind != '0' && (steps.check.outputs.ahead != '0' || steps.ff.outcome == 'failure')
        id: build
        run: |
          # Always start from current main — never carry stale sync state forward.
          git fetch origin "${TARGET_BRANCH}"
          git checkout -B "${SYNC_BRANCH}" "origin/${TARGET_BRANCH}"

          # Attempt merge. Use --no-ff to keep an explicit merge commit even
          # in trivial cases — gives the PR something concrete to review.
          if git merge --no-ff -m "chore: sync from upstream/${UPSTREAM_BRANCH}" "upstream/${UPSTREAM_BRANCH}"; then
            echo "had_conflicts=false" >> "$GITHUB_OUTPUT"
          else
            # Stage everything (conflicted files included with their <<<<<<< markers)
            # and commit so the PR diff makes the conflict visible on GitHub.
            git add -A
            git commit -m "chore: sync from upstream (CONFLICTS — resolve before merging)"
            echo "had_conflicts=true" >> "$GITHUB_OUTPUT"
          fi

          git push --force-with-lease origin "${SYNC_BRANCH}"

      - name: Open or update sync PR
        if: steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAD_CONFLICTS: ${{ steps.build.outputs.had_conflicts }}
          BEHIND: ${{ steps.check.outputs.behind }}
          AHEAD: ${{ steps.check.outputs.ahead }}
        run: |
          set -euo pipefail

          EXISTING=$(gh pr list \
            --head "${SYNC_BRANCH}" \
            --base "${TARGET_BRANCH}" \
            --state open \
            --json number --jq '.[0].number // empty')

          BODY_HEADER="Auto-generated sync from \`${UPSTREAM_REPO}\` (branch \`${UPSTREAM_BRANCH}\`)."
          if [ "$HAD_CONFLICTS" = "true" ]; then
            BODY_CONFLICT="⚠️ **Merge conflicts present.** Resolve on GitHub (Files changed → fix the conflict markers) or pull this branch locally and merge by hand."
          else
            BODY_CONFLICT="✅ Clean merge — review the diff and squash/merge when ready."
          fi
          BODY_STATS="Before sync: behind upstream by ${BEHIND} commit(s); your fork is ahead by ${AHEAD}."
          BODY_FOOTER="The sync branch is force-pushed every run, so closing this PR will not block future syncs — a fresh PR opens on the next divergence."

          BODY=$(printf '%s\n\n%s\n\n%s\n\n%s\n' "$BODY_HEADER" "$BODY_CONFLICT" "$BODY_STATS" "$BODY_FOOTER")

          if [ -n "$EXISTING" ]; then
            echo "::notice::Sync PR #${EXISTING} already open — branch was force-pushed."
            gh pr edit "$EXISTING" --body "$BODY"
          else
            # No labels — keeps the workflow self-contained. Identify sync
            # PRs by the branch name (sync/upstream) or title prefix.
            gh pr create \
              --title "chore: sync from upstream/${UPSTREAM_BRANCH}" \
              --body "$BODY" \
              --base "${TARGET_BRANCH}" \
              --head "${SYNC_BRANCH}"
          fi
