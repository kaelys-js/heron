name: Visual regression (Lost Pixel)
# HP4 -- self-hosted visual regression testing. Each PR builds the
# dashboard, boots `vite preview`, snapshots the canonical routes
# (config at lostpixel.config.ts), and diffs against the baselines
# committed under .lostpixel/baseline/.
#
# Diff threshold: 10% pixel difference (configurable in
# lostpixel.config.ts). Exceeding it fails the workflow. Failure
# artifacts:
#   - .lostpixel/current/     -- fresh snapshots for the PR commit
#   - .lostpixel/difference/  -- diff images (pink overlay over changed pixels)
# Both uploaded as GH Actions artifacts on red, accessible from the
# PR's Checks tab.
#
# Updating baselines: when a PR legitimately changes the UI (e.g. a
# design refresh), add the `accept-snapshots` label. The workflow then
# runs in generate-only mode + commits the new baselines back to the
# PR branch automatically.

on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "lostpixel.config.ts"
      - "pnpm-lock.yaml"

permissions:
  contents: write # baseline regeneration on `accept-snapshots`
  pull-requests: write

concurrency:
  group: visual-regression-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lost-pixel:
    name: Snapshot + diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need write access for baseline regeneration when the PR is
          # labeled `accept-snapshots`. Otherwise read-only.
          token: ${{ github.event.pull_request.user.login == github.repository_owner && secrets.GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          apply_brand: true

      - name: Build dashboard
        run: pnpm --filter ui build

      - name: Boot preview server
        # Detached process; the next step polls until it's responsive.
        run: pnpm --filter ui exec vite preview --port 4173 &

      - name: Wait for preview server
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:4173/login > /dev/null 2>&1; then
              echo "Preview server ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Preview server never became ready"
          exit 1

      - name: Run Lost Pixel (compare mode)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'accept-snapshots') }}
        env:
          LOST_PIXEL_MODE: compare
        run: pnpm dlx lost-pixel@v3.22.0

      - name: Run Lost Pixel (generate baselines)
        if: ${{ contains(github.event.pull_request.labels.*.name, 'accept-snapshots') }}
        env:
          LOST_PIXEL_MODE: generate-only
        run: pnpm dlx lost-pixel@v3.22.0

      - name: Commit regenerated baselines (if label was set)
        if: ${{ contains(github.event.pull_request.labels.*.name, 'accept-snapshots') && success() }}
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .lostpixel/baseline/
          if git diff --staged --quiet; then
            echo "::notice::No baseline changes to commit"
            exit 0
          fi
          git commit -m "chore(visual-regression): regenerate baselines [skip ci]" \
                     -m "Triggered by the \`accept-snapshots\` label on PR #${PR_NUM}."
          git push origin "HEAD:${HEAD_REF}"

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lost-pixel-diff-${{ github.run_id }}
          path: |
            .lostpixel/current/
            .lostpixel/difference/
          retention-days: 14
