name: Dependency Review
# Blocks PRs that introduce dependencies with high-severity GHSAs OR
# non-permissive (GPL/AGPL/LGPL) licenses. Two layers of protection:
#
# 1. **License gate** -- positive allowlist (MIT / BSD / Apache-2 / ISC /
#    MPL-2 / CC0 / Unlicense / 0BSD / Ruby / Python-2 / Zlib /
#    BlueOak-1.0 / CC-BY-3/4 / WTFPL). Anything outside fails the PR.
#    Heron ships under MIT + bundles Electron, so a GPL transitive would
#    taint the binary's license.
#
# 2. **Vulnerability gate** -- fail-on-severity: high. Two transitive
#    allowlist entries (jwt empty-key HMAC + highline GPL-OR-Ruby SPDX)
#    are documented inline with rationale + revisit conditions.
#
# Fires on every pull_request against main; comments the dep diff on
# the PR via comment-summary-in-pr: always. SARIF results also land in
# the Code Scanning view for cross-referencing with CodeQL alerts.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Dependency Review (GHSA + license gating)
        id: review
        # G7 -- blocking again. The Dependency Graph must be enabled in
        # Settings → Security & Analysis (it's enabled by default for
        # public repos as of 2024). If a fork or restored repo somehow
        # has it disabled, the action will fail with a clear error
        # message and the maintainer can re-enable it in 2 clicks. This
        # is preferable to silently passing on vulnerable PRs.
        #
        # License gating: Heron ships under MIT and bundles Electron --
        # any GPL-family transitive would taint the binary. Migrated from
        # `deny-licenses` (deprecated per actions/dependency-review-action
        # #997, slated for removal in v6) to `allow-licenses`: a positive
        # allowlist of permissive SPDX identifiers. Anything outside this
        # set (including GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1, LGPL-3.0)
        # is rejected by default. Adding a license here is the explicit
        # gesture required to take on a new ecosystem's licensing risk.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          allow-licenses: >-
            0BSD, Apache-2.0, BSD-2-Clause, BSD-3-Clause, BlueOak-1.0.0,
            CC-BY-3.0, CC-BY-4.0, CC0-1.0, ISC, MIT, MPL-2.0,
            Python-2.0, Ruby, Unlicense, WTFPL, Zlib
          comment-summary-in-pr: always
          # ALLOW-LIST: GHSA-c32j-vqhx-rx3x  (jwt 2.10.2 -- empty-key HMAC bypass)
          #
          # Source: transitive dev-dep of fastlane.  Reach this code only
          # via `bundle exec fastlane ...`; NOT shipped to end users.
          #
          # Why unreachable in our use:
          #   * Fastlane uses jwt to sign App Store Connect API requests.
          #   * ASC uses asymmetric ES256/RS256 with a real .p8 RSA key
          #     loaded from `APP_STORE_CONNECT_API_KEY`; never HMAC,
          #     never empty key.
          #   * The vuln requires HMAC-with-empty-key (`JWT.decode(t, '',
          #     true, algorithm: 'HS256')`) -- not a code path fastlane
          #     ever exercises.
          #
          # Why we can't bump:
          #   * Patched version is `>= 3.2.0`.
          #   * jwt 2.x line has NO patch (line jumped 2.10.2 -> 3.0.0).
          #   * fastlane 2.234.0 (latest) hard-pins `jwt (>= 2.1.0, < 3)`.
          #     Bumping requires upstream fastlane to relax the bound.
          #     Tracked upstream:
          #       https://github.com/fastlane/fastlane/issues  (search jwt 3)
          #
          # Revisit when fastlane ships a release that allows jwt 3.x;
          # drop this allow-list line + run `bundle update jwt fastlane`.
          allow-ghsas: GHSA-c32j-vqhx-rx3x
          # ALLOW-LIST: highline (gem)
          #
          # Highline ships under SPDX expression `GPL-2.0-only OR Ruby`
          # -- the OR means the user CHOOSES which license to apply.
          # Heron consumes highline under the Ruby License terms (BSD-
          # like, MIT-compatible). The dependency-review-action's
          # `deny-licenses: GPL-2.0` regex matches the GPL-2.0-only
          # half of the OR expression and rejects -- but we never
          # actually take that half.
          #
          # Source: transitive dev-dep of fastlane (used to render
          # interactive CLI prompts). NOT shipped to end users.
          #
          # If a future highline release drops the GPL half or
          # fastlane swaps in a different prompt library, drop this
          # allow-list line.
          allow-dependencies-licenses: pkg:gem/highline

      # Visible outcome in the Actions summary tab. The dependency-review
      # action posts a PR comment on every run; this step gives the
      # maintainer a one-glance pass/fail in the Actions UI without
      # opening the comment.
      - name: Log outcome
        if: always()
        run: |
          if [ "${{ steps.review.outcome }}" = "success" ]; then
            echo "::notice::Dependency Review passed -- no high-severity GHSAs + all licenses on the allowlist."
            echo "### ✅ Dependency Review passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Dependency Review failed -- check the PR comment for the GHSA / license violation."
            {
              echo "### ❌ Dependency Review failed"
              echo ""
              echo "See the PR comment for the specific dependency that triggered the block."
              echo "If it's a license mismatch, decide between adding the license to the"
              echo "allowlist or removing the dependency. If it's a GHSA, upgrade or add"
              echo "to the inline allow-ghsas with rationale."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
