name: Dependency Review
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Dependency Review
        # G7 -- blocking again. The Dependency Graph must be enabled in
        # Settings → Security & Analysis (it's enabled by default for
        # public repos as of 2024). If a fork or restored repo somehow
        # has it disabled, the action will fail with a clear error
        # message and the maintainer can re-enable it in 2 clicks. This
        # is preferable to silently passing on vulnerable PRs.
        #
        # Also denies GPL/AGPL/LGPL licenses since Heron ships under
        # MIT and bundles Electron -- any GPL-family transitive would
        # taint the binary.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-2.0, GPL-3.0, LGPL-2.1, LGPL-3.0
          comment-summary-in-pr: always
