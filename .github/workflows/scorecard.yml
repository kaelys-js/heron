name: OSSF Scorecard
# Supply-chain posture report -- runs weekly + on every push to main.
#
# Publishes results to securityscorecards.dev (public dashboard) and
# uploads the SARIF report to GitHub Code Scanning so findings show up
# in the Security tab alongside CodeQL. Adds a Scorecard badge to README.
#
# Required GitHub setup:
#   • Settings → Code security and analysis → "Code scanning" enabled
#   • Settings → Security → "Token-less Scorecard publishing" enabled
#     (or set SCORECARD_TOKEN as a repo secret -- public-repo path uses
#     OIDC by default, no token needed)
#
# G3 -- fills the missing public-supply-chain reputation signal. Most
# May-2026 OSS projects expose a Scorecard score; absence is now a yellow
# flag for security-conscious adopters.
on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1" # Weekly, Monday 04:23 UTC (avoids the round-hour cron-storm)
  push:
    branches: [main]
  # Also run on PRs to main so the required-status-check on this
  # workflow (configured in branch protection) actually has a chance
  # to report green or red on the PR. Without this trigger the check
  # would stay "Expected" forever and block every merge.
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: false # Don't cancel weekly cron mid-run

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # SARIF upload requires `security-events: write`.
      security-events: write
      # `id-token: write` is required for tokenless Scorecard publishing
      # (OIDC). The action exchanges the OIDC token for an attestation
      # signed by Sigstore.
      id-token: write
      # `contents: read` is the bare minimum for `actions/checkout`.
      contents: read
    steps:
      - name: Harden runner
        # G4 -- egress-policy: audit in initial rollout. After 2 weeks of
        # green runs, flip to `egress-policy: block` and add observed
        # endpoints to `allowed-endpoints`. Especially important on this
        # workflow because it runs with `security-events: write` +
        # `id-token: write` -- a compromised action step here could
        # exfiltrate the OIDC token.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        # SHA pin: the v2.4.3 release uses an annotated tag, so we must
        # pin to the *commit* SHA the tag points to (4eaacf0...), not
        # the tag-object SHA (99c09fe...). The OSSF scorecard server's
        # imposter-commit check verifies the commit, so pinning to the
        # tag-object SHA fails workflow verification with
        # "imposter commit: ... does not belong to ossf/scorecard-action".
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # public_results: true is the default for public repos --
          # publishes to https://api.securityscorecards.dev/projects/{repo}.
          # The README badge resolves through this endpoint.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 14

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: results.sarif
