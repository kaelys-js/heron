# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Maintain Discord
# Reconciles the Discord server (channels + roles + AutoMod + Onboarding
# + Welcome screen) against .github/discord/config.yml. Pattern mirrors
# .github/workflows/maintain-config.yml + maintain-features.yml --
# push:main + weekly cron + workflow_dispatch.
#
# Modes (see the "Pick mode" step): push:main APPLIES committed config
# changes live; the weekly cron runs `--verify` (drift sweep -- fails red
# on divergence); workflow_dispatch picks verify / apply / dry manually.
#
# Required secrets:
#   DISCORD_BOT_TOKEN  -- bot application token (Developer Portal).
#                         Bot needs ADMINISTRATOR for full provisioning
#                         (private channels + enabling Community + prune);
#                         a scoped invite only partially provisions. See
#                         docs/DISCORD.md for the bot-creation + invite walkthrough.

on:
  push:
    branches: [main]
    paths:
      - '.github/discord/config.yml'
      - 'scripts/system/apply-discord-config.mjs'
      - '.github/workflows/maintain-discord.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Reconciler mode'
        required: true
        default: 'verify'
        type: choice
        options:
          - verify
          - apply
          - dry
  schedule:
    # Weekly drift sweep -- runs Sunday 06:00 UTC. Catches manual UI
    # changes the maintainer made between push events.
    - cron: '0 6 * * 0'

permissions: {}

concurrency:
  group: maintain-discord-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reconcile:
    name: Reconcile Discord server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup mise (Node + pnpm from .mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4 # zizmor: ignore[cache-poisoning]
        with:
          experimental: true
          cache: true

      # Cache the pnpm store (mise-action's cache only covers tool binaries).
      # Same key as the setup-toolchain composite -> shared across workflows.
      # zizmor: ignore[cache-poisoning] -- restoring node_modules deps keyed by
      # the committed lockfile hash, consistent with every other workflow.
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Token-free: catches config typos + dangling references (a role /
      # channel / webhook / image that doesn't resolve) before we touch
      # Discord. Fails the workflow red on a bad config.
      - name: Validate Discord config
        run: node scripts/system/verify-discord-config.mjs

      # Reconciler mode resolution:
      #   - workflow_dispatch with inputs.mode    => use that
      #   - push:main                             => apply (drift in
      #                                              committed config
      #                                              should land live)
      #   - schedule                              => verify (cron is a
      #                                              drift-detection
      #                                              sweep; don't
      #                                              auto-apply on
      #                                              someone's manual
      #                                              channel edit)
      - name: Pick mode
        id: mode
        env:
          INPUTS_MODE: ${{ inputs.mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            workflow_dispatch) m="$INPUTS_MODE" ;;
            push)              m="apply"        ;;
            schedule)          m="verify"       ;;
            *)                 m="verify"       ;;
          esac
          echo "mode=$m" >> "$GITHUB_OUTPUT"
          echo "::notice::Reconciler mode: $m"

      # Skip cleanly when DISCORD_BOT_TOKEN isn't configured -- a fresh
      # fork without Discord setup gets a green workflow with a
      # ":notice::" annotation rather than a red failure. Once the
      # maintainer sets the secret (pnpm setup:native step 14), the
      # reconciler runs in earnest.
      #
      # Secret presence is exposed via env on the step, then checked at
      # runtime in bash -- GitHub Actions disallows `secrets.*` in
      # step-level `if:` expressions.
      # Brand-image apply state ({sourceSha, discordHash} per slot) lives
      # in a cache, not the repo (CI can't push to protected main). The
      # rolling run-id key + prefix restore-keys make it mutable across
      # runs. A cache miss only costs one harmless image re-upload.
      - name: Restore Discord image-state cache
        id: image_state_cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .github/discord/.image-state.json
          key: discord-image-state-${{ github.run_id }}
          restore-keys: |
            discord-image-state-

      - name: Run apply-discord-config.mjs
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ vars.DISCORD_GUILD_ID }}
          # Webhook secret URLs -- the reconciler sets each webhook's name +
          # avatar via the token-in-URL endpoint. Absent ones skip cleanly.
          DISCORD_WEBHOOK_RELEASES: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
          DISCORD_WEBHOOK_BUILDS: ${{ secrets.DISCORD_WEBHOOK_BUILDS }}
          DISCORD_WEBHOOK_SECURITY: ${{ secrets.DISCORD_WEBHOOK_SECURITY }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_BOT_TOKEN:-}" ]; then
            echo "::notice::Discord reconciler skipped -- DISCORD_BOT_TOKEN not configured."
            echo "Configure via 'pnpm setup:native' step 14, or set the secret manually."
            exit 0
          fi
          flag=""
          case "${{ steps.mode.outputs.mode }}" in
            verify) flag="--verify" ;;
            dry)    flag="--dry"    ;;
            apply)  flag=""         ;;
          esac
          node scripts/system/apply-discord-config.mjs $flag

      # Persist updated image-state after an apply that changed an image.
      # Skip when the restore was an exact-key hit -- saving the same key
      # twice (e.g. a workflow re-run) errors on the immutable cache.
      - name: Save Discord image-state cache
        if: ${{ steps.mode.outputs.mode == 'apply' && hashFiles('.github/discord/.image-state.json') != '' && steps.image_state_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .github/discord/.image-state.json
          key: discord-image-state-${{ github.run_id }}
