name: Lighthouse CI
# HP2 -- perf + a11y + SEO budgets enforced on the SvelteKit dashboard.
# Boots `pnpm preview` against the prod-build static bundle and runs
# Lighthouse against 2 canonical routes (/login as the cold-start, /inbox
# as the warm dashboard).
#
# Budgets (lighthouserc.json):
#   performance      ≥85 (error if below)
#   accessibility    ≥95 (error if below)
#   best-practices   ≥90 (warn)
#   seo              ≥90 (warn)
#   LCP              ≤2.5s (error)
#   CLS              ≤0.1 (error)
#   TBT              ≤300ms (warn)
#
# Results upload to temporary public storage; the PR comment is posted
# by lighthouse-ci-action automatically. 7-day retention.
on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "lighthouserc.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup mise (Node + pnpm)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Apply brand
        run: pnpm brand:apply

      - name: Build dashboard
        run: pnpm --filter ui build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
