name: Lighthouse CI
# HP2 -- perf + a11y + SEO budgets enforced on the SvelteKit dashboard.
# Boots `pnpm preview` against the prod-build static bundle and runs
# Lighthouse against 2 canonical routes (/login as the cold-start, /inbox
# as the warm dashboard).
#
# Budgets (lighthouserc.json):
#   performance      ≥85 (error if below)
#   accessibility    ≥95 (error if below)
#   best-practices   ≥90 (warn)
#   seo              ≥90 (warn)
#   LCP              ≤2.5s (error)
#   CLS              ≤0.1 (error)
#   TBT              ≤300ms (warn)
#
# Results upload to temporary public storage; the PR comment is posted
# by lighthouse-ci-action automatically. 7-day retention.
on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "lighthouserc.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup toolchain
        # Migrated from inline mise + pnpm install + pip install +
        # `pnpm brand:apply` (28 lines) to the shared composite. Wins:
        # (1) pnpm store cache enabled by default, so cold install
        #     skips the registry round-trips (~30-60s).
        # (2) Turbo cache enabled here so the `pnpm --filter ui build`
        #     step below hits the warm task graph (~3-4 min saved on
        #     no-op source changes; first build of a PR is still cold).
        # (3) install_python_deps stays default (true) -- the dashboard
        #     preview server boots orchestrator children that import
        #     `cryptography`. Disabling that would surface as
        #     ModuleNotFoundError in the browser console, which
        #     Lighthouse's `errors-in-console` audit then flags.
        uses: ./.github/actions/setup-toolchain
        with:
          apply_brand: true
          turbo_cache: true

      # Cache the Playwright browsers binary store so the Lighthouse
      # CI action's internal Chromium launch is warm. Pre-fix every run
      # paid the ~30s "download + extract Chromium" cost via Lighthouse
      # CI's bootstrap; cache restoration drops that to a few seconds.
      - name: Cache Playwright browsers (Chromium only)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: lighthouse-playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            lighthouse-playwright-${{ runner.os }}-

      - name: Build dashboard
        run: pnpm --filter ui build

      - name: Seed first user (so /login doesn't 302 to /signup?first=1)
        # Without this row, /login's +page.server.ts redirects to
        # /signup?first=1 because `users.count === 0`. Lighthouse then
        # audits the signup page, fails `redirects` (170ms wasted)
        # AND `is-crawlable` (signup is intentionally noindex).
        # Inserting one owner row lets Lighthouse audit the actual
        # /login URL with no redirect chain.
        run: node scripts/system/seed-lighthouse-user.mjs

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
