name: Lighthouse CI
# HP2 -- perf + a11y + SEO budgets enforced on the SvelteKit dashboard.
# Boots `pnpm --filter ui preview` against the prod-build static bundle
# and runs Lighthouse against 2 canonical routes (/login as the cold-
# start, /inbox as the warm dashboard).
#
# Budgets (lighthouserc.json):
#   performance      ≥85 (error if below)
#   accessibility    ≥95 (error if below)
#   best-practices   ≥90 (warn)
#   seo              ≥90 (warn)
#   LCP              ≤2.5s (error)
#   CLS              ≤0.1 (error)
#   TBT              ≤300ms (warn)
#
# Results upload to temporary public storage; the PR comment is posted
# by lighthouse-ci-action automatically. 7-day retention.
on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "lighthouserc.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup toolchain
        # Migrated from inline mise + pnpm install + pip install +
        # `pnpm brand:apply` (28 lines) to the shared composite. Wins:
        # (1) pnpm store cache enabled by default, so cold install
        #     skips the registry round-trips (~30-60s).
        # (2) Turbo cache enabled here so the `pnpm --filter ui build`
        #     step below hits the warm task graph (~3-4 min saved on
        #     no-op source changes; first build of a PR is still cold).
        # (3) install_python_deps stays default (true) -- the dashboard
        #     preview server boots orchestrator children that import
        #     `cryptography`. Disabling that would surface as
        #     ModuleNotFoundError in the browser console, which
        #     Lighthouse's `errors-in-console` audit then flags.
        uses: ./.github/actions/setup-toolchain
        with:
          apply_brand: true
          turbo_cache: true

      # Cache the Playwright browsers binary store so the Lighthouse
      # CI action's internal Chromium launch is warm. Pre-fix every run
      # paid the ~30s "download + extract Chromium" cost via Lighthouse
      # CI's bootstrap; cache restoration drops that to a few seconds.
      - name: Cache Playwright browsers (Chromium only)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: lighthouse-playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            lighthouse-playwright-${{ runner.os }}-

      - name: Build dashboard
        run: pnpm --filter ui build

      # Seed `u_e2e` (the userId hardcoded into /api/auth/e2e-login) into
      # auth.db at /tmp/heron-lighthouse. Both the minting preview server
      # below + the lighthouse-ci-action's preview server below read this
      # same dir via HERON_DATA_DIR, so the token resolves consistently.
      # Without the row, /login's +page.server.ts 302s to /signup?first=1.
      - name: Seed u_e2e in /tmp/heron-lighthouse/auth.db
        env:
          HERON_DATA_DIR: /tmp/heron-lighthouse
        run: |
          mkdir -p "$HERON_DATA_DIR"
          node scripts/system/seed-lighthouse-user.mjs

      # Mint a bearer token via the e2e auth-bypass so Lighthouse can
      # audit auth-gated routes (/inbox, /queue, /autopilot). Without
      # the token those routes 302 to /login and the redirects audit
      # fails on every run.
      #
      # Two-step shape: boot the preview server out-of-band on port 4274,
      # mint the token, then write lighthouserc.runtime.json with the
      # token injected into settings.extraHeaders. The lighthouse-ci-action
      # below then boots its OWN preview server (via configPath's
      # startServerCommand on port 4173) against the SAME HERON_DATA_DIR
      # so the token's session row is visible in both processes.
      - name: Mint bearer token + write runtime config
        env:
          HERON_DATA_DIR: /tmp/heron-lighthouse
          HERON_E2E_DATA_DIR: /tmp/heron-lighthouse
        run: |
          set -euo pipefail
          # Boot the preview server in the background just long enough
          # to mint the token. HERON_DATA_DIR is exported above so the
          # spawned `vite preview` reads from the seeded dir.
          pnpm --filter ui exec vite preview --port 4274 &
          PREVIEW_PID=$!
          # Wait for readiness -- poll /api/health for up to 30s.
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:4274/api/health > /dev/null 2>&1; then break; fi
            sleep 1
          done
          LIGHTHOUSE_PORT=4274 node scripts/system/inject-lighthouse-auth.mjs
          kill $PREVIEW_PID 2>/dev/null || true
          wait $PREVIEW_PID 2>/dev/null || true

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        env:
          # The preview server (started inside lighthouse-ci-action via
          # the configPath's startServerCommand) must see the same
          # HERON_DATA_DIR + HERON_E2E_DATA_DIR so it reads the same
          # auth.db as the runtime config's bearer token. Without
          # HERON_DATA_DIR the new process opens a fresh empty DB +
          # the bearer's session row is invisible -> 401 on every audit.
          HERON_DATA_DIR: /tmp/heron-lighthouse
          HERON_E2E_DATA_DIR: /tmp/heron-lighthouse
        with:
          configPath: ./lighthouserc.runtime.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      # Surface the scores in the Actions summary so the maintainer can
      # see perf/a11y/SEO/best-practices at a glance without clicking
      # through to the Lighthouse report URL. The action posts a PR
      # comment with the same data; this step is the in-Actions mirror.
      - name: Log Lighthouse scores
        if: always() && hashFiles('.lighthouseci/manifest.json') != ''
        # Heredoc with quoted EOF disables variable expansion at the
        # shell level (so `${...}` inside is JS template literals, not
        # bash). Avoids the shellcheck SC2016 false positive that the
        # `node -e '...'` form trips.
        run: |
          set -euo pipefail
          node <<'NODESCRIPT'
            const fs = require("fs");
            const manifest = JSON.parse(fs.readFileSync(".lighthouseci/manifest.json", "utf8"));
            const lines = [];
            lines.push("### 🚦 Lighthouse scores");
            lines.push("");
            lines.push("| URL | Performance | Accessibility | Best Practices | SEO |");
            lines.push("|---|---|---|---|---|");
            const fmt = (v) => v == null ? "?" : Math.round(v * 100);
            for (const m of manifest) {
              const lhr = JSON.parse(fs.readFileSync(m.jsonPath, "utf8"));
              const c = lhr.categories;
              lines.push(`| \`${m.url}\` | ${fmt(c.performance?.score)} | ${fmt(c.accessibility?.score)} | ${fmt(c["best-practices"]?.score)} | ${fmt(c.seo?.score)} |`);
            }
            lines.push("");
            lines.push("Budgets in `lighthouserc.json`. Detailed report URLs in the PR comment.");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
            // Compact notice for the run feed
            const first = JSON.parse(fs.readFileSync(manifest[0].jsonPath, "utf8")).categories;
            console.log(`::notice::Lighthouse scores: perf=${fmt(first.performance?.score)} a11y=${fmt(first.accessibility?.score)} bp=${fmt(first["best-practices"]?.score)} seo=${fmt(first.seo?.score)}`);
          NODESCRIPT
