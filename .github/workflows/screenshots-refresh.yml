name: Screenshots refresh
# Regenerates the README "See it in action" PNGs against a seeded demo
# profile, then commits the result back to main. Triggers:
#   - Push to main (paths-filter on UI / branding / template / capture
#     script / seed script -- anything that could move a pixel)
#   - Weekly cron (Sundays 06:00 UTC) -- safety net for drift the path
#     filter misses
#   - workflow_dispatch -- manual rerun from the Actions tab
#
# The capture seeds an isolated tmpdir DB (HERON_DATA_DIR), boots
# `vite preview` with the double-gated HERON_SCREENSHOT_MODE=1 bypass
# (see ui/src/lib/server/screenshot-bypass.ts), runs Playwright across
# the canonical routes, and commits any modified PNGs directly to main.
# The bypass refuses to activate unless BOTH HERON_SCREENSHOT_MODE=1 AND
# HERON_DATA_DIR resolves under os.tmpdir() -- so a misconfigured run
# fails closed, not open.

on:
  push:
    branches: [main]
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "branding/**"
      - "scripts/system/capture-screenshots.mjs"
      - "scripts/system/seed-demo-data.mjs"
      - "pnpm-lock.yaml"
  schedule:
    # Sundays 06:00 UTC. Safety net so screenshots don't drift more than
    # a week even if the path-filter misses an indirect change.
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: screenshots-refresh
  cancel-in-progress: false # let a queued run finish; no point cancelling

jobs:
  refresh:
    name: Capture + commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # create the branch with screenshot diff
      pull-requests: write # open the PR + enable auto-merge
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # write permission needed for the commit-back step. We explicitly
          # set persist-credentials: false (zizmor/artipacked) so the token
          # never leaks into the upload-artifact step later in this job;
          # the commit-back step re-authenticates via $GITHUB_TOKEN inline.
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          apply_brand: true
          # Warm Turbo cache speeds the `pnpm brand:apply` codegen +
          # any downstream pnpm task that this workflow may invoke
          # (currently just the screenshot capture, but turbo's
          # graph-aware fingerprinting makes the warm path noticeably
          # faster on incremental pushes).
          turbo_cache: true

      # Cache the Playwright browsers binary store so `playwright install`
      # below is a near-noop on warm cache. Pre-fix every run downloaded
      # Chromium + deps from scratch (~30s). Same pattern test.yml uses
      # for its Vitest browser-mode + E2E steps; key shared on
      # pnpm-lock.yaml so a Playwright bump in the lockfile invalidates.
      - name: Cache Playwright browsers (screenshots)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (Chromium only)
        run: pnpm --filter ui exec playwright install chromium --with-deps

      - name: Capture screenshots
        run: pnpm screenshots
        env:
          # capture-screenshots.mjs sets HERON_DATA_DIR + HERON_SCREENSHOT_MODE
          # itself when run in managed mode. We don't pre-set them here
          # because the script wants to mkdtemp its own tmpdir.
          CI: "true"

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet docs/screenshots/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No screenshot drift detected; nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat docs/screenshots/
          fi

      - name: Open PR with refreshed PNGs
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Why a PR instead of direct push: main is protected (required
          # status checks, required PR, required reviews). A direct push
          # from this workflow can't satisfy required_PR. Opening a PR
          # keeps every rule in force: the PR runs through the normal CI
          # matrix, auto-approve-screenshots.yml fires the approval, and
          # auto-merge fires once CI is green. GitHub auto-signs the
          # squash-merge commit on its side (verified=true), so
          # required_signatures is satisfied at merge time without any
          # bot-side signing setup.
          BRANCH="bots/screenshots-${RUN_ID}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add docs/screenshots/
          git commit \
            -m "chore(screenshots): refresh README PNGs" \
            -m "Auto-generated by .github/workflows/screenshots-refresh.yml."
          # Token-injected push URL so the credential is scoped to this
          # single command and never lands in .git/config (zizmor/artipacked
          # would otherwise pick it up via upload-artifact). The branch
          # isn't main-protected, so this push succeeds.
          HOSTLESS_URL="${SERVER_URL#https://}"
          git push "https://x-access-token:${GH_TOKEN}@${HOSTLESS_URL}/${REPO}.git" "$BRANCH"

          # Open the PR. --label dependencies isn't accurate (these aren't
          # deps), but the labels we have are mostly typed for code; pick
          # one that the maintainer will recognise as bot-generated +
          # low-risk. `screenshot-refresh` doesn't exist yet so omit.
          gh pr create \
            --title "chore(screenshots): refresh README PNGs" \
            --body "Auto-generated by .github/workflows/screenshots-refresh.yml. Approving this PR will trigger auto-merge once CI is green." \
            --base main \
            --head "$BRANCH"

          # Enable auto-merge so the PR squash-merges the moment all
          # required checks pass AND an approval lands. Maintainer just
          # needs to click Approve.
          gh pr merge "$BRANCH" --auto --squash --delete-branch

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshots-refresh-${{ github.run_id }}
          path: docs/screenshots/
          retention-days: 7
