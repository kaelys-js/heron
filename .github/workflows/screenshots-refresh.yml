name: Screenshots refresh
# Regenerates the README "See it in action" PNGs against a seeded demo
# profile, then commits the result back to main. Triggers:
#   - Push to main (paths-filter on UI / branding / template / capture
#     script / seed script -- anything that could move a pixel)
#   - Weekly cron (Sundays 06:00 UTC) -- safety net for drift the path
#     filter misses
#   - workflow_dispatch -- manual rerun from the Actions tab
#
# The capture seeds an isolated tmpdir DB (HERON_DATA_DIR), boots
# `vite preview` with the double-gated HERON_SCREENSHOT_MODE=1 bypass
# (see ui/src/lib/server/screenshot-bypass.ts), runs Playwright across
# the canonical routes, and commits any modified PNGs directly to main.
# The bypass refuses to activate unless BOTH HERON_SCREENSHOT_MODE=1 AND
# HERON_DATA_DIR resolves under os.tmpdir() -- so a misconfigured run
# fails closed, not open.

on:
  push:
    branches: [main]
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "branding/**"
      - "scripts/system/capture-screenshots.mjs"
      - "scripts/system/seed-demo-data.mjs"
      - "pnpm-lock.yaml"
  schedule:
    # Sundays 06:00 UTC. Safety net so screenshots don't drift more than
    # a week even if the path-filter misses an indirect change.
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

# Turborepo remote cache (Vercel, free). TURBO_TOKEN/TEAM gate it; when
# absent turbo falls back to the local actions/cache.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

concurrency:
  group: screenshots-refresh
  cancel-in-progress: false # let a queued run finish; no point cancelling

jobs:
  refresh:
    name: Capture + commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # create the branch with screenshot diff
      pull-requests: write # open the PR + enable auto-merge
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # write permission needed for the commit-back step. We explicitly
          # set persist-credentials: false (zizmor/artipacked) so the token
          # never leaks into the upload-artifact step later in this job;
          # the commit-back step re-authenticates via $GITHUB_TOKEN inline.
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          apply_brand: true
          # Warm Turbo cache speeds the `pnpm brand:apply` codegen +
          # any downstream pnpm task that this workflow may invoke
          # (currently just the screenshot capture, but turbo's
          # graph-aware fingerprinting makes the warm path noticeably
          # faster on incremental pushes).
          turbo_cache: true

      # Cache the Playwright browsers binary store so `playwright install`
      # below is a near-noop on warm cache. Pre-fix every run downloaded
      # Chromium + deps from scratch (~30s). Same pattern test.yml uses
      # for its Vitest browser-mode + E2E steps; key shared on
      # pnpm-lock.yaml so a Playwright bump in the lockfile invalidates.
      - name: Cache Playwright browsers (screenshots)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (Chromium only)
        run: pnpm --filter ui exec playwright install chromium --with-deps

      - name: Capture screenshots
        id: capture
        env:
          # capture-screenshots.mjs sets HERON_DATA_DIR + HERON_SCREENSHOT_MODE
          # itself when run in managed mode. We don't pre-set them here
          # because the script wants to mkdtemp its own tmpdir.
          CI: "true"
          # The script writes a per-image diff summary here; the PR step reads
          # it to build the "needs review" comment when the ceiling is hit.
          SCREENSHOT_DIFF_SUMMARY: ${{ runner.temp }}/screenshot-diff.json
        run: |
          set -uo pipefail
          # Exit codes (see capture-screenshots.mjs): 0 = ok (no change above
          # the noise floor, or an in-band refresh), 20 = at least one image
          # exceeded the diff ceiling (still written, but must be reviewed by
          # a human, not auto-merged), anything else = a hard error.
          pnpm screenshots
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 20 ]; then
            echo "::error::screenshot capture failed (exit $rc)"
            exit "$rc"
          fi

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet docs/screenshots/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No screenshot drift above the noise floor; nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat docs/screenshots/
          fi

      - name: Open or refresh the single screenshot PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.GH_USER_PAT }}
          GH_REPO: ${{ github.repository }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RC: ${{ steps.capture.outputs.rc }}
          SUMMARY: ${{ runner.temp }}/screenshot-diff.json
        run: |
          set -euo pipefail
          # Exactly ONE screenshot PR ever: a STABLE branch (no run-id),
          # force-pushed each run. An open PR for it updates in place; if none
          # is open we create one. We can't push straight to main (branch
          # protection), and a GITHUB_TOKEN-authored PR triggers NO workflow
          # runs (GitHub suppresses them to avoid recursion) -- so the normal
          # required checks never report and would block forever. For these
          # PNG-only changes the in-workflow diff gate above IS the check, so
          # an in-band result merges via the owner PAT's admin bypass. GitHub
          # auto-signs the squash commit (verified=true), satisfying
          # required_signatures.
          BRANCH="bots/screenshots"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C "$BRANCH"
          git add docs/screenshots/
          git commit \
            -m "chore(screenshots): refresh README PNGs" \
            -m "Auto-generated by .github/workflows/screenshots-refresh.yml."
          # Token-injected push URL so the credential is scoped to this single
          # command and never lands in .git/config (zizmor/artipacked). The
          # bots/* branch isn't main-protected; force-with-lease keeps the one
          # branch fresh without clobbering a concurrent push.
          HOSTLESS_URL="${SERVER_URL#https://}"
          git push --force-with-lease \
            "https://x-access-token:${GH_TOKEN}@${HOSTLESS_URL}/${REPO}.git" "$BRANCH"

          # Reuse the open PR if one exists, else open it.
          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            gh pr create \
              --title "chore(screenshots): refresh README PNGs" \
              --body "Auto-generated by .github/workflows/screenshots-refresh.yml. Gated by an in-workflow visual-diff check; in-band refreshes admin-merge automatically." \
              --base main --head "$BRANCH"
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          fi

          if [ "$RC" = "20" ]; then
            # Over the ceiling: flag for a human and DO NOT merge.
            gh label create "screenshots-needs-review" --color FBCA04 \
              --description "Screenshot refresh exceeded the visual-diff ceiling; needs manual review" \
              --force >/dev/null 2>&1 || true
            gh pr edit "$PR" --add-label "screenshots-needs-review" || true
            BODY="⚠️ One or more screenshots changed more than the configured ceiling, so this PR was **not auto-merged**. Please review the diff and merge manually (or adjust the source) if the change is expected."
            if [ -f "$SUMMARY" ]; then
              TABLE=$(jq -r '.results[] | "- `\(.filename)`: \(((.ratio*10000)|round)/100)% (\(.decision))"' "$SUMMARY" 2>/dev/null || true)
              [ -n "$TABLE" ] && BODY="${BODY}"$'\n\n'"${TABLE}"
            fi
            gh pr comment "$PR" --body "$BODY" || true
            echo "::error::Screenshot diff exceeded the ceiling on PR #${PR}; left open with 'screenshots-needs-review'."
            exit 1
          fi

          # In-band refresh: admin-merge now via the owner PAT. This bypasses
          # the bot-unsatisfiable code-owner review + the checks that never run
          # on a GITHUB_TOKEN PR -- the diff gate already vetted the change.
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::warning::GH_USER_PAT not set -- cannot admin-merge PR #${PR}; left open for manual merge."
          else
            GH_TOKEN="$ADMIN_TOKEN" gh pr merge "$PR" --squash --admin --delete-branch
            echo "::notice::Admin-merged screenshot PR #${PR}."
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshots-refresh-${{ github.run_id }}
          path: docs/screenshots/
          retention-days: 7
