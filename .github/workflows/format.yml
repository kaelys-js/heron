name: Auto-format

# Runs `pnpm format` on every push to main and pushes the result back
# as a separate commit. Eliminates the "format-check failed in CI"
# class of failure entirely — we always commit pre-formatted code
# because the bot fixes it for us when we forget.
#
# Safe-loop rules:
#   • The workflow ignores pushes whose author is `github-actions[bot]`
#     (the identity it uses to push fixes), so it can't trigger itself.
#   • Commits use `[skip ci]` in the subject so Tests + CodeQL + release
#     workflows don't fire on the format-only commit.
#   • Only one Auto-format run per ref at a time (concurrency group),
#     so two close pushes can't race.
#   • If `pnpm format` is a no-op, the workflow exits cleanly without
#     pushing anything.
#
# Why a workflow and not just a lefthook hook: hooks can be bypassed
# with `--no-verify`. CI runs no matter what. This is the safety net.

on:
  push:
    branches: [main]

# Needs `contents: write` so it can push back. No other permissions.
permissions:
  contents: write

concurrency:
  group: auto-format-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  format:
    name: Format + auto-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip when WE pushed the format fix — prevents an infinite loop.
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use a token that can push back. GITHUB_TOKEN has `contents: write`
          # via the permissions block above; that's enough for same-repo push.
          # If you ever protect main with branch protection that requires
          # signed commits, switch to a deploy-key or PAT.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need the full ref to amend / push.
          ref: ${{ github.ref }}
          # Don't persist credentials in the working tree.
          persist-credentials: true
          # Match the depth Tests uses for consistency.
          fetch-depth: 0

      - name: Setup mise (Node + pnpm + Ruby)
        uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run formatter (write mode)
        run: pnpm format

      - name: Check for drift
        id: drift
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "files=$(git status --porcelain | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
            echo "::notice::Formatter touched $(git status --porcelain | wc -l | tr -d ' ') file(s); pushing fix."
            git status --porcelain | head -20
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No format drift — nothing to push."
          fi

      - name: Commit + push fix
        if: steps.drift.outputs.drift == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          FILES='${{ steps.drift.outputs.files }}'
          SUFFIX=$([ "$FILES" -gt 1 ] && echo s)
          git commit -m "style: auto-format ($FILES file$SUFFIX) [skip ci]" \
                     -m "Automated commit by .github/workflows/format.yml — runs \`pnpm format\` and pushes the result so format-check in Tests can't fail on drift."
          git push origin HEAD:${{ github.ref_name }}
