name: Maintain repo features

# Reconciles repo-scope GitHub features that aren't owned by
# apply-github-config.mjs (rulesets + topics + GHAS toggles) and don't
# fit cleanly into brand.json:
#
#   • Deployment environments (production-ios, production-electron,
#     npm-publish, github-pages) with branch policies
#   • Standard issue labels (good first issue, oversize-ok, no-issue, etc.)
#   • Secret-scanning validity checks (toggle attempt)
#
# Replaces the previous local-script flow (gh:apply-features /
# gh:verify-features npm scripts). The reconciler script lives at
# scripts/system/apply-github-features.mjs and is invoked here directly.
#
# Modes:
#   push:main on SSOT paths       → apply
#   schedule (Mon 06:18 UTC)      → apply (idempotent; environments + labels
#                                          drift via the UI more often than
#                                          rulesets do, so weekly apply is
#                                          cheaper than weekly check-then-issue)
#   workflow_dispatch             → apply by default, --check via input
#
# Auth: prefers GH_USER_PAT (fine-grained PAT with `repo` +
# `administration: write`) when set, falls back to GITHUB_TOKEN. The
# fallback can manage labels but cannot create environments --when the
# admin scope is unavailable, environment ops silently no-op.

on:
  push:
    branches: [main]
    paths:
      - "scripts/system/apply-github-features.mjs"
      - ".github/workflows/maintain-features.yml"
  schedule:
    # Weekly apply sweep, Monday 06:18 UTC (5 min after maintain-config,
    # 5 min before maintain-user-features --off-peak + staggered).
    - cron: "18 6 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "apply | check"
        required: false
        default: "apply"

permissions: {}

concurrency:
  group: maintain-features
  cancel-in-progress: false

jobs:
  reconcile:
    name: Reconcile repo features
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # NB: GITHUB_TOKEN cannot grant the `administration` scope (only
      # fine-grained PATs can). Without `GH_USER_PAT`, environment ops
      # (production-ios, production-electron, npm-publish, github-pages
      # branch policies) silently no-op. Labels + validity-checks
      # attempt apply regardless. Land `GH_USER_PAT` for full reconcile.
      # `issues: write` not requested -- this workflow has no drift-issue
      # opening path (unlike maintain-config.yml's schedule branch); the
      # script applies idempotently with no user-facing surface beyond
      # the step summary.

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          install_deps: "true"

      # IMPORTANT ordering: reconcile runs BEFORE og:generate so the
      # Pages enable + environment/label/validity-check reconciliation
      # ships even if PNG generation fails (chromium install issues,
      # disk full, etc.). The PNG regen is a "nice to have" that
      # should never gate the actual reconcile work.
      - name: Reconcile
        env:
          GH_TOKEN: ${{ secrets.GH_USER_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "check" ]; then
            node scripts/system/apply-github-features.mjs --check
          else
            node scripts/system/apply-github-features.mjs
          fi

      - name: Install Playwright chromium for OG generation
        # generate-og-cards.mjs uses Playwright + chromium to render
        # the social-card HTML. Default ubuntu runner doesn't bundle
        # the chromium binary; --with-deps adds the system libs too.
        # Failure here is non-fatal (continue-on-error) -- the
        # reconcile already shipped above; missing PNG just means the
        # artifact upload step (also continue-on-error) is skipped.
        run: pnpm --filter ui exec playwright install --with-deps chromium
        continue-on-error: true

      - name: Regenerate social preview PNG
        # Keeps ui/static/og/default.png fresh so the maintainer can
        # upload it via Settings -> General -> Social preview at any
        # time and pick up the latest brand. GitHub has no public API
        # to push the social preview image; this is the cleanest
        # automation possible until that API ships.
        # continue-on-error because the reconcile already happened
        # and the artifact upload below also handles missing files.
        run: pnpm og:generate
        continue-on-error: true

      - name: Upload social preview PNG as artifact
        # Persists ui/static/og/default.png from the ephemeral runner
        # so the maintainer can download it from the Actions run page
        # + drag into Settings -> Social preview. Skips silently if
        # the PNG didn't generate (e.g. chromium install failed).
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: social-preview-png
          path: ui/static/og/default.png
          if-no-files-found: ignore
          retention-days: 90
