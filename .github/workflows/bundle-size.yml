name: Bundle size
# HP1 -- track client-bundle size on every PR. Hard fail when any
# bundle exceeds the budget configured in `ui/package.json`
# under `"size-limit"`. PR-comment delta vs main was previously
# produced by `andresz1/size-limit-action` but that action is
# fundamentally broken under mise (its internal `pnpm` shim invocation
# loses mise's env, plus its second-checkout-of-`main` flow can't
# resolve our pnpm pin because main's pnpm install isn't activated
# in the same docker layer). Direct invocation is simpler + reliable
# AND gives us a deterministic exit-code-based gate; we just lose the
# magic comment. Re-evaluate once size-limit-action ships a mise-
# aware release or we migrate to a maintained fork.
on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/static/**"
      - "ui/package.json"
      - "ui/vite.config.ts"
      - "pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bundle-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size:
    name: Compare bundle size
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          apply_brand: true
          # Restore the Turbo task-graph cache so an unchanged source
          # tree skips the 5-7min cold build entirely. The two prior
          # "Compare bundle size: failure" events on this branch were
          # both runner-side shutdowns DURING the build window
          # (89a42ea: "operation was canceled.", 66006a7: "runner
          # received a shutdown signal."). Shorter build = smaller
          # cancellation window.
          turbo_cache: true
          # Skip the cryptography wheel install -- bundle-size never
          # boots the orchestrator (it just runs `pnpm --filter ui size`),
          # so the ~30s pip install was pure waste. The setup-toolchain
          # composite installs Python deps by default for workflows
          # that DO boot the dashboard.
          install_python_deps: false

      - name: Build dashboard (prod bundle)
        run: pnpm --filter ui build

      - name: size-limit
        # Direct invocation. The package.json `size` script wraps
        # `size-limit`; pass `--json` so we can post-process if we
        # want PR comments later. `size-limit` exits non-zero when
        # any bundle exceeds its configured budget -> CI red.
        working-directory: ui
        run: pnpm size --json | tee size-report.json

      - name: Upload size report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: size-report
          path: ui/size-report.json
          retention-days: 14
