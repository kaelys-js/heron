name: Tests

# Run on PR + every push to main. Concurrency cancels in-flight runs
# for the same ref so rapid pushes don't burn CI minutes.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # manual re-run

# Least-privilege: this workflow only reads source + writes statuses /
# annotations. No release artefacts, no Pages, no packages.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Lint + typecheck + smoke (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Skip interactive prompts in CI.
      CI: "true"
      # Deterministic seed for the multi-user verifier.
      BETTER_AUTH_SECRET: ci-verifier-secret-do-not-use-in-prod-${{ github.run_id }}
      # Tell tools to use coloured output even when piped.
      FORCE_COLOR: "3"
      # GitHub Actions runners deprecated Node 20 (Sept 2026); v24 becomes
      # the default Jun 2026. Opt every JS-based action (actions/cache@v4,
      # jdx/mise-action@v2, etc.) into Node 24 NOW so we get the security
      # patches + skip the deprecation banner. This is the Node that runs
      # the ACTION ITSELF — separate from the Node we install via mise to
      # run our application code (Node 26.1.0).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Release-Please + commit-message inspection both need full
          # history; the 5-second cost is worth it.
          fetch-depth: 0
          # Don't persist the workflow token — defence in depth.
          persist-credentials: false

      # mise installs Node + pnpm + Ruby pinned in `.mise.toml`. Single
      # source of truth; no risk of drift between local + CI versions.
      - name: Setup mise (Node + pnpm + Ruby)
        uses: jdx/mise-action@v4
        with:
          experimental: true
          # Cache mise's tool downloads — drastically faster repeat runs.
          cache: true

      # Cache pnpm's content-addressable store so repeat CI on the
      # same lockfile is sub-second. `pnpm install --frozen-lockfile`
      # then just symlinks from cache.
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ui/.turbo
            ui/electron/.turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Root + workspace installs — pnpm honours pnpm-workspace.yaml and
      # installs everything in one pass. --frozen-lockfile fails if
      # pnpm-lock.yaml is stale — forcing PRs to commit lockfile changes.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Static checks (fast, fail-fast) ──────────────────────────
      - name: Format check (biome + prettier-svelte)
        run: pnpm format:check

      - name: svelte-check (ui type-check)
        run: pnpm -C ui exec svelte-check --tsconfig ./tsconfig.json --threshold error

      - name: tsgo (electron type-check)
        run: pnpm -C ui/electron exec tsgo --noEmit -p tsconfig.json

      # ── Behavioural checks ───────────────────────────────────────
      - name: Quick test suite
        run: pnpm test:quick

      # apply-brand regenerates the platform icons + propagated configs
      # that verify-capacitor inspects. Icons (.png/.icns/.ico) live
      # under ui/electron/build/ which is .gitignored, so CI must
      # produce them before the verifier runs.
      #
      # Tooling on Ubuntu runners:
      #   • imagemagick → `magick` command for .ico
      #   • icnsutils   → `png2icns` for .icns (replaces macOS-only iconutil)
      # The icon generator (native/icons/generate-icons.mjs) detects
      # which tool is available and falls back gracefully.
      - name: Install icon-generation toolchain (Linux only)
        run: sudo apt-get update && sudo apt-get install -y imagemagick icnsutils

      - name: Apply brand (generate icons + propagated configs)
        run: pnpm brand:apply

      - name: Brand + native consistency
        run: pnpm verify:capacitor

      - name: Multi-user verifier
        run: pnpm verify:multi-user

      - name: Pipeline tracker hygiene
        run: pnpm verify

      # ── Build ────────────────────────────────────────────────────
      # Verifies adapter-node + electron + brand tasks all succeed.
      # Cached via turbo so repeat runs on green PRs are ~5s.
      - name: Build (turbo)
        run: pnpm build

      # ── Audit ────────────────────────────────────────────────────
      # `pnpm audit` exits non-zero on moderate-or-worse via .npmrc.
      # If a new CVE lands upstream, this job goes red so we see it
      # before users do.
      - name: Security audit (pnpm)
        run: pnpm audit --audit-level moderate
        continue-on-error: false
