name: Tests

# Run on PR + every push to main. Concurrency cancels in-flight runs
# for the same ref so rapid pushes don't burn CI minutes.
#
# Three parallel jobs:
#   ts     -- ubuntu-latest -- typecheck + format + Vitest matrix + Codecov
#   ios    -- macos-15      -- Fastlane test_ci on iPhone 17 Pro Max sim
#   audit  -- ubuntu-latest -- pnpm audit gate
#
# `coverage` job (depends on ts + ios) downloads both artifacts and posts
# a single Codecov PR comment with combined + per-flag deltas.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      record_mode:
        description: 'Set true to record iOS snapshot baselines + upload __Snapshots__ as an artifact (H.E.3 path B).'
        type: boolean
        default: false
        required: false

# Least-privilege: this workflow only reads source + writes statuses /
# annotations + uploads coverage. No release artefacts, no Pages, no packages.
# id-token: write is required for Codecov OIDC upload (G12) -- replaces the
# CODECOV_TOKEN secret. Works on fork PRs (which can't see secrets). Declared
# per-job below so it isn't inherited by jobs that don't upload coverage.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path-change detector -- decides whether downstream macOS jobs run.
  # ─────────────────────────────────────────────────────────────────
  # macos-15 is billed at 10× ubuntu minutes. A 7-min iOS test_ci run
  # = ~70 ubuntu-min equivalent. When a PR doesn't touch iOS-affecting
  # files (e.g. a docs-only or pure-TS change), allocating macos-15
  # and downloading Xcode caches just to no-op is pure waste.
  #
  # This job runs in ~10s on ubuntu, emits `ios=true|false`, and the
  # ios job below uses dynamic `runs-on` to pick macos-15 only when
  # needed. The ios job's `name:` is preserved so the required-check
  # context still reports a status on every PR (otherwise branch
  # protection would treat a skipped job as missing and block merge).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # On pull_request events `steps.filter.outputs.X` is populated by
      # dorny/paths-filter; on push/schedule/workflow_dispatch the
      # filter step is skipped and `steps.force-true.outputs.X` provides
      # 'true' for every key. GitHub Actions evaluates `||` lazily, so
      # the first non-empty value wins.
      ios: ${{ steps.filter.outputs.ios || steps.force-true.outputs.ios }}
      android: ${{ steps.filter.outputs.android || steps.force-true.outputs.android }}
      ts: ${{ steps.filter.outputs.ts || steps.force-true.outputs.ts }}
      format: ${{ steps.filter.outputs.format || steps.force-true.outputs.format }}
      audit: ${{ steps.filter.outputs.audit || steps.force-true.outputs.audit }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Filter
        # dorny/paths-filter v4.0.1 -- pinned by SHA per repo policy
        # (verify-workflow-pins.yml gates this). v4 runs on Node 24;
        # v3.0.2 was on Node 20 and tripped the runner's "Node.js 20
        # actions are deprecated" annotation (run 26183910563).
        #
        # Each `<key>: true` output gates a downstream job that runs in
        # full if any path under that key changed. False = skip-stub
        # mode -- the job still reports green under its required-check
        # name (branch protection sees it pass) but only runs a ~30s
        # notice step. On push to main / scheduled / manual events
        # dorny/paths-filter is bypassed: the `false-by-default` job
        # below sets every output to 'true' so full pipelines run.
        # Net effect: PR-time savings on docs-only / single-ecosystem
        # bumps; main-branch + cron always gets the full safety net.
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            ios:
              # Swift sources, xcodeproj, fastlane, icons, brand
              - 'ui/ios/**'
              # Brand propagates into Brand.swift + Info.plist
              - 'branding/**'
              # add-xcode-targets.rb owns the AppTests/AppUITests targets
              - 'scripts/native/add-xcode-targets.rb'
              # When THIS workflow changes the ios job's behaviour, force a run
              - '.github/workflows/test.yml'
              # When capacitor sync into ios changes -- still iOS impact
              - 'ui/capacitor.config.ts'
              - 'ui/static/**'
              # Lockfile drift can change native bundle resolution
              - 'pnpm-lock.yaml'
            ts:
              # TS / Svelte / JS sources -- everything Vitest + svelte-check exercise
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.svelte'
              # Vite + Vitest config drives the test runner config
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'vitest.base.ts'
              - 'ui/vite.config.ts'
              - 'ui/vitest.config.ts'
              - 'ui/vitest.base.ts'
              - 'ui/electron/vitest.config.ts'
              # Test-setup + helper changes can affect every test
              - 'ui/src/test-setup.ts'
              - 'ui/src/test-helpers/**'
              # Dep / lockfile changes can shift the test surface
              - '**/package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              # Brand propagation feeds into the generated brand.ts that
              # ui/electron + tests import
              - 'branding/**'
              # Validators / static-check scripts the ts job runs
              - 'scripts/system/validate-*.mjs'
              - 'scripts/system/validate-plists.py'
              # Schema files validated by validate-json-schemas.mjs
              - '**/*.json'
              - '**/*.jsonc'
              # When THIS workflow changes the ts job's behaviour, force a run
              - '.github/workflows/test.yml'
            format:
              # Python / Ruby / Shell / Kotlin / Go sources for the
              # multi-language linters in the format job
              - '**/*.py'
              - '**/*.rb'
              - '**/*.sh'
              - '**/*.bash'
              - '**/*.go'
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.gradle*'
              # YAML for yamllint + actionlint
              - '**/*.yml'
              - '**/*.yaml'
              # TOML for taplo
              - '**/*.toml'
              # Ruby manifest for rufo (Gemfile is extensionless)
              - '**/Gemfile'
              - '**/Gemfile.lock'
              # Plists + XML / SVG / storyboards for the Apple validators
              - '**/*.plist'
              - '**/*.entitlements'
              - '**/*.xcprivacy'
              - '**/*.svg'
              - '**/*.storyboard'
              # .env templates for dotenv-linter
              - '**/.env*.example'
              # Tiny-config files for validate-tiny-configs
              - '.gitattributes'
              - '.npmrc'
              - '.actrc'
              - 'LICENSE'
              - 'robots.txt'
              # When THIS workflow changes the format job's behaviour, force a run
              - '.github/workflows/test.yml'
            audit:
              # pnpm audit only cares about package-state files
              - '**/package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              # When THIS workflow changes the audit job's behaviour, force a run
              - '.github/workflows/test.yml'
            android:
              # Kotlin / Java sources + Gradle build scripts
              - 'ui/android/**'
              # Brand propagates into Brand.kt + AndroidManifest
              - 'branding/**'
              # When THIS workflow changes the android job's behaviour, force a run
              - '.github/workflows/test.yml'
              # Capacitor sync regenerates Android Gradle artifacts
              - 'ui/capacitor.config.ts'
              # Lockfile drift can change native bundle resolution
              - 'pnpm-lock.yaml'

      # Non-PR events (push to main, schedule, workflow_dispatch) bypass
      # the path filter entirely. Set every output to 'true' so the
      # downstream gates pass through and the full pipeline runs. This
      # preserves the security baseline on main + the weekly cron safety
      # net regardless of which paths the merge commit touched.
      - name: Force-true on non-PR events
        if: github.event_name != 'pull_request'
        id: force-true
        run: |
          {
            echo "ios=true"
            echo "android=true"
            echo "ts=true"
            echo "format=true"
            echo "audit=true"
          } >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────
  # TS / Svelte / Server / Electron -- Vitest + svelte-check + audit
  # ─────────────────────────────────────────────────────────────────
  ts:
    name: TS — typecheck + Vitest + coverage
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload (G12)
    env:
      CI: "true"
      BETTER_AUTH_SECRET: ci-verifier-secret-do-not-use-in-prod-${{ github.run_id }}
      FORCE_COLOR: "3"
      # Turborepo remote cache (Vercel, free). TURBO_TOKEN/TEAM gate it; when
      # absent turbo falls back to the local actions/cache.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      # Skip-stub. When the path filter says no TS-touching files changed
      # in this PR, this is the ONLY step that runs. The job reports
      # success under the required-check context "TS -- typecheck +
      # Vitest + coverage" without spending the ~5min Vitest matrix.
      # Branch protection sees the green check and merge proceeds.
      - name: Skip — no TS-relevant paths changed
        if: needs.changes.outputs.ts != 'true'
        run: |
          echo "::notice::TS Tests skipped — no changes under TS/Svelte/JS/JSON/lockfile/config paths."
          {
            echo "### ⏭️ TS Tests skipped"
            echo ""
            echo "No paths matching the \`ts\` filter changed in this PR."
            echo "See \`changes\` job in \`.github/workflows/test.yml\` for the full list."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Harden runner
        if: needs.changes.outputs.ts == 'true'
        # G4 -- defense-in-depth for the TS test runner. Audit mode for
        # rollout; flip to block after observing legitimate endpoints
        # (pnpm registry, codecov, etc.).
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        if: needs.changes.outputs.ts == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise (Node + pnpm + Ruby)
        if: needs.changes.outputs.ts == 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: Resolve pnpm store path
        if: needs.changes.outputs.ts == 'true'
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        if: needs.changes.outputs.ts == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache turbo
        # G22 -- multi-tier restore-keys. Pre-fix the key was `turbo-{os}-
        # {sha}` which always missed on a new commit; only the
        # `turbo-{os}-` fallback hit (any branch's last build). Now we
        # try most-specific → progressively broader keys, giving ~50%
        # warm hits on the same branch and ~100% on the same PR
        # incremental push. The `${{ github.sha }}` SAVE key still
        # ensures fresh writes don't pollute older caches.
        if: needs.changes.outputs.ts == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .turbo
            ui/.turbo
            ui/electron/.turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Cache Vitest
        if: needs.changes.outputs.ts == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ui/.vitest-cache
            ui/coverage
          key: vitest-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'ui/vitest.config.ts', 'ui/vitest.base.ts') }}
          restore-keys: |
            vitest-${{ runner.os }}-

      - name: Cache Playwright browsers
        if: needs.changes.outputs.ts == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Pip wheel cache for the cryptography install below. Pre-fix
      # every PR re-downloaded the (heavy) cryptography wheels cold
      # (~1-2 min on cold cache). The --require-hashes lockfile keeps
      # the install tamper-evident; the wheel cache just makes the
      # warm path near-instant.
      - name: Cache pip wheels (cryptography etc.)
        if: needs.changes.outputs.ts == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        if: needs.changes.outputs.ts == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies (cryptography etc.)
        # The dashboard's orchestrator spawns scripts/scan/*.py +
        # scripts/apply/*.py children that import `cryptography` via
        # scripts/lib/user_secrets.py. Without this step the children
        # crash with ModuleNotFoundError at boot, polluting browser
        # console (visible in the e2e Playwright step + breaks
        # `errors-in-console` Lighthouse assertion).
        # `python -m pip` guarantees the mise-managed interpreter is
        # the one we install into.
        if: needs.changes.outputs.ts == 'true'
        run: |
          # `--require-hashes` makes the install tamper-evident -- pip refuses
          # to download anything whose archive hash isn't in
          # `scripts/requirements.txt`. Satisfies Scorecard's
          # PinnedDependenciesID; matches the lighthouse.yml step.
          # No `pip install --upgrade pip` -- the mise-managed interpreter
          # already ships a recent pip, and an unpinned upgrade would itself
          # trip PinnedDependenciesID.
          python -m pip install --require-hashes -r scripts/requirements.txt
          python -c "from cryptography.hazmat.primitives.ciphers.aead import AESGCM; print('cryptography import OK')"

      # Playwright browsers are required for the ui-component project.
      # The vitest workspace's ui-component project runs against BOTH
      # chromium and webkit (so pointer-event gestures get tested under
      # Safari too) -- install both. The cache step above persists
      # ~/.cache/ms-playwright across runs; this command is a no-op on
      # a cache hit.
      - name: Install Playwright browsers (chromium + webkit)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm --filter ui exec playwright install chromium webkit --with-deps

      # ── Static checks (fast, fail-fast) ──────────────────────────
      - name: Format check (biome + prettier-svelte)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm format:check

      - name: Validate JSON schemas
        # scripts/system/validate-json-schemas.mjs auto-discovers every
        # $schema-annotated JSON/JSONC and validates against the
        # referenced schema via ajv. Catches typos / unknown keys
        # BEFORE the consuming tool's runtime would surface them.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm validate:json-schemas

      - name: Validate format-config sync
        # Asserts .editorconfig + biome.jsonc + .prettierrc.json agree on
        # every overlapping setting (indent / line-width / quote style /
        # trailing commas / etc). Drift between these three configs is
        # the most common "editor formats it one way, hook reformats it
        # another" surprise. Pre-commit catches it on the contributor's
        # machine when one of the three is staged; this CI step is the
        # belt-and-braces full-repo check.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm validate:format-sync

      - name: markdownlint (relaxed config — real bugs only)
        # markdownlint-cli2 across every .md file with the relaxed config
        # in .markdownlint-cli2.jsonc. Catches bare URLs, malformed
        # tables, missing alt text, broken links, etc. Style rules
        # (line length / heading style / list bullets) are intentionally
        # disabled -- see the file header for the full rule rationale.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm validate:markdown

      - name: Exact-version pins (no ^ / ~ / partial versions)
        # Rejects any non-exact version spec anywhere version specifiers
        # can hide: package.json (root + every workspace) + .mise.toml
        # [tools]. Exact pinning + lockfile = reproducible builds + a
        # supply-chain attack via malicious-publish can't escalate to a
        # new prod build without an explicit version-bump PR.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm validate:exact-versions

      - name: Version-source sync (release-please vs manual bumps)
        # Asserts the 5 places we store the project version stay equal:
        # package.json (root + ui + electron) + VERSION (plain-text, the
        # update-system.mjs probe target) + .release-please-manifest.
        # release-please auto-bumps all 5 on real releases; this catches
        # manual / partial bumps that bypass the release-please PR flow.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm validate:version-sync

      - name: Lockfile integrity (G21)
        # Native pnpm-lock.yaml v9 validator. lockfile-lint@4 cannot
        # parse v9 (the YAML structure diverged from yarn-lock around
        # v8 and the maintainers do not plan to add pnpm support).
        # This step catches the same four supply-chain risks
        # lockfile-lint covered: non-HTTPS tarballs, missing integrity
        # hashes, git+ssh refs, and `file:` protocol abuse. Pairs with
        # validate:exact-versions above (which asserts package.json
        # specifiers are exact) - this asserts the lockfile resolves
        # them to safe, verifiable sources.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm validate:lockfile

      - name: No leftover merge-conflict markers (G28)
        # sync-upstream.yml's bot writes conflict markers into the
        # tree when an upstream-merge conflicts (so the conflict
        # surfaces in the PR diff). If someone hits "Squash + merge"
        # without resolving, the markers land in main and ship.
        # This CI step blocks any commit containing `<<<<<<<` /
        # `=======` / `>>>>>>>` triple-character marker lines in
        # source files. Skips docs that intentionally explain merge
        # conflicts.
        if: needs.changes.outputs.ts == 'true'
        run: |
          set -euo pipefail
          if git grep -l -E '^(<{7}|={7}|>{7})( |$)' -- \
              ':!docs/**/*.md' ':!**/CHANGELOG.md' ':!**/*.test.*' \
              2>/dev/null
          then
            echo "::error::Tracked file(s) contain merge-conflict markers — do not merge until resolved."
            exit 1
          fi
          echo "✓ no conflict markers"
          # HP10 -- surface in Actions Summary tab
          {
            echo "### ✅ No merge-conflict markers"
            echo
            echo "All tracked source files are clean of \`<<<<<<<\`/\`=======\`/\`>>>>>>>\` triples."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: License compliance (G32)
        # Heron ships under MIT and bundles Electron. Any GPL/AGPL/LGPL
        # transitive would taint the binary's license. The
        # dependency-review-action already blocks NEW GPL deps in PRs;
        # this check catches GPL deps that already lurk in the existing
        # graph (e.g. a transitive upgrade that switched license).
        # Production deps only -- devDeps may include GPL CLI tooling.
        if: needs.changes.outputs.ts == 'true'
        run: |
          pnpm licenses list --prod --json > licenses.json
          node -e '
            const data = JSON.parse(require("fs").readFileSync("licenses.json", "utf8"));
            const banned = /(?:^|\b)(AGPL|GPL-2\.0|GPL-3\.0|LGPL|SSPL|Commons-Clause)(?:\b|$)/i;
            const offenders = [];
            for (const [licenseKey, pkgs] of Object.entries(data)) {
              if (!banned.test(licenseKey)) continue;
              for (const p of pkgs) offenders.push(p.name + "@" + p.versions[0] + " (" + licenseKey + ")");
            }
            if (offenders.length) {
              console.error("::error::License compliance: banned licenses found in prod deps:");
              for (const o of offenders) console.error("  - " + o);
              process.exit(1);
            }
            console.log("✓ no banned licenses in prod deps");
          '

      - name: oxlint (Rust-based JS/TS linter — all rules disabled)
        # All rules currently OFF in .oxlintrc.jsonc per the user's
        # "wire it up but disable everything for now" directive.
        # Running anyway catches parse-level failures (~50 ms full-repo)
        # and keeps the lint-infrastructure live for incremental rollout.
        if: needs.changes.outputs.ts == 'true'
        run: pnpm lint

      - name: Typecheck (svelte-check + tsgo, turbo-cached)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm exec turbo run check

      # ── Behavioural checks ───────────────────────────────────────
      # Run the full Vitest matrix (ui-unit + ui-server + ui-component
      # + ui-routes + ui-integration + electron) with coverage. Coverage
      # threshold (70% lines / 65% branches / per-file 50% floor) is
      # enforced by vitest.config.ts -- falling below trips this step.
      - name: Vitest matrix (with coverage)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm test:coverage

      - name: Coverage summary (HP10)
        if: needs.changes.outputs.ts == 'true' && (always() && hashFiles('ui/coverage/coverage-summary.json') != '')
        run: |
          node -e '
            const s = require("./ui/coverage/coverage-summary.json").total;
            const fmt = (k) => k.toFixed(1) + "%";
            console.log("## 📊 Coverage");
            console.log("");
            console.log("| Metric | Coverage |");
            console.log("|---|---|");
            console.log("| Statements | " + fmt(s.statements.pct) + " (" + s.statements.covered + "/" + s.statements.total + ") |");
            console.log("| Branches   | " + fmt(s.branches.pct)   + " (" + s.branches.covered + "/" + s.branches.total + ") |");
            console.log("| Functions  | " + fmt(s.functions.pct)  + " (" + s.functions.covered + "/" + s.functions.total + ") |");
            console.log("| Lines      | " + fmt(s.lines.pct)      + " (" + s.lines.covered + "/" + s.lines.total + ") |");
          ' >> "$GITHUB_STEP_SUMMARY"

      - name: Assert lcov.info exists (Codecov gate)
        # Pre-codecov guard. The codecov-action below is gated on
        # hashFiles() being non-empty -- if the file is MISSING, the
        # upload silently skips and the Codecov badge stays "unknown".
        # This step turns "missing lcov.info" into a hard CI failure
        # so a vitest config drift (reporter list ignored, wrong
        # path, etc.) surfaces immediately instead of letting Codecov
        # display stale data forever.
        if: needs.changes.outputs.ts == 'true'
        run: |
          if [ ! -s ui/coverage/lcov.info ]; then
            echo "::error::ui/coverage/lcov.info missing or empty after test:coverage."
            echo "::error::Check that vitest config emits the 'lcov' reporter."
            echo "::error::Try: pnpm --filter ui exec vitest run --coverage --coverage.reporter=lcov --passWithNoTests"
            ls -la ui/coverage/ || true
            exit 1
          fi
          echo "✓ lcov.info present: $(wc -l < ui/coverage/lcov.info) lines"

      - name: Upload coverage to Codecov (ts flag)
        # G12 -- OIDC + fail_ci_if_error. OIDC means no CODECOV_TOKEN
        # rotation, no token leakage risk, and the upload works on PRs
        # from forks (which can't see secrets). fail_ci_if_error: true
        # turns silent upload skips into real CI failures so the
        # coverage gate is enforced -- pre-fix a broken upload silently
        # passed.
        if: needs.changes.outputs.ts == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ui/coverage/lcov.info
          flags: ts
          name: ts-coverage
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

      # Electron main-process coverage as a SEPARATE Codecov flag. The
      # `pnpm test:coverage` turbo task already ran electron's vitest
      # (per ui/electron/package.json::test:coverage), so the lcov.info
      # is on disk. Without this upload, electron coverage would either
      # be invisible OR rolled into the `ts` flag -- masking regressions
      # on the IPC bridge / brand-watcher / auto-updater surfaces.
      #
      # Fail-fast gate: previously the upload's `if:` short-circuited
      # when lcov.info was missing, which would silently green the job
      # if the electron test step had failed to emit coverage. We now
      # assert presence BEFORE the upload + drop the hashFiles guard so
      # any breakage surfaces here rather than at codecov upload time.
      - name: Assert electron lcov.info exists (Codecov gate)
        if: needs.changes.outputs.ts == 'true'
        run: |
          if [ ! -s ui/electron/coverage/lcov.info ]; then
            echo "::error::ui/electron/coverage/lcov.info missing or empty after test:coverage."
            exit 1
          fi
          echo "OK electron lcov.info present"

      - name: Upload coverage to Codecov (electron flag)
        if: needs.changes.outputs.ts == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ui/electron/coverage/lcov.info
          flags: electron
          name: electron-coverage
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

      # apply-brand regenerates the platform icons + propagated configs
      # that verify-capacitor inspects. Icons (.png/.icns/.ico) live
      # under ui/electron/build/ which is .gitignored, so CI must
      # produce them before the verifier runs.
      - name: Install icon-generation toolchain (Linux only)
        if: needs.changes.outputs.ts == 'true'
        run: sudo apt-get update && sudo apt-get install -y imagemagick icnsutils

      - name: Apply brand (generate icons + propagated configs)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm brand:apply

      # ── Build ────────────────────────────────────────────────────
      - name: Build (turbo)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm build

      # ── E2E (Playwright against prod build via vite preview) ─────
      # Spec lives under ui/e2e/; playwright.config.ts boots `vite
      # preview` with the already-built static bundle, runs the full
      # spec suite across 5 browser projects: chromium, webkit,
      # firefox, mobile-chrome (Pixel 7), mobile-safari (iPhone 15).
      # Each project gets a fresh context so spec isolation holds.
      # CI=1 enables retry-on-flake + trace-on-failure for diagnostics;
      # workers=2 in the config lets each browser engine boot in
      # parallel so wall time stays ~1.5x single-browser instead of 5x.
      - name: Install Playwright browsers (all 5 engines)
        if: needs.changes.outputs.ts == 'true'
        run: pnpm --filter ui exec playwright install --with-deps chromium webkit firefox

      - name: E2E (Playwright matrix across chromium, webkit, firefox, mobile-chrome, mobile-safari)
        if: needs.changes.outputs.ts == 'true'
        env:
          CI: "1"
          # The preview server (booted by playwright.config.ts) must
          # see this var so the /api/auth/e2e-login bypass endpoint
          # resolves (it 404s without HERON_E2E_DATA_DIR). The fixtures
          # in ui/e2e/fixtures/auth-fixtures.ts mint a bearer token via
          # that endpoint; without it every authenticatedPage spec 401s.
          HERON_E2E_DATA_DIR: /tmp/heron-e2e-ci
        run: pnpm --filter ui test:e2e

      - name: Upload Playwright trace + screenshots on failure
        if: needs.changes.outputs.ts == 'true' && (failure() && hashFiles('ui/playwright-report/**') != '')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            ui/playwright-report/
            ui/test-results/
          retention-days: 14


      # Upload coverage as a workflow artifact so the `coverage-comment.yml`
      # sticky-comment workflow (triggered by workflow_run after this run
      # completes) can download + scan it. Codecov uploads the same file
      # for its own sunburst; this artifact is for the in-repo sticky.
      - name: Upload TS coverage artifact for sticky-comment workflow
        if: needs.changes.outputs.ts == 'true' && always() && hashFiles('ui/coverage/lcov.info') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-ts
          path: |
            ui/coverage/lcov.info
            ui/coverage/coverage-summary.json
          retention-days: 14
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # iOS -- Fastlane test_ci on macOS-15 (Xcode 16, Swift 5.9+)
  # ─────────────────────────────────────────────────────────────────
  # Runs XCTest + XCUITest + snapshot tests across AppTests, AppUITests,
  # WidgetTests, WatchTests. xcov produces a Cobertura report consumed by
  # the codecov upload step below (separate `ios` flag from the `ts` flag).
  ios:
    name: iOS — XCTest + XCUITest + Snapshot
    needs: changes
    # [user-approved-deferral] TASK-9 in TODO-INSTRUCTIONS.md.
    # iOS job disabled entirely. Re-enable after fixing the
    # Fastfile + slather + check-ios-coverage chain end-to-end.
    if: ${{ vars.ENABLE_DISABLED_JOB == 'true' }}
    # `runs-on` is FIXED at macos-15. GitHub evaluates `runs-on` at
    # workflow-PARSE time, before any job has run -- so
    # `needs.changes.outputs.X` is not available in this context
    # (confirmed via startup_failure on runs 26179165782 and 26179613200).
    # Only parse-time contexts (vars, inputs, matrix) work for runs-on.
    #
    # Optimisation strategy here: macos-15 is always ALLOCATED
    # (~30s provisioning = ~5 ubuntu-min equivalent per PR), but the
    # expensive 4-5min xcodebuild build + 2min post-processing is gated
    # on `needs.changes.outputs.ios == 'true'` via the `if:` filter on
    # every subsequent step. When no iOS-affecting paths changed, only
    # the "Skip iOS" notice step runs -- job total ~30-45s.
    #
    # Net savings on non-iOS PRs: ~7min of macos-15 build work skipped =
    # ~70min ubuntu-equivalent saved per such PR. Worth the ~5ubuntu-min
    # provisioning overhead.
    runs-on: macos-15
    # 5 test schemes run sequentially (AppTests + WidgetTests +
    # AppLiveActivityTests + AppShareExtensionTests on iOS sim,
    # WatchTests on watchOS sim) + xcov per scheme + slather aggregator.
    # Cold sim boot is ~30s per platform; tests each take ~5s. 60min
    # buys headroom for the first cold run after a runner-image bump.
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload (G12)
    env:
      CI: "true"
      FORCE_COLOR: "3"
      # Pinned Xcode version -- must match .mise.toml's swift entry. When
      # we bump Xcode, this gets bumped too. Only honoured on macos-15.
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      # ── Short-circuit ────────────────────────────────────────────
      # When no iOS-affecting paths changed, this is the ONLY step that
      # runs. The job reports success on the required-check context
      # "iOS -- XCTest + XCUITest + Snapshot" without spending macOS
      # minutes. Branch protection sees a green check; merge proceeds.
      - name: Skip iOS — no iOS-relevant paths changed
        if: needs.changes.outputs.ios != 'true'
        run: |
          echo "::notice::iOS test_ci skipped — no changes under ui/ios/**, branding/**, scripts/native/add-xcode-targets.rb, ui/capacitor.config.ts, ui/static/**, pnpm-lock.yaml, or .github/workflows/test.yml."
          {
            echo "### ⏭️ iOS test_ci skipped"
            echo ""
            echo "No iOS-affecting paths changed in this PR. Re-running the"
            echo "macOS-15 xcodebuild + simulator suite would cost ~7 min of"
            echo "macOS time (10× billing) for no signal."
            echo ""
            echo "Affecting paths: \`ui/ios/**\`, \`branding/**\`,"
            echo "\`scripts/native/add-xcode-targets.rb\`,"
            echo "\`ui/capacitor.config.ts\`, \`ui/static/**\`,"
            echo "\`pnpm-lock.yaml\`, \`.github/workflows/test.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Harden runner
        if: needs.changes.outputs.ios == 'true'
        # G4 -- iOS test runner. xcodebuild reaches sigverify + Apple's
        # CDN for simulators; we want to see exactly what before
        # tightening to block.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        if: needs.changes.outputs.ios == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise (Node + pnpm + Ruby + Swift)
        if: needs.changes.outputs.ios == 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: Resolve pnpm store path
        if: needs.changes.outputs.ios == 'true'
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        if: needs.changes.outputs.ios == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache Xcode DerivedData
        if: needs.changes.outputs.ios == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ runner.os }}-${{ hashFiles('ui/ios/App/App.xcodeproj/project.pbxproj', 'ui/ios/App/Package.resolved') }}
          restore-keys: |
            derived-data-${{ runner.os }}-

      - name: Cache SPM
        if: needs.changes.outputs.ios == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('ui/ios/App/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache Bundler gems (Fastlane + slather + cocoapods-utils)
        # Fastlane + slather + dependencies installs ~25 gems on every
        # cold cache. The Gemfile.lock hash uniquely identifies the
        # resolved set, so a hit means `bundle install` is a sub-second
        # no-op instead of a ~30s install. ~/.bundle is the per-user
        # bundler config dir; ~/.gem is mise-Ruby's gem-install target.
        if: needs.changes.outputs.ios == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.bundle
            ~/.gem
          key: bundler-${{ runner.os }}-${{ hashFiles('ui/ios/App/Gemfile.lock') }}
          restore-keys: |
            bundler-${{ runner.os }}-

      - name: Install dependencies
        if: needs.changes.outputs.ios == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install SwiftLint + SwiftFormat (Brewfile)
        if: needs.changes.outputs.ios == 'true'
        # On macos-15 runners both formulae are pre-installed; `brew
        # install <pkg>` then emits a warning ("already installed and
        # up-to-date") that surfaces as a yellow annotation on the iOS
        # job. `brew list` first lets us short-circuit silently when
        # the pkg is already present, only invoking install on the cold-
        # cache code path (custom self-hosted runners, future Brewfile
        # additions).
        run: |
          for pkg in swiftlint swiftformat; do
            if ! brew list "$pkg" >/dev/null 2>&1; then
              brew install "$pkg"
            fi
          done

      - name: SwiftLint (strict)
        if: needs.changes.outputs.ios == 'true'
        run: swiftlint --strict --quiet ui/ios/App

      - name: Apply brand
        if: needs.changes.outputs.ios == 'true'
        run: pnpm brand:apply

      - name: Build static web assets (Capacitor webDir = ui/build/static)
        if: needs.changes.outputs.ios == 'true'
        # cap sync ios copies the SvelteKit static-adapter output into the
        # iOS bundle. Without this step, capacitor errors with "Could not
        # find the web assets directory: ./build/static".
        run: pnpm --filter ui build:static

      - name: Capacitor sync iOS
        if: needs.changes.outputs.ios == 'true'
        run: pnpm --filter ui exec cap sync ios

      - name: Bundle install (Fastlane gems)
        if: needs.changes.outputs.ios == 'true'
        working-directory: ui/ios/App
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane test_ci (XCTest + XCUITest)
        if: needs.changes.outputs.ios == 'true'
        working-directory: ui/ios/App
        env:
          # H.E.3 path B -- when triggered via
          # `gh workflow run test.yml -f record_mode=true`, the iOS
          # snapshot tests write fresh PNGs to __Snapshots__/ rather
          # than diff against committed baselines. The next step
          # uploads those PNGs as a workflow artifact for download +
          # local commit.
          RECORD_MODE: ${{ github.event.inputs.record_mode == 'true' && '1' || '' }}
        run: bundle exec fastlane test_ci

      - name: Upload xcresult bundle
        if: always() && needs.changes.outputs.ios == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: xcresult-bundle
          path: ui/ios/App/fastlane/test_output/
          retention-days: 14

      # H.E -- if WidgetSnapshotTests / RootViewTests recorded new
      # baselines (typically on a manual `RECORD_MODE=1` run), surface
      # them as an artifact so a developer can download + commit them
      # without needing the pinned local sim. Committed baselines live
      # under __Snapshots__/ next to the test sources; this upload only
      # exists for the recording flow.
      - name: Upload iOS snapshot baselines
        if: always() && needs.changes.outputs.ios == 'true' && (hashFiles('ui/ios/App/WidgetTests/__Snapshots__/**') != '' || hashFiles('ui/ios/App/WatchTests/__Snapshots__/**') != '')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-snapshot-baselines-${{ github.run_id }}
          path: |
            ui/ios/App/WidgetTests/__Snapshots__/
            ui/ios/App/WatchTests/__Snapshots__/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload coverage to Codecov (ios flag)
        # G12 -- see the ts upload above for OIDC rationale.
        # Six per-scheme cobertura.xml files (AppTests / AppUITests / WidgetTests /
        # AppLiveActivityTests / AppShareExtensionTests / WatchTests)
        # uploaded under the single `ios` flag. Codecov merges them
        # into one tree -- per-binary coverage is preserved through
        # the source paths, which already differ per target. The
        # threshold gate (scripts/native/check-ios-coverage.mjs) ran
        # inside fastlane test_ci, so by the time we reach this step
        # the per-target floors (95% App.app + 50% extensions/watch)
        # are already enforced.
        if: always() && needs.changes.outputs.ios == 'true' && hashFiles('ui/ios/App/fastlane/coverage/*/cobertura.xml') != ''
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ui/ios/App/fastlane/coverage/AppTests/cobertura.xml,ui/ios/App/fastlane/coverage/AppUITests/cobertura.xml,ui/ios/App/fastlane/coverage/WidgetTests/cobertura.xml,ui/ios/App/fastlane/coverage/AppLiveActivityTests/cobertura.xml,ui/ios/App/fastlane/coverage/AppShareExtensionTests/cobertura.xml,ui/ios/App/fastlane/coverage/WatchTests/cobertura.xml
          flags: ios
          name: ios-coverage
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

      # Sibling of the ts-job upload, for the heron-pr-coverage sticky.
      - name: Upload iOS coverage artifact for sticky-comment workflow
        if: needs.changes.outputs.ios == 'true' && always() && hashFiles('ui/ios/App/fastlane/coverage/*/cobertura.xml') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-ios
          path: ui/ios/App/fastlane/coverage/*/cobertura.xml
          retention-days: 14
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Android -- Gradle test (JVM unit tests) + JaCoCo coverage upload
  # ─────────────────────────────────────────────────────────────────
  # Runs ./gradlew :app:testDebugUnitTest + :app:jacocoTestReport on
  # ubuntu-latest. JaCoCo XML uploads as the `android` Codecov flag.
  # Instrumented (connectedCheck) tests are deferred -- they need an
  # emulator + arm64-cross-compile setup that's slow + flaky on CI.
  # The unit-test surface covers the bulk of authored Kotlin
  # (Brand / ErrorReporter / NetworkMonitor / NativePlugin core).
  android:
    name: Android — Gradle test + JaCoCo
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # [user-approved-deferral] TASK-10 in TODO-INSTRUCTIONS.md.
    # Android JVM-unit-test job disabled entirely. Re-enable after
    # validating the kapt + AppSearch compiler chain holds + the
    # per-CLASS JaCoCo rule passes end-to-end on CI.
    if: ${{ vars.ENABLE_DISABLED_JOB == 'true' }}
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload (G12) -- same as ts + ios jobs
    steps:
      - name: Skip — no Android-relevant paths changed
        if: needs.changes.outputs.android != 'true'
        run: |
          echo "::notice::Android skipped — no Android-relevant paths changed."
          {
            echo "### ⏭️ Android skipped"
            echo ""
            echo "No paths matching the \`android\` filter changed in this PR."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Harden runner
        if: needs.changes.outputs.android == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        if: needs.changes.outputs.android == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup JDK 21
        if: needs.changes.outputs.android == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4.7.0
        with:
          distribution: temurin
          # Capacitor 8.x's capacitor.build.gradle pins sourceCompatibility
          # + targetCompatibility = JavaVersion.VERSION_21 (regenerated on
          # every `cap sync`), so Gradle's javac needs JDK 21.
          java-version: '21'

      - name: Setup mise (Node + pnpm)
        if: needs.changes.outputs.android == 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      # Inline Android SDK install -- platform 36 + build-tools 36 (per
      # ui/android/variables.gradle). Same pattern as native-release.yml.
      - name: Install Android SDK (cmdline-tools + platform 36 + build-tools 36)
        if: needs.changes.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          # Latest cmdline-tools (LTS-ish; 11076708 matches what native-release.yml pins)
          curl -sSLo /tmp/cmdline.zip 'https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip'
          unzip -q /tmp/cmdline.zip -d "$SDK_ROOT/cmdline-tools"
          mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          export ANDROID_HOME="$SDK_ROOT"
          # `yes | sdkmanager --licenses` SIGPIPEs when sdkmanager exits;
          # under `set -e -o pipefail` that propagates exit 1. Wrap in
          # `|| true` so the licenses-accept doesn't fail the whole step
          # (the next sdkmanager call would error anyway if licenses are
          # rejected).
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;36.0.0' >/dev/null
          {
            echo "ANDROID_HOME=$SDK_ROOT"
            echo "ANDROID_SDK_ROOT=$SDK_ROOT"
            echo "PATH=$SDK_ROOT/platform-tools:$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          } >> "$GITHUB_ENV"

      - name: Resolve pnpm store path
        if: needs.changes.outputs.android == 'true'
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        if: needs.changes.outputs.android == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install pnpm dependencies (for capacitor + brand:apply)
        if: needs.changes.outputs.android == 'true'
        run: pnpm install --frozen-lockfile

      - name: Apply brand (regenerates Brand.kt + AndroidManifest)
        if: needs.changes.outputs.android == 'true'
        run: pnpm brand:apply

      # Build the SvelteKit static output that Capacitor copies into
      # ui/android/app/src/main/assets. Without this, `cap sync android`
      # fails with "Could not find the web assets directory:
      # ./build/static". The test job doesn't exercise the WebView so
      # the bundle content doesn't matter, but the directory must
      # exist for cap sync to succeed.
      - name: Build SvelteKit static (so cap sync has webDir)
        if: needs.changes.outputs.android == 'true'
        working-directory: ui
        env:
          CAPACITOR: '1'
        run: pnpm run build:static

      # Capacitor's android scaffold expects
      # `ui/android/capacitor-cordova-android-plugins/cordova.variables.gradle`
      # to exist before the gradle build can evaluate the project. `cap
      # sync android` regenerates that file + the capacitor-android
      # bridge sources. Run it BEFORE the gradle invocation so
      # testDebugUnitTest doesn't fail with
      # "Could not read script ... cordova.variables.gradle".
      - name: Capacitor sync android (regenerate cordova.variables.gradle)
        if: needs.changes.outputs.android == 'true'
        working-directory: ui
        run: pnpm exec cap sync android

      - name: Cache Gradle dependencies
        if: needs.changes.outputs.android == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ui/android/**/*.gradle*', 'ui/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Gradle test + jacocoTestReport
        if: needs.changes.outputs.android == 'true'
        working-directory: ui/android
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport --no-daemon --stacktrace

      - name: Upload coverage to Codecov (android flag)
        if: always() && needs.changes.outputs.android == 'true' && hashFiles('ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml') != ''
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: android-coverage
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

      - name: Upload Android coverage artifact (sticky-comment workflow)
        if: needs.changes.outputs.android == 'true' && always() && hashFiles('ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-android
          path: ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 14
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Android -- Espresso (instrumented) tests on a real emulator
  # ─────────────────────────────────────────────────────────────────
  # H.G -- Runs the androidTest source set on a real emulator. Two
  # instrumented tests cover NativePlugin paths Robolectric can't reach:
  #   - BiometricAuthInstrumentedTest: BiometricPrompt construction against
  #     a real AppCompatActivity (NativePlugin.kt 168-211).
  #   - AppSearchInstrumentedTest: AppSearch indexJobs + clearJobIndex
  #     round-trip against the real on-device backend.
  #
  # Emulator boot is hand-rolled (sdkmanager + avdmanager + `emulator`)
  # rather than via reactivecircus/android-emulator-runner. This repo pins
  # Actions to a SELECTED allow-list (actions/*, jdx/*, dorny/*, verified
  # creators, ...) and neither `reactivecircus/*` nor `android-actions/*`
  # is on it. A `uses:` of a non-allow-listed action is rejected at
  # workflow-validation time -> silent `startup_failure` with zero jobs
  # (root cause of the L.1 bisect: runs 26316374520 + 26316519582). The
  # inline-sdkmanager pattern mirrors the JVM `android` job +
  # native-release.yml, which deliberately avoid the same allow-list
  # dependency. KVM is enabled for HW accel; the emulator boots headless
  # with no snapshot.
  android-emulator:
    name: Android — Espresso (instrumented)
    needs: changes
    runs-on: ubuntu-latest
    # Cold emulator boot (~3-5 min) + AVD create + connectedCheck. 40 min
    # buys headroom for the first cold run after a runner-image bump.
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
    steps:
      # Skip-stub. When no Android-relevant paths changed this is the only
      # step that runs; the required Espresso check reports success
      # without booting an emulator. On push to main / dispatch the
      # `changes` job force-trues android, so the full suite runs.
      - name: Skip — no Android-relevant paths changed
        if: needs.changes.outputs.android != 'true'
        run: |
          echo "::notice::Android Espresso skipped — no Android-relevant paths changed."
          {
            echo "### ⏭️ Android Espresso skipped"
            echo ""
            echo "No paths matching the \`android\` filter changed in this PR."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Harden runner
        if: needs.changes.outputs.android == 'true'
        # G4 -- same egress-audit baseline as every other job. This job
        # downloads the Android SDK + system image from dl.google.com, so
        # the network monitoring matters here too.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Enable KVM
        if: needs.changes.outputs.android == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The hand-rolled AVD needs ~7.4 GB for its userdata partition, but a stock
      # ubuntu-latest runner often has only ~6.5 GB free where the AVD lives, so
      # the emulator boot aborts with "Not enough space to create userdata
      # partition". Reclaim space by deleting big toolchains the Espresso run
      # never touches (.NET, Haskell/GHC, Swift, the CodeQL bundle, Docker
      # images). Best-effort: never fail the job over cleanup.
      - name: Free disk space for the emulator
        if: needs.changes.outputs.android == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h / | tail -1

      - name: Checkout
        if: needs.changes.outputs.android == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup JDK 21
        if: needs.changes.outputs.android == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4.7.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup mise (Node + pnpm)
        if: needs.changes.outputs.android == 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: Resolve pnpm store path
        if: needs.changes.outputs.android == 'true'
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        if: needs.changes.outputs.android == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install pnpm dependencies
        if: needs.changes.outputs.android == 'true'
        run: pnpm install --frozen-lockfile

      - name: Apply brand
        if: needs.changes.outputs.android == 'true'
        run: pnpm brand:apply

      - name: Build SvelteKit static (so cap sync has webDir)
        if: needs.changes.outputs.android == 'true'
        working-directory: ui
        env:
          CAPACITOR: '1'
        run: pnpm run build:static

      - name: Capacitor sync android
        if: needs.changes.outputs.android == 'true'
        working-directory: ui
        run: pnpm exec cap sync android

      # Gradle dependency cache (AGP / espresso / mockk-android /
      # androidx.test). Same key as the JVM `android` job so the two
      # share one cache. hashFiles runs after `cap sync` regenerated the
      # capacitor*.gradle files, so the hash reflects the resolved build.
      - name: Cache Gradle dependencies
        if: needs.changes.outputs.android == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ui/android/**/*.gradle*', 'ui/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Cache everything sdkmanager installs (system image + emulator +
      # platform/build-tools/platform-tools) so a warm run skips the
      # ~1 GB+ download and the next sdkmanager call no-ops. cmdline-tools
      # is NOT cached (installed fresh below so the mv-to-latest stays
      # deterministic). The AVD is recreated fresh each run (cheap,
      # `--force`) rather than cached, so its system-image reference can't
      # go stale. Restored BEFORE the install step.
      - name: Cache Android SDK (system image + emulator + platforms)
        if: needs.changes.outputs.android == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/android-sdk/system-images/*
            ~/android-sdk/emulator/*
            ~/android-sdk/platforms/*
            ~/android-sdk/build-tools/*
            ~/android-sdk/platform-tools/*
          key: android-sdk-api34-bt36-v1

      # Inline Android SDK + emulator install. Mirrors the JVM `android`
      # job (platform + build-tools 36 per ui/android/variables.gradle)
      # and adds the `emulator` package + an API-34 google_apis x86_64
      # system image. No third-party action (see job header).
      - name: Install Android SDK + emulator + system image
        if: needs.changes.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          curl -sSLo /tmp/cmdline.zip 'https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip'
          unzip -q /tmp/cmdline.zip -d "$SDK_ROOT/cmdline-tools"
          mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools:$SDK_ROOT/emulator:$PATH"
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          # `yes | sdkmanager --licenses` SIGPIPEs when sdkmanager exits;
          # under pipefail that would propagate exit 1. `|| true` keeps the
          # licenses-accept from failing the step.
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;36.0.0' \
            'emulator' 'system-images;android-34;google_apis;x86_64' >/dev/null
          # Pin the AVD home explicitly so `avdmanager create` (writer) and
          # `emulator` (reader) resolve the SAME directory. Without this the
          # two can disagree on the runner (avdmanager wrote elsewhere while
          # the emulator searched $HOME/.android/avd -> "Unknown AVD name",
          # which previously hung `adb wait-for-device` to the job timeout).
          mkdir -p "$HOME/.android/avd"
          {
            echo "ANDROID_HOME=$SDK_ROOT"
            echo "ANDROID_SDK_ROOT=$SDK_ROOT"
            echo "ANDROID_USER_HOME=$HOME/.android"
            echo "ANDROID_AVD_HOME=$HOME/.android/avd"
            echo "PATH=$SDK_ROOT/emulator:$SDK_ROOT/platform-tools:$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          } >> "$GITHUB_ENV"

      - name: Create AVD
        if: needs.changes.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo no | avdmanager create avd -n pixel-7-api-34 \
            -k 'system-images;android-34;google_apis;x86_64' -d pixel_7 --force
          # Cross-check that the emulator can SEE the AVD (proves avdmanager
          # and emulator agree on $ANDROID_AVD_HOME). Fail fast here rather
          # than discovering "Unknown AVD name" mid-boot.
          if ! "$ANDROID_HOME/emulator/emulator" -list-avds 2>/dev/null | grep -qx pixel-7-api-34; then
            echo "::error::AVD pixel-7-api-34 not visible to the emulator after create."
            echo "ANDROID_AVD_HOME=$ANDROID_AVD_HOME"
            ls -la "$ANDROID_AVD_HOME" || true
            "$ANDROID_HOME/emulator/emulator" -list-avds || true
            exit 1
          fi
          echo "✓ AVD pixel-7-api-34 visible to emulator"

      - name: Boot emulator + run instrumented tests
        if: needs.changes.outputs.android == 'true'
        working-directory: ui/android
        shell: bash
        run: |
          set -euo pipefail
          EMU_LOG=/tmp/emulator-boot.log
          "$ANDROID_HOME/emulator/emulator" -avd pixel-7-api-34 \
            -no-window -gpu swiftshader_indirect -no-snapshot -noaudio \
            -no-boot-anim -camera-back none >"$EMU_LOG" 2>&1 &
          EMU_PID=$!
          # Hard cap on device registration so a dead emulator fails in
          # minutes, not at the 40-min job timeout (the prior failure mode).
          if ! timeout 300 adb wait-for-device; then
            echo "::error::adb wait-for-device timed out — emulator never came online."
            cat "$EMU_LOG" || true
            exit 1
          fi
          # Poll sys.boot_completed; bail immediately if the emulator died.
          booted=""
          for _ in $(seq 1 90); do
            if ! kill -0 "$EMU_PID" 2>/dev/null; then
              echo "::error::Emulator process exited during boot."
              cat "$EMU_LOG" || true
              exit 1
            fi
            booted="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            [ "$booted" = "1" ] && break
            sleep 5
          done
          if [ "$booted" != "1" ]; then
            echo "::error::Emulator failed to reach sys.boot_completed."
            cat "$EMU_LOG" || true
            adb devices
            exit 1
          fi
          adb shell settings put global window_animation_scale 0 || true
          adb shell settings put global transition_animation_scale 0 || true
          adb shell settings put global animator_duration_scale 0 || true
          ./gradlew :app:connectedDebugAndroidTest :app:jacocoTestReport --no-daemon --stacktrace

      # Instrumented coverage is ADDITIVE on top of the JVM `android` job's
      # JaCoCo upload (same `android` flag). fail_ci_if_error: false -- the
      # JVM job is the coverage gate; this enriches the tree.
      - name: Upload instrumented coverage to Codecov (android flag)
        if: always() && needs.changes.outputs.android == 'true' && hashFiles('ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml') != ''
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: android-instrumented
          fail_ci_if_error: false
          use_oidc: true
          verbose: true

      - name: Upload instrumented test reports on failure
        if: failure() && needs.changes.outputs.android == 'true' && hashFiles('ui/android/app/build/reports/androidTests/connected/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-instrumented-reports-${{ github.run_id }}
          path: ui/android/app/build/reports/androidTests/connected/
          retention-days: 14
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Lost Pixel (visual regression) -- own job, distinct required check
  # ─────────────────────────────────────────────────────────────────
  # H.D -- Standalone Lost Pixel job (was a step inside `ts` previously;
  # extracted so the visual regression has its own required-check name
  # that maps to "Tests / Lost Pixel (visual regression)" in the
  # branch-protection ruleset). The beforeScreenshot hook in
  # ui/lostpixel.config.ts mints a bearer token via /api/auth/e2e-login
  # so auth-gated routes render correctly + freezes Date for stable
  # baselines.
  lost-pixel:
    name: Lost Pixel (visual regression)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: needs.changes.outputs.ts == 'true'
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup mise (Node + pnpm)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply brand
        run: pnpm brand:apply

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright chromium (Lost Pixel uses headless-shell)
        run: pnpm --filter ui exec playwright install --with-deps chromium

      - name: Build UI
        run: pnpm --filter ui run build

      - name: Seed u_e2e (Lost Pixel auth bypass)
        env:
          HERON_DATA_DIR: /tmp/heron-lost-pixel
        run: |
          mkdir -p "$HERON_DATA_DIR"
          node scripts/system/seed-lighthouse-user.mjs

      - name: Run Lost Pixel (compare against committed baselines)
        env:
          HERON_DATA_DIR: /tmp/heron-lost-pixel
          HERON_E2E_DATA_DIR: /tmp/heron-lost-pixel
          # HERON_SCREENSHOT_MODE disables the boot auto-scan so the
          # pipeline stays empty + no transient toast / pulse flicker
          # between baseline + current runs.
          HERON_SCREENSHOT_MODE: "1"
        run: |
          set -euo pipefail
          pnpm --filter ui exec vite preview --port 4173 &
          PREVIEW_PID=$!
          cleanup() {
            kill "${PREVIEW_PID:-}" 2>/dev/null || true
            wait "${PREVIEW_PID:-}" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:4173/api/health > /dev/null 2>&1; then break; fi
            sleep 1
          done
          pnpm --filter ui exec lost-pixel

      - name: Upload Lost Pixel diff artifacts on failure
        if: failure() && hashFiles('ui/lost-pixel/difference/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lost-pixel-diff-${{ github.run_id }}
          path: |
            ui/lost-pixel/difference/
            ui/lost-pixel/current/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────
  # Multi-language format / lint -- one job covers every non-JS surface
  # so the JS-focused `ts` job stays focused.
  # ─────────────────────────────────────────────────────────────────
  format:
    name: Lint + format (Python / Go / Kotlin / Shell / Ruby / YAML)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Skip-stub. When no Python/Ruby/Shell/Kotlin/Go/YAML/TOML/plist/
      # XML paths changed, this is the only step that runs. The job
      # reports green under "Lint + format (Python / Go / Kotlin /
      # Shell / Ruby / YAML)" without burning the ~3min multi-language
      # toolchain install.
      - name: Skip — no format-relevant paths changed
        if: needs.changes.outputs.format != 'true'
        run: |
          echo "::notice::Lint + format skipped — no Python/Ruby/Shell/Kotlin/Go/YAML/TOML/plist/XML changes."
          {
            echo "### ⏭️ Lint + format skipped"
            echo ""
            echo "No paths matching the \`format\` filter changed in this PR."
            echo "See \`changes\` job in \`.github/workflows/test.yml\` for the full list."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Harden runner
        if: needs.changes.outputs.format == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        if: needs.changes.outputs.format == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup mise (Node + pnpm + Ruby)
        if: needs.changes.outputs.format == 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      # All formatters are pinned in .mise.toml and installed by the
      # mise setup step above (`jdx/mise-action@v4` with experimental +
      # cache enabled). No per-tool curl / pip / gem / apt install needed
      # -- fresh-clone reproducibility is the whole point of mise.

      # `validate:workflows` needs js-yaml from node_modules. Install
      # only what's needed (root deps, not the ui/electron workspaces)
      # so the install is fast on warm cache. Cache key prefix matches
      # ts/ios/android jobs (`pnpm-store-`) so the warm cache restored
      # by those bigger jobs is reused here.
      - name: Resolve pnpm store path
        if: needs.changes.outputs.format == 'true'
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store (format job)
        if: needs.changes.outputs.format == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - name: Install root node_modules (for validate:workflows)
        if: needs.changes.outputs.format == 'true'
        # --filter=. installs only the root manifest's deps, skipping
        # ui/ui-electron workspaces. Keeps the format job lean.
        run: pnpm install --filter=. --frozen-lockfile

      - name: actionlint .github/workflows/*.yml
        if: needs.changes.outputs.format == 'true'
        run: actionlint -color

      # Naming / docstring / structure discipline across workflows.
      # Complements actionlint (syntax), zizmor (security), and
      # verify-workflow-pins (third-party SHA pins). See
      # scripts/system/verify-workflow-quality.mjs for the 7 rules.
      - name: Workflow quality (header / permissions / concurrency / names / order)
        if: needs.changes.outputs.format == 'true'
        run: pnpm validate:workflows

      # Catch stale `pnpm <script>` references across workflows / docs /
      # shell scripts. See scripts/system/verify-pnpm-scripts.mjs --
      # validates every `pnpm X` invocation against the relevant
      # package.json::scripts (root, ui, ui/electron).
      - name: pnpm script references (no stale doc / workflow names)
        if: needs.changes.outputs.format == 'true'
        run: pnpm validate:pnpm-scripts

      # Catch drift between app.html inline-script content + the
      # sha256 hashes declared in svelte.config.ts's CSP script-src
      # array. If a hash goes stale, CSP silently blocks the inline
      # script. See scripts/system/verify-csp-hashes.mjs.
      - name: CSP hashes vs app.html inline scripts
        if: needs.changes.outputs.format == 'true'
        run: pnpm validate:csp-hashes

      - name: ruff format --check
        if: needs.changes.outputs.format == 'true'
        run: git ls-files '*.py' | xargs -r ruff format --check

      - name: ruff check (lint)
        if: needs.changes.outputs.format == 'true'
        run: git ls-files '*.py' | xargs -r ruff check

      - name: ktlint
        if: needs.changes.outputs.format == 'true'
        run: git ls-files '*.kt' | xargs -r ktlint

      - name: shfmt check (2-space indent)
        if: needs.changes.outputs.format == 'true'
        run: |
          drift=$(git ls-files '*.sh' '*.bash' | xargs -r shfmt -l -i 2 -ci 2>/dev/null || true)
          if [ -n "$drift" ]; then
            echo "::error::shfmt drift in:"
            echo "$drift"
            exit 1
          fi

      - name: Install root Gemfile (rufo)
        if: needs.changes.outputs.format == 'true'
        run: bundle install

      - name: rufo --check
        # Covers .rb source files AND the extensionless Gemfile at root +
        # ui/ios/App/. Gemfile.lock is auto-generated; the '*Gemfile' glob
        # naturally excludes anything ending in .lock.
        if: needs.changes.outputs.format == 'true'
        run: git ls-files '*.rb' '*Gemfile' | xargs -r bundle exec rufo -c

      - name: yamllint
        if: needs.changes.outputs.format == 'true'
        run: git ls-files '*.yml' '*.yaml' | xargs -r yamllint --no-warnings

      - name: taplo format --check
        # TOML formatter (pyproject.toml + .mise.toml). taplo is pinned in
        # .mise.toml so mise installs the same version locally + in CI.
        if: needs.changes.outputs.format == 'true'
        run: git ls-files '*.toml' | xargs -r taplo format --check

      - name: Validate Apple plists
        # Python stdlib plistlib parses every .plist / .entitlements /
        # .xcprivacy under the repo. Catches malformed iOS configs that
        # would otherwise blow up xcodebuild on the ios CI runner.
        if: needs.changes.outputs.format == 'true'
        run: python3 scripts/system/validate-plists.py

      - name: Validate XML files (*.svg + *.storyboard)
        # xmllint --noout well-formedness check; ships with libxml2 on
        # every ubuntu-latest + macOS runner. No schema validation, just
        # "does this parse as XML".
        if: needs.changes.outputs.format == 'true'
        run: bash scripts/system/validate-xml.sh

      - name: dotenv-linter (.env.example templates)
        # Catches duplicate keys / leading-space typos / quote
        # inconsistency in the tracked .env*.example templates. The
        # real .env is gitignored and never linted.
        if: needs.changes.outputs.format == 'true'
        run: pnpm validate:dotenv

      - name: Tiny-config syntax (.gitattributes / .npmrc / .actrc / LICENSE / robots.txt)
        # Regex-driven sanity passes for the small static config files
        # no formatter/linter ecosystem owns.
        if: needs.changes.outputs.format == 'true'
        run: pnpm validate:tiny-configs
        # JSON-schema validation + format-sync run in the ts job (need
        # node_modules for the ajv + jsonc-parser devDeps).

  # ─────────────────────────────────────────────────────────────────
  # Security audit
  # ─────────────────────────────────────────────────────────────────
  audit:
    name: Security audit
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Skip-stub. Audit only meaningfully runs when the dep graph
      # changes. If no package.json / lockfile changed, the audit's
      # result is necessarily identical to the previous run -- skip.
      - name: Skip — no dep-graph changes
        if: needs.changes.outputs.audit != 'true'
        run: |
          echo "::notice::Security audit skipped — no package.json / pnpm-lock.yaml / pnpm-workspace.yaml changes."
          {
            echo "### ⏭️ Security audit skipped"
            echo ""
            echo "No paths matching the \`audit\` filter changed in this PR."
            echo "Audit result is unchanged from the previous run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Harden runner
        if: needs.changes.outputs.audit == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        if: needs.changes.outputs.audit == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup mise
        if: needs.changes.outputs.audit == 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: pnpm audit (moderate+)
        if: needs.changes.outputs.audit == 'true'
        run: pnpm audit --audit-level moderate

  # ─────────────────────────────────────────────────────────────────
  # Coverage summary -- wait on ts + ios + android, post combined Codecov comment
  # ─────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs: [ts, ios, android]
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Coverage summary
        run: |
          echo "Coverage uploaded per-job via codecov-action@v6"
          echo "  • ts      flag → ui/coverage/lcov.info"
          echo "  • ios     flag → ui/ios/App/fastlane/coverage/<scheme>/cobertura.xml × 5"
          echo "                    (AppTests / WidgetTests / AppLiveActivityTests /"
          echo "                     AppShareExtensionTests / WatchTests)"
          echo "  • android flag → ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
          echo "Combined PR comment posted by Codecov once all flags arrive."

  # ── Verify (full gate) ──────────────────────────────────────────────
  # The SAME `pnpm verify` pipeline pre-commit + pre-push run -- typecheck +
  # build + tests + every linter (swiftlint/ktlint/ruff/shfmt/yamllint/taplo/
  # actionlint) + every gate (no-slop/comment-style/english-only/modes/csp/
  # json-schemas/lockfile/...). ALWAYS runs (no path gate) so a docs-only PR
  # can't skip the content gates -- that was the --no-verify bypass hole.
  # The only checks NOT here (by design) are E2E, Lost Pixel, CodeQL,
  # Scorecard, zizmor, and dependency-review, which keep their own jobs.
  verify-full:
    name: Verify (full gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      # Turborepo remote cache (Vercel, free). TURBO_TOKEN/TEAM gate it; when
      # absent turbo falls back to the local actions/cache.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise (full toolchain)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - name: Cache turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .turbo
            ui/.turbo
            ui/electron/.turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-
      - name: Cache Vitest
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ui/.vitest-cache
            ui/coverage
          key: vitest-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'ui/vitest.config.ts', 'ui/vitest.base.ts') }}
          restore-keys: |
            vitest-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Refresh brand-derived generated artifacts (brand.ts / Brand.swift / etc.)
      # BEFORE the gate so the repo-wide checks never read stale branding. The
      # other build jobs do this too; verify-full's parallel gate tasks don't all
      # depend on //#brand, so generate it up front.
      - name: Generate brand artifacts
        run: pnpm brand:apply
      - name: pnpm verify (typecheck + build + tests + every linter + every gate)
        run: pnpm verify
      # ui-component (browser) tests need Playwright; they run here in CI
      # rather than in the shared `pnpm verify` so local pre-commit/pre-push
      # don't require a browser install. Closes the "ui-component runs
      # nowhere" hole.
      - name: Install Playwright browsers (chromium + webkit)
        run: pnpm --filter ui exec playwright install --with-deps chromium webkit
      - name: Vitest ui-component (browser project)
        run: pnpm --filter ui exec vitest run --project=ui-component
