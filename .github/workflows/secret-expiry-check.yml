name: Secret expiry check
# HP35 -- proactive reminder for credentials that expire on a fixed
# schedule. The worst-kind outage is "release ships at 3am, fails at
# code-signing, no one notices for 12h." This workflow runs monthly,
# decodes each cert/key from secrets, reads its expiration, and opens
# an issue 30 days before expiry.
#
# Covered:
#   - APPLE_DEVELOPER_ID_CERT_P12 (Mac/iOS distribution cert, 1y TTL)
#   - APP_STORE_CONNECT_API_KEY (ASC API key, rotation-by-policy)
#   - IOS_PROVISIONING_PROFILE (provisioning profile, 1y TTL)
#   - GH_USER_PAT (fine-grained PAT, 90d TTL -- probes via the
#     `github-authentication-token-expiration` response header that
#     GitHub returns on every PAT-authenticated REST call)
#   - (G18 forthcoming) AZURE_TRUSTED_SIGNING_CERT
#
# Self-healing: if all certs are >30d from expiry, no issue is opened.
# If an existing "Cert expiry warning" issue exists and the cert is
# now renewed, the workflow leaves the issue for the maintainer to
# close manually (avoids accidental close of human-acknowledged
# warnings).

on:
  schedule:
    - cron: "0 9 1 * *" # Monthly on the 1st, 09:00 UTC
  workflow_dispatch: # Manual fire from the Actions tab

permissions:
  contents: read
  issues: write

concurrency:
  group: secret-expiry-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  check-apple-certs:
    name: Apple signing certs expiry
    runs-on: macos-15
    timeout-minutes: 5
    if: github.repository_owner == 'heron' || github.repository_owner == 'kaelys-js'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Decode + inspect Mac certificate
        env:
          P12: ${{ secrets.MAC_CERTIFICATE }}
          PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          if [ -z "$P12" ]; then echo "::notice::MAC_CERTIFICATE secret not set — skipping"; exit 0; fi
          echo "$P12" | base64 -d > /tmp/mac.p12 || { echo "::error::could not decode MAC_CERTIFICATE secret"; exit 1; }
          NOT_AFTER=$(openssl pkcs12 -in /tmp/mac.p12 -nokeys -passin "pass:$PASSWORD" 2>/dev/null \
            | openssl x509 -noout -enddate | cut -d= -f2)
          rm -f /tmp/mac.p12
          NOT_AFTER_EPOCH=$(date -j -f "%b %e %T %Y %Z" "$NOT_AFTER" "+%s")
          NOW_EPOCH=$(date "+%s")
          DAYS=$(( (NOT_AFTER_EPOCH - NOW_EPOCH) / 86400 ))
          echo "Mac signing cert expires in $DAYS days ($NOT_AFTER)"
          echo "MAC_CERT_DAYS=$DAYS" >> "$GITHUB_ENV"
          echo "MAC_CERT_EXPIRY=$NOT_AFTER" >> "$GITHUB_ENV"

      - name: Decode + inspect iOS certificate
        env:
          P12: ${{ secrets.IOS_CERTIFICATE }}
          PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          if [ -z "$P12" ]; then echo "::notice::IOS_CERTIFICATE secret not set — skipping"; exit 0; fi
          echo "$P12" | base64 -d > /tmp/ios.p12 || { echo "::error::could not decode IOS_CERTIFICATE secret"; exit 1; }
          NOT_AFTER=$(openssl pkcs12 -in /tmp/ios.p12 -nokeys -passin "pass:$PASSWORD" 2>/dev/null \
            | openssl x509 -noout -enddate | cut -d= -f2)
          rm -f /tmp/ios.p12
          NOT_AFTER_EPOCH=$(date -j -f "%b %e %T %Y %Z" "$NOT_AFTER" "+%s")
          NOW_EPOCH=$(date "+%s")
          DAYS=$(( (NOT_AFTER_EPOCH - NOW_EPOCH) / 86400 ))
          echo "iOS signing cert expires in $DAYS days ($NOT_AFTER)"
          echo "IOS_CERT_DAYS=$DAYS" >> "$GITHUB_ENV"
          echo "IOS_CERT_EXPIRY=$NOT_AFTER" >> "$GITHUB_ENV"

      - name: Inspect provisioning profile
        env:
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -e
          if [ -z "$PROFILE" ]; then echo "::notice::IOS_PROVISIONING_PROFILE secret not set — skipping"; exit 0; fi
          echo "$PROFILE" | base64 -d > /tmp/profile.mobileprovision
          NOT_AFTER=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | plutil -extract ExpirationDate raw -)
          rm -f /tmp/profile.mobileprovision
          NOT_AFTER_EPOCH=$(date -j -f "%Y-%m-%dT%H:%M:%SZ" "$NOT_AFTER" "+%s")
          NOW_EPOCH=$(date "+%s")
          DAYS=$(( (NOT_AFTER_EPOCH - NOW_EPOCH) / 86400 ))
          echo "iOS provisioning profile expires in $DAYS days ($NOT_AFTER)"
          echo "PROFILE_DAYS=$DAYS" >> "$GITHUB_ENV"
          echo "PROFILE_EXPIRY=$NOT_AFTER" >> "$GITHUB_ENV"

      - name: Open issue if any cred expires in <30 days
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const warnings = [];
            const checks = [
              { name: 'Mac signing certificate', days: process.env.MAC_CERT_DAYS, expiry: process.env.MAC_CERT_EXPIRY },
              { name: 'iOS signing certificate', days: process.env.IOS_CERT_DAYS, expiry: process.env.IOS_CERT_EXPIRY },
              { name: 'iOS provisioning profile', days: process.env.PROFILE_DAYS, expiry: process.env.PROFILE_EXPIRY },
            ];
            for (const c of checks) {
              if (c.days === undefined || c.days === '') continue;
              const days = parseInt(c.days, 10);
              if (isNaN(days)) continue;
              if (days < 30) {
                warnings.push(`- **${c.name}** expires in **${days} days** (${c.expiry})`);
              }
            }
            if (warnings.length === 0) {
              core.info('✓ All credentials >30 days from expiry');
              return;
            }
            const body = [
              'One or more signing credentials are approaching expiry:',
              '',
              ...warnings,
              '',
              '### Renewal procedure',
              '',
              'See [`docs/SETUP.md#signing-cert-rotation`](../blob/main/docs/SETUP.md#signing-cert-rotation) for the full procedure.',
              '',
              'tl;dr:',
              '1. Apple Developer → Certificates → New Certificate (Mac/iOS Distribution as needed)',
              '2. Download the new .cer, convert to .p12 with the same password',
              '3. Update the matching repo secret via `gh secret set`',
              '4. Close this issue',
              '',
              '_This issue was opened automatically by `.github/workflows/secret-expiry-check.yml`._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 Signing credential renewal needed (${warnings.length} item${warnings.length > 1 ? 's' : ''})`,
              body,
              labels: ['security', 'release-blocker'],
            });
            core.info(`Opened expiry-warning issue with ${warnings.length} item(s)`);

  check-gh-user-pat:
    name: GH_USER_PAT expiry probe
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      issues: write
    if: github.repository_owner == 'heron' || github.repository_owner == 'kaelys-js'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Probe PAT + read expiration header
        env:
          PAT: ${{ secrets.GH_USER_PAT }}
        run: |
          set -euo pipefail
          if [ -z "$PAT" ]; then
            echo "::notice::GH_USER_PAT not set -- skipping expiry probe"
            exit 0
          fi
          # GitHub returns the PAT's expiration in the
          # `github-authentication-token-expiration` response header on
          # any PAT-authenticated REST call. Format: ISO-8601-ish,
          # e.g. "2026-08-19 12:34:56 UTC". We probe the cheap
          # /user endpoint (read-only, no rate-limit pressure).
          HDRS=$(curl -sS -D - -o /dev/null \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user || true)
          EXPIRY=$(printf '%s' "$HDRS" \
            | grep -i '^github-authentication-token-expiration:' \
            | sed -E 's/^[^:]+:[[:space:]]*//; s/\r$//' \
            | head -1)
          if [ -z "$EXPIRY" ]; then
            echo "::warning::PAT probe returned no expiration header. PAT may be invalid OR may be a classic (non-expiring) PAT."
            echo "PAT_DAYS=" >> "$GITHUB_ENV"
            exit 0
          fi
          # Parse the timestamp (GNU date on ubuntu accepts it directly).
          EXPIRY_EPOCH=$(date -d "$EXPIRY" "+%s")
          NOW_EPOCH=$(date "+%s")
          DAYS=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
          echo "GH_USER_PAT expires in $DAYS days ($EXPIRY)"
          echo "PAT_DAYS=$DAYS" >> "$GITHUB_ENV"
          echo "PAT_EXPIRY=$EXPIRY" >> "$GITHUB_ENV"
      - name: Open issue if PAT expires in <30 days
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const days = parseInt(process.env.PAT_DAYS || '', 10);
            const expiry = process.env.PAT_EXPIRY || '(unknown)';
            if (Number.isNaN(days)) {
              core.info('PAT_DAYS not set -- nothing to do');
              return;
            }
            if (days >= 30) {
              core.info(`✓ GH_USER_PAT >30 days from expiry (${days}d, ${expiry})`);
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Dedup: don't open a second issue if one is already open.
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'security,release-blocker',
            });
            const already = existing.data.find((i) => /GH_USER_PAT/.test(i.title));
            const title = `🔐 GH_USER_PAT rotation needed in ${days} days (${expiry})`;
            const body = [
              `The \`GH_USER_PAT\` secret expires in **${days} days** (\`${expiry}\`).`,
              ``,
              `When it expires, \`maintain-user-features.yml\` will start no-op-ing with a notice + the pinned Roadmap issue / discussions / Project v2 / profile README will stop reconciling.`,
              ``,
              `### Rotation procedure`,
              ``,
              `1. <https://github.com/settings/personal-access-tokens> -> find the entry named \`heron-maintain-user-features\` -> Regenerate.`,
              `2. New expiration: 90 days. Keep the SAME repository access (\`kaelys-js/heron\` + \`kaelys-js/kaelys-js\`) and the SAME scopes (Contents R/W, Discussions R/W, Issues R/W, Profile R/W).`,
              `3. Copy the new token, then:`,
              `   \`\`\`sh`,
              `   gh secret set GH_USER_PAT --repo ${owner}/${repo} --body <paste>`,
              `   \`\`\``,
              `4. Verify by dispatching: Actions -> Maintain user-scope features -> Run workflow.`,
              `5. Close this issue.`,
              ``,
              `_Posted by \`.github/workflows/secret-expiry-check.yml\` (job: \`check-gh-user-pat\`)._`,
            ].join('\n');
            if (already) {
              await github.rest.issues.update({
                owner, repo, issue_number: already.number,
                title, body,
              });
              core.info(`Updated existing PAT-rotation issue #${already.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['security', 'release-blocker'],
              });
              core.info(`Opened PAT-rotation issue #${created.data.number}`);
            }
