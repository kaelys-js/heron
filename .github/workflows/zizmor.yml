name: zizmor — workflow security scan
# G9 -- static analyzer for GitHub Actions workflows. Flags:
#   - Template injection (`run: echo ${{ github.event.... }}`)
#   - Unconditional checkout of PR head from pull_request_target
#   - Excessive permissions (write-all)
#   - Untrusted input flowing into shell
#   - Cache poisoning via writeable cache key
#   - Self-hosted runner misuse
#
# Runs on every workflow file change + weekly. SARIF lands in
# GitHub Code Scanning alongside CodeQL.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  schedule:
    - cron: "37 4 * * 1" # Weekly Monday 04:37 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Scan workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # SARIF upload to Code Scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # SHA-pinned uv installer instead of `curl ... | sh`. CodeQL
      # `PinnedDependenciesID` flagged the curl-pipe-sh pattern -- the
      # script is fetched + executed in one shot with no integrity
      # verification. The astral-sh/setup-uv action is published by the
      # uv maintainers and is SHA-pinned per repo policy.
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v6.10.1
        with:
          version: "0.5.20"

      - name: Run zizmor
        # No `|| true`: zizmor's non-zero exit FAILS this step, which
        # marks the `Scan workflows` PR check red. The previous form
        # ('always exit 0; let branch protection block via SARIF
        # severity') let zizmor findings sneak through PR CI because
        # the SARIF gate fires only at MERGE time -- by then it's
        # already a 'why didn't this fail in PR?' incident.
        #
        # `--min-severity=medium` filters out pedantic informational
        # findings (audit-only) so CI failures map to real
        # ⩾ medium-severity workflow issues worth fixing.
        run: |
          set -e
          # zizmor 1.x writes SARIF to stdout; redirect to a file.
          # `--output=zizmor.sarif` was rejected as an unknown flag.
          uvx zizmor@1.25.2 --min-severity=medium --format=sarif .github/workflows/ > zizmor.sarif

      - name: Upload SARIF to code-scanning
        # `if: always()` so the SARIF still uploads when zizmor exited
        # non-zero -- otherwise the developer sees "Scan workflows red"
        # with no visible findings to act on.
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
