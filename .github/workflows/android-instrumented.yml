# H.G -- Android Espresso (instrumented) tests on a real emulator.
# Isolating startup_failure cause -- only emulator-runner action added.
name: Android Espresso

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emulator:
    name: Espresso smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 34
          script: echo "hello"
