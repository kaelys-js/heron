# H.G -- Android Espresso (instrumented) tests on a real emulator.
# Lives in its own workflow file (vs being merged into test.yml) because
# the emulator job in test.yml triggered `startup_failure` on every
# push; isolating it here gives an independent diagnostic surface.
#
# See ui/android/app/src/androidTest/ for the tests.
name: Android Espresso

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emulator:
    name: Espresso on Pixel 7 / API 34
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply brand
        run: pnpm brand:apply

      - name: Build SvelteKit static
        working-directory: ui
        env:
          CAPACITOR: '1'
        run: pnpm run build:static

      - name: Capacitor sync android
        working-directory: ui
        run: pnpm exec cap sync android

      - name: Cache AVD
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-pixel-7-api-34-v1

      - name: Run instrumented tests on Pixel 7 / API 34
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            cd ui/android
            ./gradlew :app:connectedDebugAndroidTest :app:jacocoTestReport --no-daemon --stacktrace

      - name: Upload coverage to Codecov (android flag, additive)
        if: always() && hashFiles('ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml') != ''
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ui/android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: android-instrumented
          fail_ci_if_error: false
          use_oidc: true
          verbose: true

      - name: Upload instrumented test reports on failure
        if: always() && hashFiles('ui/android/app/build/reports/androidTests/connected/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-instrumented-reports-${{ github.run_id }}
          path: ui/android/app/build/reports/androidTests/connected/
          retention-days: 14
          if-no-files-found: ignore
