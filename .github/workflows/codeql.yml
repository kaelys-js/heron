name: 'CodeQL Analysis'
# G8 -- extended to cover Python (scripts/) + Swift (ui/ios/App). Pre-fix
# only TS was analyzed; we ship Python scrapers + a 5-target iOS app
# and missed half the attack surface.
#
# Matrix legs run in parallel on independent runners.
#   • javascript-typescript -- ubuntu, autobuild (just `pnpm install`)
#   • python                -- ubuntu, autobuild (scripts/ pure Python)
#   • swift                 -- macos-15, manual build (xcodebuild)
#
# Go was dropped in commit 7b15e50 (the Go TUI was superseded by the
# SvelteKit dashboard). Renovate is also gated against the deleted
# directory in renovate.json::gomod.enabled=false + ignorePaths so
# stale PRs against the removed go.mod can't reappear.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday 4am UTC

# Workflow-level stays read-only; the one job that needs to upload
# SARIF claims `security-events: write` for itself. Scorecard's
# TokenPermissions rubric wants writes scoped to the job that uses them.
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Swift needs macOS; everything else stays on ubuntu for speed + cost.
    runs-on: ${{ matrix.language == 'swift' && 'macos-15' || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Code Scanning
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python, swift]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` runs ~70 queries beyond the default
          # `security-extended`. Catches dataflow + control-flow patterns
          # the default set misses. ~5min extra per leg, run weekly + on
          # main pushes only (not every PR -- those use the lighter default
          # set on the path filter).
          queries: ${{ github.event_name == 'pull_request' && 'security-extended' || 'security-and-quality' }}

      # JavaScript/TypeScript + Python autobuild via pnpm install / uv pip
      # -- no extra build step.
      - name: Autobuild
        if: matrix.language != 'swift'
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4

      # Swift needs an explicit xcodebuild step so CodeQL can extract the
      # full module graph. Match the test.yml ios job's Xcode pin.
      #
      # Capacitor 8 uses SPM (Swift Package Manager) -- there is NO
      # App.xcworkspace at the project root. Build against
      # App.xcodeproj directly. SPM dependencies (CapApp-SPM +
      # @capacitor/* plugin local packages) resolve via the xcodeproj's
      # package references.
      - name: Build Swift target
        if: matrix.language == 'swift'
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
        working-directory: ui/ios/App
        run: |
          # Generate any missing Xcode targets first (matches `pnpm setup:native`).
          if [ -f ../../../scripts/native/add-xcode-targets.rb ]; then
            ruby ../../../scripts/native/add-xcode-targets.rb || true
          fi
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | xcbeautify --renderer github-actions || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: '/language:${{ matrix.language }}'
