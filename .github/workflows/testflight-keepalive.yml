# TestFlight builds expire after 90 days. This workflow runs on the 1st
# of every other month at 09:00 UTC, triggering a fresh build that pushes
# to TestFlight as a new version. Internal testers see it within minutes,
# no Apple beta review.
#
# To override the cadence: edit the cron expression. Current setting
# means rebuilds happen every ~60 days (well within the 90d expiry).
name: testflight-keepalive

on:
  schedule:
    # Every other month on the 1st at 09:00 UTC.
    # cron: "minute hour day-of-month month day-of-week"
    - cron: '0 9 1 */2 *'
  workflow_dispatch:

# Workflow-level default = nothing. The job needs contents:write to
# push the tag that fires native-release.yml.
permissions: {}

concurrency:
  group: testflight-keepalive
  cancel-in-progress: false

jobs:
  rebuild:
    name: Push keepalive tag (triggers native-release.yml)
    # Tagging doesn't need macOS -- pick the cheap runner. The actual
    # build runs on macOS via native-release.yml after the tag push.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # pushes the keepalive tag that triggers native-release
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # zizmor/artipacked -- don't persist token in .git/config; we
          # re-inject it inline in the push step below.
          persist-credentials: false
          fetch-depth: 0
      - name: Bump build number + push keepalive tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./ui/electron/package.json').version")
          DATE_TAG=$(date +%Y%m%d)
          NEW_TAG="v${CURRENT}-tf${DATE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "TestFlight keepalive rebuild ${DATE_TAG}"
          # Push via a token-injected URL so the credential is scoped to
          # this single command and never lands in .git/config.
          HOSTLESS_URL="${SERVER_URL#https://}"
          git push "https://x-access-token:${GH_TOKEN}@${HOSTLESS_URL}/${REPO}.git" "$NEW_TAG"
          # Visible outcome -- the tag push triggers native-release.yml
          # which runs build-ios on macOS-15 and pushes to TestFlight.
          echo "::notice::Pushed keepalive tag $NEW_TAG. native-release.yml will now build + upload to TestFlight."
          {
            echo "### 📦 Keepalive tag pushed: $NEW_TAG"
            echo ""
            echo "Base version: \`$CURRENT\`"
            echo "Build date:   \`$DATE_TAG\`"
            echo ""
            echo "Watch \`native-release.yml\` for the iOS build + TestFlight upload."
          } >> "$GITHUB_STEP_SUMMARY"
      # The tag push triggers native-release.yml which runs build-ios.
