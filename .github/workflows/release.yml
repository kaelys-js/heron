# release -- automated semantic releases via Release Please.
#
# Flow:
#
#   1. Every push to main runs Release Please.
#   2. Release Please reads commits since the last release and decides:
#        feat: ...        → minor bump (1.6.0 → 1.7.0)
#        fix: / perf: ... → patch bump (1.6.0 → 1.6.1)
#        feat!: ...       → MAJOR bump (1.6.0 → 2.0.0)
#        BREAKING CHANGE: → MAJOR (in commit body)
#        chore: docs: refactor: test: ci: build: style: → no bump
#   3. If there are bump-worthy commits, Release Please opens (or updates)
#      a "release PR" that accumulates the changes + CHANGELOG entries.
#      The PR sits there until you merge it -- gives you a chance to review
#      what's about to ship.
#   4. When the release PR is merged: Release Please cuts the actual
#      release -- creates the git tag, the GitHub Release, the CHANGELOG
#      commit, and emits a `releases_created: true` output.
#   5. This workflow then triggers native-release.yml via workflow_call to
#      build DMG / .exe / .AppImage / iOS TestFlight artifacts and attach
#      them to the just-created GitHub Release.
#
# Manual override: `pnpm release patch` from the CLI still works -- it
# bypasses Release Please and pushes a tag directly. native-release.yml
# picks up that tag via its `on: push: tags` trigger.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Top-level is read-only. release-please needs writes to create
# branches + PRs + tags + comment on issues; declared inside the job.
permissions:
  contents: read

# Avoid overlapping releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please (semver + CHANGELOG + tag)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # release-please creates tags + the GitHub Release
      pull-requests: write # creates / updates the release PR
      issues: write # comments on closed issues that ship in the release
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }}.${{ steps.rp.outputs.patch }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # GitHub auto-provided token works for opening release PRs and
          # cutting releases. For triggering downstream workflows we use
          # the workflow_call below, which inherits the same run context
          # without needing a PAT.
          token: ${{ secrets.GITHUB_TOKEN }}

      # Visible outcome in the Actions summary tab. Release Please's own
      # output is opaque (just `release_created: true|false`); this step
      # makes the result legible at a glance + tells the maintainer what
      # to expect next (the build-natives workflow_call to native-release.yml).
      - name: Log release-please outcome
        if: always()
        env:
          RELEASE_CREATED: ${{ steps.rp.outputs.release_created }}
          TAG_NAME: ${{ steps.rp.outputs.tag_name }}
          VERSION: ${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }}.${{ steps.rp.outputs.patch }}
        run: |
          if [ "$RELEASE_CREATED" = "true" ]; then
            echo "::notice::Released $TAG_NAME (v$VERSION). native-release.yml fires next."
            {
              echo "### Release cut: $TAG_NAME"
              echo ""
              echo "Version: \`v$VERSION\`"
              echo ""
              echo "GitHub Release created + tag pushed. \`native-release.yml\` now builds"
              echo "DMG / .exe / .AppImage / iOS TestFlight artefacts and attaches them"
              echo "to the Release."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::No release this run (no bump-worthy commits since last tag, or release PR not yet merged)."
            echo "### No release cut this run" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Post a brand-voiced release announcement to Discord #changelog.
      # Supplements the existing /github webhook (which auto-formats
      # releases generically). This post matches VOICE.md tone: no
      # decorative emojis, no exclamation marks, no urgency-by-typography.
      # Gated on DISCORD_WEBHOOK_RELEASES so the workflow stays green
      # when the webhook isn't configured yet.
      - name: Announce release on Discord
        if: ${{ steps.rp.outputs.release_created == 'true' && env.DISCORD_WEBHOOK_RELEASES != '' }}
        env:
          DISCORD_WEBHOOK_RELEASES: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
          TAG_NAME: ${{ steps.rp.outputs.tag_name }}
          VERSION: ${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }}.${{ steps.rp.outputs.patch }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pull the release notes (Release Please's auto-generated body)
          # via the GitHub API; trim to a Discord-safe length (4096 char
          # cap on embed.description, but we cap to 1500 to leave room
          # for the surrounding template).
          NOTES=$(gh api "/repos/${{ github.repository }}/releases/tags/$TAG_NAME" --jq '.body' 2>/dev/null \
            | head -c 1500 \
            | sed 's/"/\\"/g' \
            | tr '\n' '|' | sed 's/|/\\n/g')
          # Heron-branded embed. No decorative emojis (VOICE.md #3). The
          # tagline is loaded from brand.json at apply-brand time and
          # baked into the payload here.
          PAYLOAD=$(cat <<EOF
          {
            "username": "Heron Releases",
            "avatar_url": "https://github.com/${{ github.repository_owner }}.png",
            "embeds": [{
              "title": "v${VERSION} released",
              "description": "Stand still. Strike well.\n\n${NOTES}",
              "url": "${REPO_URL}/releases/tag/${TAG_NAME}",
              "color": 4742519,
              "footer": {
                "text": "${{ github.repository }} . release.yml"
              }
            }]
          }
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_RELEASES" \
            -o /dev/null \
            --max-time 30 \
            || echo "::warning::Discord webhook POST failed (release announcement)."

  # When Release Please cuts a real release (i.e. the release PR was just
  # merged), kick off the cross-platform build. workflow_call within the
  # same run means we don't need a PAT.
  #
  # Permissions: a calling job that uses `uses: ./...` MUST grant >= the
  # permissions the called workflow's jobs declare, otherwise GitHub fails
  # the run at PARSE time with "nested job is requesting X but is only
  # allowed Y". native-release.yml's build-desktop + build-ios both
  # request contents:write (gh release upload), id-token:write (Sigstore
  # OIDC), attestations:write (actions/attest-build-provenance). The
  # top-level `permissions: contents: read` doesn't cascade write access
  # to this job, so we grant the trio explicitly here.
  #
  # zizmor: ignore[secrets-inherit]
  # We previously enumerated each Apple signing secret explicitly to satisfy
  # zizmor's secrets-inherit warning, but that pattern hard-fails at workflow
  # PARSE time when any of those secrets is missing from the repo (GitHub's
  # validation got stricter mid-2025 -- the prior lenient resolve-to-empty
  # behaviour was a security gap). native-release.yml's preflight job
  # validates each required secret itself with a clear error message, so
  # inheriting all secrets here is functionally identical AND avoids the
  # startup_failure when the Apple cert secrets haven't been populated yet
  # (first-time setup of a fork). The zizmor finding is acceptable: the
  # called workflow is in this same repo (./.github/workflows/native-release.yml)
  # so there's no third-party-secret-exfiltration risk.
  build-natives:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write # gh release upload + electron-builder publish
      id-token: write # SLSA / Sigstore provenance via OIDC
      attestations: write # actions/attest-build-provenance
    uses: ./.github/workflows/native-release.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit
