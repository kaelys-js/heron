name: PR quality comment
# Posts the `heron-pr-quality` sticky comment on every PR. Triggered by
# Tests completing -- reads the Tests run's jobs via the GH API and
# aggregates lint / format / typecheck outcomes into one table.
#
# Auto-discovery via keyword match (see format-quality.mjs::QUALITY_KEYWORDS):
# add a new lint workflow with `lint`, `format`, or any of the matching
# keywords in the job name and it shows up here without code edits.

on: # zizmor: ignore[dangerous-triggers]
  # SAFETY: same as coverage-comment.yml + pr-ci-summary.yml -- this
  # workflow:
  #   1. Never checks out the PR head; only reads main + queries the GH
  #      API for job metadata (no PR-controlled content reaches a shell).
  #   2. Calls only the composite sticky-comment action, which is also
  #      argv-safe.
  workflow_run:
    workflows: ['Tests']
    types: [completed]

permissions: {}

concurrency:
  group: quality-comment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-quality sticky
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      contents: read
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout main (for the scripts; never the PR head)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1

      - name: Fetch source-run jobs from GH API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          # `gh api --paginate` emits multiple JSON objects concatenated
          # (one per page). We need them merged into one `{jobs: [...]}`.
          # `--slurp` is a `jq` flag, not a `gh api` flag (that was the bug
          # that took quality-comment red on main). Pipe through `jq -s` to
          # slurp the pages into an array, then merge the `jobs` arrays.
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID/jobs" --paginate \
            | jq -s '{jobs: (map(.jobs) | add)}' > jobs.json
          echo "::notice::Fetched $(jq '.jobs | length' jobs.json) jobs for run $RUN_ID."

      - name: Fetch logs for each failed job
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Per-job logs feed format-quality's per-tool error-count
          # aggregation. The gh api endpoint returns plain text.
          mkdir -p failed-logs
          jq -r '.jobs[] | select(.conclusion == "failure") | .id' jobs.json \
            | while read -r job_id; do
                [ -z "$job_id" ] && continue
                gh api "repos/$GH_REPO/actions/jobs/$job_id/logs" \
                  > "failed-logs/$job_id.txt" 2>/dev/null \
                  || echo "::warning::Couldn't fetch log for job $job_id"
              done

      - name: Format quality sticky body
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          node .github/scripts/sticky/format-quality.mjs jobs.json \
            --repo "$GH_REPO" \
            --logs-dir failed-logs \
            --out body.md

      - name: Stage quality summary
        run: |
          if [ -f body.md ]; then cp body.md quality.md; fi

      - name: Upload quality summary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: summary-quality
          path: quality.md
          if-no-files-found: ignore
          retention-days: 7
