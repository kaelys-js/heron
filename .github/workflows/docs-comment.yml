name: PR docs comment
# Posts the heron-pr-docs sticky -- aggregates cspell + remark-lint
# over the .md files changed in the PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.md'

permissions: {}

concurrency:
  group: docs-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-docs sticky
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true

      - name: Resolve changed .md files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --diff-filter=AM --name-only "$BASE_SHA..$HEAD_SHA" | grep -E '\.md$' > changed-md.txt || true

      - name: Run cspell
        run: |
          set -euo pipefail
          if [ ! -s changed-md.txt ]; then echo "[]" > cspell.json; exit 0; fi
          # Build the file-arg list via xargs so cspell gets one arg per file.
          # CRITICAL: redirect stderr to /dev/null (not to the JSON file).
          # `2>&1` would smuggle `npm warn Unsupported engine:` (and
          # pnpm/npm version mismatch chatter) into the JSON, making the
          # formatter's `JSON.parse` blow up with "Unexpected token 'p'".
          # `|| echo "[]"` ensures we always have valid JSON even when
          # cspell exits non-zero with findings.
          if ! xargs -a changed-md.txt npx --yes cspell --reporter=json --no-progress --no-summary -- 2>/dev/null > cspell.json; then
            # cspell exits non-zero when issues are found; keep its JSON.
            if [ ! -s cspell.json ]; then echo "[]" > cspell.json; fi
          fi
          # Sanity-check: if anything ate the start of the file (engine
          # warnings, pnpm noise), fall back to an empty array so the
          # formatter doesn't crash.
          head -c1 cspell.json | grep -qE '[\[{]' || echo "[]" > cspell.json

      - name: Run remark-lint
        run: |
          set -euo pipefail
          if [ ! -s changed-md.txt ]; then echo "[]" > remark.json; exit 0; fi
          # Same stderr-isolation as cspell. remark-cli sends progress + path
          # info to stderr; only the structured report goes to stdout.
          if ! xargs -a changed-md.txt npx --yes remark --quiet --report json --setting commonmark 2>/dev/null > remark.json; then
            if [ ! -s remark.json ]; then echo "[]" > remark.json; fi
          fi
          head -c1 remark.json | grep -qE '[\[{]' || echo "[]" > remark.json

      - name: Format docs sticky
        run: node .github/scripts/sticky/format-docs.mjs --cspell=cspell.json --remark=remark.json --out body.md

      - name: Stage docs summary
        run: |
          if [ -f body.md ]; then cp body.md docs.md; fi

      - name: Upload docs summary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: summary-docs
          path: docs.md
          if-no-files-found: ignore
          retention-days: 7
