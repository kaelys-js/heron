name: native-release

# Cross-platform native builds -- desktop (DMG / .exe / .AppImage) + iOS (TestFlight).
#
# Triggered three ways:
#   1. Tag push (manual escape hatch -- `pnpm release patch` still works).
#   2. workflow_dispatch from the GitHub UI.
#   3. workflow_call from release.yml after release-please cuts a new
#      version. This is the primary path: every merged feat/fix commit
#      eventually graduates into a release that fires native-release.
#
# Secrets required (configure in GitHub repo settings → Secrets):
#   APPLE_TEAM_ID            -- found in developer.apple.com
#   MAC_CERTIFICATE          -- base64-encoded Developer ID Application .p12
#   MAC_CERTIFICATE_PASSWORD -- the .p12 export password
#
#   Optional (Mac App Store distribution of the electron-builder `mas`
#   target; if unset, MAS signing cleanly skips and the Developer-ID
#   dmg/zip build ships as usual -- gated on MAC_MAS_CERTIFICATE != ''):
#   MAC_MAS_CERTIFICATE             -- base64 .p12 bundling BOTH the "Apple
#                                      Distribution" (3rd Party Mac Developer
#                                      Application) and the "Mac Installer
#                                      Distribution" identities for the team
#   MAC_MAS_CERTIFICATE_PASSWORD    -- that .p12's export password
#   MAC_PROVISIONING_PROFILE_BASE64 -- base64 of the Mac App Store provisioning
#                                      profile for com.resistjs.heron, decoded to
#                                      ui/electron/build/embedded.provisionprofile
#
#   MATCH_GIT_URL            -- private git repo holding the Fastlane match
#                               certs + provisioning profiles (read-only on CI)
#   MATCH_PASSWORD           -- match repo encryption passphrase
#
#   App Store Connect API auth (preferred over legacy app-specific-password):
#   APP_STORE_CONNECT_KEY_ID       -- the 10-char key ID
#   APP_STORE_CONNECT_ISSUER_ID    -- UUID issuer id
#   APP_STORE_CONNECT_PRIVATE_KEY  -- full .p8 contents (base64-encoded)
#
# Optional (Windows code-signing via SignPath Foundation; if unset, the
# Windows .exe ships unsigned and triggers SmartScreen on first launch):
#   SIGNPATH_API_TOKEN              -- REST API token from signpath.io
#   SIGNPATH_ORGANIZATION_ID        -- org GUID
#   SIGNPATH_PROJECT_SLUG           -- project identifier
#   SIGNPATH_SIGNING_POLICY_SLUG    -- signing policy identifier
#
# Optional (Microsoft Store submission via Partner Center; if unset,
# the Windows .appx is built but not uploaded to the Microsoft Store
# -- direct .exe download via GitHub Releases stays the supported path):
#   MICROSOFT_STORE_TENANT_ID       -- Azure AD tenant GUID
#   MICROSOFT_STORE_CLIENT_ID       -- Partner Center app registration client ID
#   MICROSOFT_STORE_CLIENT_SECRET   -- Partner Center app registration client secret
#   MICROSOFT_STORE_PRODUCT_ID      -- the 12-char product ID from the app reservation
#
# Optional (Google Play Store via Fastlane supply; if unset, the
# build-android job is skipped entirely. Direct .apk download isn't
# distributed -- Play Store is the only Android distribution channel):
#   PLAY_STORE_JSON_KEY             -- base64-encoded service-account .json
#                                      (Play Console "Release manager" role)
#   ANDROID_KEYSTORE_BASE64         -- base64-encoded release .keystore
#   ANDROID_KEYSTORE_PASSWORD       -- keystore password
#   ANDROID_KEY_ALIAS               -- usually "heron"
#   ANDROID_KEY_PASSWORD            -- key password
#
#   GITHUB_TOKEN             -- auto-provided by Actions
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version tag to build (e.g. 1.7.0). Required when called.'
        required: true
        type: string
    # Declared secrets: required: false on every entry.
    #
    # Why not required: true: GitHub's workflow-call parser hard-rejects
    # the calling workflow at PARSE time when any `required: true`
    # secret is undefined on the repo, even when the calling job has
    # an `if:` that would skip the call. That's a startup_failure
    # before any job runs -- the user never sees the helpful error
    # message from the preflight job below.
    #
    # The right enforcement point is the `preflight` job (below),
    # which has an explicit secret-by-secret check with clear
    # remediation instructions. Marking required: false here lets
    # the workflow LOAD; preflight then validates + fails loud with
    # the actionable error if any secret is empty.
    #
    # Adding a new signing secret? Declare it here (required: false)
    # AND add it to the preflight `for var in ...` loop below.
    secrets:
      APPLE_TEAM_ID:
        required: false
      # Account-holder Apple ID. Not a signing secret: the ASC API key
      # authenticates uploads. ensure_internal_delivery uses it to add the
      # maintainer to the internal TestFlight group so builds land on-device.
      APPLE_ID:
        required: false
      MAC_CERTIFICATE:
        required: false
      MAC_CERTIFICATE_PASSWORD:
        required: false
      # Mac App Store distribution of the electron-builder `mas` target
      # (optional; gated on MAC_MAS_CERTIFICATE != '' in build-desktop so a
      # missing cert cleanly skips MAS signing while dmg/zip still ship).
      MAC_MAS_CERTIFICATE:
        required: false
      MAC_MAS_CERTIFICATE_PASSWORD:
        required: false
      MAC_PROVISIONING_PROFILE_BASE64:
        required: false
      # iOS code signing is Fastlane match (certs + profiles in an encrypted
      # private repo, fetched read-only on CI). No raw cert/profile secrets.
      MATCH_GIT_URL:
        required: false
      MATCH_PASSWORD:
        required: false
      # Repo-scoped SSH deploy key for the private match certs repo (so CI
      # can clone it read-only). Provisioned by setup:native.
      MATCH_GIT_PRIVATE_KEY:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_PRIVATE_KEY:
        required: false
      # SignPath Foundation OSS code-signing (optional; if unset, the
      # Windows .exe ships unsigned and triggers SmartScreen on first
      # launch). Wired in build-desktop's Windows leg, gated on
      # env.SIGNPATH_API_TOKEN != '' so missing secrets cleanly skip.
      SIGNPATH_API_TOKEN:
        required: false
      SIGNPATH_ORGANIZATION_ID:
        required: false
      SIGNPATH_PROJECT_SLUG:
        required: false
      SIGNPATH_SIGNING_POLICY_SLUG:
        required: false
      # Microsoft Store Partner Center API (optional; if unset, the
      # .appx is built but not submitted to the Microsoft Store --
      # direct .exe via GitHub Releases remains supported).
      MICROSOFT_STORE_TENANT_ID:
        required: false
      MICROSOFT_STORE_CLIENT_ID:
        required: false
      MICROSOFT_STORE_CLIENT_SECRET:
        required: false
      MICROSOFT_STORE_PRODUCT_ID:
        required: false
      # Google Play Store via Fastlane supply (optional; if unset, the
      # build-android job is skipped). 5 secrets total: a service-account
      # JSON for Play Console + 4 release-keystore values.
      PLAY_STORE_JSON_KEY:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
      # Discord webhook for per-platform build-status posts (#ci-builds).
      # If unset, no Discord posting -- the workflow stays green.
      DISCORD_WEBHOOK_BUILDS:
        required: false

# Workflow-level is read-only -- each job declares the writes it
# genuinely needs (contents: write to attach binaries, id-token /
# attestations for Sigstore provenance). Keeps Scorecard's
# TokenPermissions check happy and prevents a newly-added job from
# silently inheriting release-time writes.
permissions:
  contents: read

# Two release tags landing in quick succession waste 30min of CI per
# job. Only one native-release run per ref at a time. We don't cancel
# in-progress because half-uploaded TestFlight builds are a mess.
concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fail-fast preflight: verify every required secret is configured BEFORE
  # spending 30 minutes on a doomed iOS / desktop build that'll explode at
  # the signing step. This is the CI mirror of `pnpm doctor:native`. If you
  # see this job red, you forgot `pnpm setup:native`.
  preflight:
    name: Preflight — native-release secrets present
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Harden runner
        # G4 -- defense-in-depth against compromised actions. `audit` mode
        # surfaces unexpected egress in the run logs; promote to `block`
        # after 2 weeks of green runs once the allowed-endpoints list is
        # known-good. Especially valuable on this job because the secrets
        # block above grants access to Apple signing certs + ASC API key.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Required secret check
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # MAS signing is optional but all-or-nothing -- validated as a group below.
          MAC_MAS_CERTIFICATE: ${{ secrets.MAC_MAS_CERTIFICATE }}
          MAC_MAS_CERTIFICATE_PASSWORD: ${{ secrets.MAC_MAS_CERTIFICATE_PASSWORD }}
          MAC_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          missing=()
          for var in APPLE_TEAM_ID MAC_CERTIFICATE MAC_CERTIFICATE_PASSWORD \
                     MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_PRIVATE_KEY \
                     APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::native-release blocked — these secrets are missing:"
            for m in "${missing[@]}"; do echo "::error::  • $m"; done
            echo ""
            echo "Fix locally:"
            echo "  pnpm setup:native      # interactive wizard"
            echo "  pnpm doctor:native     # verify"
            echo ""
            echo "Or configure manually at:"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✅ all required secrets present"

          # MAS signing is OPTIONAL but all-or-nothing: if the distribution
          # cert is set, its companion secrets must be too -- otherwise the run
          # would fail much later (security import / electron-builder) instead
          # of here in the 2-minute preflight. With none set, MAS simply skips.
          if [ -n "$MAC_MAS_CERTIFICATE" ]; then
            mas_missing=()
            for var in MAC_MAS_CERTIFICATE_PASSWORD MAC_PROVISIONING_PROFILE_BASE64; do
              if [ -z "${!var}" ]; then
                mas_missing+=("$var")
              fi
            done
            if [ ${#mas_missing[@]} -gt 0 ]; then
              echo "::error::MAC_MAS_CERTIFICATE is set but its companion MAS secrets are missing:"
              for m in "${mas_missing[@]}"; do echo "::error::  • $m"; done
              echo "::error::Set all three (cert + password + provisioning profile) to enable Mac App Store signing, or none to skip it."
              exit 1
            fi
            echo "✅ MAS signing fully configured"
          fi

  build-desktop:
    name: Build ${{ matrix.os }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write # gh release upload
      id-token: write # SLSA / Sigstore provenance
      attestations: write # GitHub attestations API
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - name: Harden runner
        # G4 -- harden every native build runner. The macos leg writes
        # the signing cert to the runner keychain; the windows leg
        # signs with the (forthcoming G18) Azure trusted-signing token.
        # Audit mode for the rollout -- flip to `block` after observing
        # legitimate endpoints.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # mise installs Node + pnpm versions pinned in .mise.toml so CI
      # uses the same versions developers run locally.
      #
      # zizmor/cache-poisoning: this workflow only runs on tag pushes /
      # workflow_call from release.yml / workflow_dispatch -- ALL three
      # require maintainer write access (PR-based events can't push
      # tags or call this reusable workflow). Cache keys are hashed on
      # repo content (.mise.toml, lockfiles) that's only mutable via
      # merged PRs that already passed PR CI, so a malicious PR can't
      # poison the release-time cache without first getting code merged.
      - name: Setup mise (Node + pnpm from .mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4 # zizmor: ignore[cache-poisoning]
        with:
          experimental: true
          cache: true
          # Install ONLY the runtimes the electron build needs. The desktop
          # matrix runs on windows-latest too, and `.mise.toml` pins swiftlint
          # (aqua: linux/darwin only -- no Windows binary), so a full
          # `mise install` aborts on Windows. node + pnpm are all the icon-gen
          # / cap-sync / electron-builder steps use. (build-ios + build-android
          # keep the full install -- they run on macOS/Linux and need Ruby.)
          install_args: node pnpm

      # Cache pnpm's content-addressable store. Restore-keys lets a
      # changed lockfile still reuse most of the previous cache.
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      # zizmor: ignore[cache-poisoning] -- see jdx/mise-action note above.
      # pnpm-lock.yaml is integrity-verified at install time.
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # Cache electron-builder's intermediate downloads (electron
      # binaries, app-builder, etc.) -- saves ~2min per run.
      # zizmor: ignore[cache-poisoning] -- electron downloads are
      # SHA256-verified by electron-builder against the version pinned
      # in ui/electron/package.json (which keys the cache).
      - name: Cache electron-builder downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~\AppData\Local\electron-builder\Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('ui/electron/package.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      # Single root install covers every workspace (ui + ui/electron).
      # The preinstall guard refuses npm/yarn/bun -- pnpm only.
      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit (Node adapter — embedded server entry)
        working-directory: ui
        run: pnpm build

      - name: Build SvelteKit (static — WebView shell)
        working-directory: ui
        env:
          CAPACITOR: '1'
          PUBLIC_CAPACITOR_BUILD: '1'
        run: pnpm build

      - name: Generate icons
        run: node scripts/native/icons/generate-icons.mjs

      - name: Capacitor sync (electron)
        working-directory: ui
        run: pnpm exec cap sync electron

      - name: Compile electron TS
        working-directory: ui/electron
        run: pnpm run build

      # macOS-only: import signing certs before electron-builder runs. One
      # keychain holds BOTH identities so a single electron-builder run signs
      # the dmg/zip (Developer ID + notarize) AND the mas .pkg (Apple
      # Distribution + Mac Installer Distribution). Either cert is optional and
      # imported only when its secret is set; MAS-specific signing degrades to
      # a skip (the dmg/zip Developer-ID build still ships).
      - name: Import macOS signing certs
        if: matrix.os == 'macos-latest'
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_MAS_CERTIFICATE: ${{ secrets.MAC_MAS_CERTIFICATE }}
          MAC_MAS_CERTIFICATE_PASSWORD: ${{ secrets.MAC_MAS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$MAC_CERTIFICATE" ] && [ -z "$MAC_MAS_CERTIFICATE" ]; then
            echo "No signing certs — building unsigned (Gatekeeper warning expected; mas target won't sign)"
            exit 0
          fi
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          if [ -n "$MAC_CERTIFICATE" ]; then
            echo "$MAC_CERTIFICATE" | base64 --decode > /tmp/cert.p12
            security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign
            rm -f /tmp/cert.p12
            echo "Developer ID cert imported (dmg/zip signing + notarization)"
          fi
          if [ -n "$MAC_MAS_CERTIFICATE" ]; then
            echo "$MAC_MAS_CERTIFICATE" | base64 --decode > /tmp/mas-cert.p12
            # productbuild/productsign sign the installer .pkg; codesign signs
            # the bundled .app -- grant all three access to the imported keys.
            security import /tmp/mas-cert.p12 -k build.keychain -P "$MAC_MAS_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign
            rm -f /tmp/mas-cert.p12
            echo "Mac App Distribution cert imported (mas .app + .pkg signing)"
          fi
          # One partition-list pass authorises Apple tools to use every key in
          # the keychain without an interactive unlock prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain >/dev/null

      # @electron/notarize -> `notarytool --key` expects a FILE PATH, not the
      # key contents. Decode the base64 .p8 to the canonical location (same as
      # the .pkg/altool leg below) and point APPLE_API_KEY at the file.
      - name: Decode ASC API key (.p8) for notarization
        if: matrix.os == 'macos-latest' && env.APP_STORE_CONNECT_KEY_ID != ''
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      # The electron-builder `mas` target reads its embedded provisioning
      # profile from build/embedded.provisionprofile (see electron-builder.config.json
      # mas.provisioningProfile). Decode it from the secret before the build;
      # gated on the secret so MAS signing skips cleanly when it's unset.
      - name: Write Mac App Store provisioning profile
        if: matrix.os == 'macos-latest' && env.MAC_PROVISIONING_PROFILE_BASE64 != ''
        working-directory: ui/electron
        env:
          MAC_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          printf "%s" "$MAC_PROVISIONING_PROFILE_BASE64" | base64 --decode > build/embedded.provisionprofile
          echo "Wrote build/embedded.provisionprofile ($(wc -c < build/embedded.provisionprofile) bytes)"

      - name: Run electron-builder (publishes to GitHub Release on tag)
        working-directory: ui/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Notarization uses the App Store Connect API key (.p8). notarytool
          # needs it as a FILE PATH (decoded in the prior step), not base64.
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          # @electron/notarize reads APPLE_API_ISSUER (not *_KEY_ISSUER).
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Publish only on real releases (tag push / workflow_call from
        # release.yml). On workflow_dispatch test runs, build every target but
        # do NOT publish: the v0.1.0 GitHub Release is immutable, so attaching
        # assets fails ("Cannot upload assets to an immutable release").
        run: pnpm run ${{ github.event_name == 'workflow_dispatch' && 'electron:make:test' || 'electron:make' }}

      # Mac App Store (.pkg) upload via ASC API.
      #
      # electron-builder's `mas` target produces a signed .pkg in
      # ui/electron/dist/mas/. To submit it to Mac App Store review we
      # upload via `xcrun altool` using the App Store Connect API key
      # (the same key used for iOS notarization + TestFlight). Gated on
      # APP_STORE_CONNECT_KEY_ID so the workflow stays green during
      # ASC onboarding -- if the secret is unset, the .pkg ships only
      # to the GitHub Release attachment below + Mac App Store
      # submission is a no-op.
      #
      # NB: the .pkg goes to App Store Connect's "processing" state for
      # 5-30 minutes before becoming available in TestFlight for macOS.
      # Then the maintainer manually clicks "Submit for review" in ASC.
      - name: Upload macOS .pkg to App Store Connect (Mac App Store)
        if: matrix.os == 'macos-latest' && env.APP_STORE_CONNECT_KEY_ID != ''
        working-directory: ui/electron/dist/mas
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Write the .p8 to the canonical location altool expects.
          # The base64-encoded key gets decoded back to the original
          # multiline PEM-formatted .p8 file.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          shopt -s nullglob
          any=false
          for pkg in *.pkg; do
            any=true
            echo "::group::altool upload $pkg"
            xcrun altool --upload-app \
              --type macos \
              --file "$pkg" \
              --apiKey "$APP_STORE_CONNECT_KEY_ID" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
            echo "::endgroup::"
          done
          if [ "$any" = false ]; then
            echo "::warning::No .pkg found in ui/electron/dist/mas/ -- electron-builder did not produce a Mac App Store target."
          fi

      # SignPath Foundation code-signing for the Windows .exe.
      #
      # Why a 3-step dance: SignPath's service signs artifacts that are
      # uploaded as GitHub Actions artifacts; you can't sign a local file
      # in-place. The flow is:
      #
      #   1. upload-artifact: push the unsigned .exe so SignPath can fetch
      #      it by artifact-id (returned in the upload step's output)
      #   2. SignPath/github-action-submit-signing-request: posts a signing
      #      request, waits for the SignPath operator's policy to sign,
      #      downloads the signed .exe back over the local unsigned one
      #   3. Verify Authenticode signature on the downloaded .exe so a
      #      silent signing regression doesn't ship unsigned bits
      #
      # All three steps are gated on `env.SIGNPATH_API_TOKEN != ''` AND
      # `matrix.os == 'windows-latest'`. With no SIGNPATH_API_TOKEN secret
      # configured, every step is skipped and the unsigned .exe ships as-is
      # (SmartScreen warning on first launch; well-known transitional state).
      # Without this guard the workflow would fail-loud the moment SignPath
      # secrets aren't there; the guard lets the workflow stay green during
      # the SignPath Foundation application process.
      #
      # See TODO-INSTRUCTIONS.md "Windows code-signing -- SignPath Foundation"
      # for the application + secret-setup flow.
      - name: Upload unsigned Windows installer (SignPath input)
        id: upload-unsigned-exe
        if: matrix.os == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: heron-windows-unsigned
          path: ui/electron/dist/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign Windows installer via SignPath Foundation
        if: matrix.os == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: SignPath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ui/electron/dist/

      - name: Verify SignPath Authenticode signature
        if: matrix.os == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        shell: pwsh
        working-directory: ui/electron/dist
        run: |
          $any = $false
          foreach ($exe in Get-ChildItem *.exe) {
            $any = $true
            $sig = Get-AuthenticodeSignature $exe.FullName
            if ($sig.Status -ne 'Valid') {
              Write-Error "Authenticode verification failed for $($exe.Name): status=$($sig.Status), msg=$($sig.StatusMessage)"
              exit 1
            }
            Write-Host "OK $($exe.Name) signed by $($sig.SignerCertificate.Subject)"
          }
          if (-not $any) {
            Write-Error "No .exe files found in dist/; SignPath download did not write to output-artifact-directory."
            exit 1
          }

      # Microsoft Store (.appx) submission via Partner Center REST API.
      #
      # electron-builder's `appx` target produces a signed .appx in
      # ui/electron/dist/. To submit it to Microsoft Store certification
      # we hit Partner Center's submission API directly with an OAuth
      # client-credentials flow. Gated on MICROSOFT_STORE_TENANT_ID so
      # the workflow stays green during Partner Center onboarding -- if
      # the secrets are unset, the .appx ships only to the GitHub
      # Release attachment + Microsoft Store submission is a no-op.
      #
      # Flow (manual today; could be moved to an action later if MS
      # publishes one in `actions/`):
      #   1. POST to login.microsoftonline.com to get an access token
      #   2. PATCH the app submission with the .appx file URL + metadata
      #   3. POST to mark the submission as ready for certification
      #
      # The MICROSOFT_STORE_PRODUCT_ID secret comes from the app
      # reservation in Partner Center (the 12-char ID under "Product
      # identity"). Without it the API doesn't know which app to update.
      - name: Submit Windows .appx to Microsoft Store via Partner Center
        if: matrix.os == 'windows-latest' && env.MICROSOFT_STORE_TENANT_ID != ''
        working-directory: ui/electron/dist
        shell: pwsh
        env:
          MICROSOFT_STORE_TENANT_ID: ${{ secrets.MICROSOFT_STORE_TENANT_ID }}
          MICROSOFT_STORE_CLIENT_ID: ${{ secrets.MICROSOFT_STORE_CLIENT_ID }}
          MICROSOFT_STORE_CLIENT_SECRET: ${{ secrets.MICROSOFT_STORE_CLIENT_SECRET }}
          MICROSOFT_STORE_PRODUCT_ID: ${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}
        run: |
          $ErrorActionPreference = 'Stop'
          $appx = Get-ChildItem *.appx -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $appx) {
            Write-Warning "No .appx in ui/electron/dist/; Microsoft Store submission skipped."
            exit 0
          }
          Write-Host "Found $($appx.Name); requesting Partner Center access token..."

          # 1. OAuth client-credentials flow against Azure AD.
          $tokenUrl = "https://login.microsoftonline.com/$env:MICROSOFT_STORE_TENANT_ID/oauth2/v2.0/token"
          $tokenBody = @{
            grant_type = 'client_credentials'
            client_id = $env:MICROSOFT_STORE_CLIENT_ID
            client_secret = $env:MICROSOFT_STORE_CLIENT_SECRET
            scope = 'https://api.partner.microsoft.com/.default'
          }
          $tokenResp = Invoke-RestMethod -Uri $tokenUrl -Method Post -Body $tokenBody
          $accessToken = $tokenResp.access_token
          if (-not $accessToken) {
            Write-Error "Partner Center auth failed: no access_token in response."
            exit 1
          }
          $headers = @{ Authorization = "Bearer $accessToken" }

          # 2. Create a new submission for the product. Partner Center
          #    returns a fileUploadUrl + a submissionId; we PUT the .appx
          #    bytes to fileUploadUrl, then POST commit on the submission.
          $apiBase = "https://manage.devcenter.microsoft.com/v1.0/my/applications"
          $createUrl = "$apiBase/$env:MICROSOFT_STORE_PRODUCT_ID/submissions"
          $submission = Invoke-RestMethod -Uri $createUrl -Method Post -Headers $headers
          Write-Host "Created submission $($submission.id); uploading $($appx.Name)..."

          # 3. PUT the .appx bytes to the pre-signed Azure Blob URL.
          Invoke-RestMethod -Uri $submission.fileUploadUrl -Method Put `
            -InFile $appx.FullName `
            -Headers @{ 'x-ms-blob-type' = 'BlockBlob' }

          # 4. POST commit -- tells Partner Center to start certification.
          $commitUrl = "$apiBase/$env:MICROSOFT_STORE_PRODUCT_ID/submissions/$($submission.id)/commit"
          Invoke-RestMethod -Uri $commitUrl -Method Post -Headers $headers
          Write-Host "::notice::Microsoft Store submission $($submission.id) committed for certification (4-72h queue)."

      - name: Verify macOS notarization-staple
        # G17 -- without this step, a silent notarization regression
        # (Apple's notarytool returns success but the staple isn't
        # written) ships a broken DMG. End users get "App is damaged
        # and can't be opened" with no way to fix it themselves.
        # `xcrun stapler validate` confirms the notarization ticket
        # was actually written to the package; `spctl --assess` runs
        # the same check Gatekeeper does at install time.
        if: matrix.os == 'macos-latest'
        working-directory: ui/electron/dist
        run: |
          set -e
          shopt -s nullglob
          for dmg in *.dmg; do
            echo "::group::Verify $dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type install --verbose "$dmg"
            echo "::endgroup::"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: heron-${{ matrix.os }}
          path: |
            ui/electron/dist/*.dmg
            ui/electron/dist/*.exe
            ui/electron/dist/*.AppImage
            ui/electron/dist/*.deb
            ui/electron/dist/*.zip
            ui/electron/dist/latest*.yml
          if-no-files-found: warn
          retention-days: 90

      - name: Attest build provenance
        # G1 -- SLSA build provenance per binary. End users verify with
        # `gh attestation verify <file> --owner heron`. Signed by
        # Sigstore via OIDC; no per-secret cert management. Failure
        # here doesn't block the release (the binaries are already
        # uploaded by electron-builder above) -- we want the provenance
        # but won't kill a successful build over a Sigstore blip.
        if: success() && hashFiles('ui/electron/dist/*.dmg', 'ui/electron/dist/*.exe', 'ui/electron/dist/*.AppImage') != ''
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ui/electron/dist/*.dmg
            ui/electron/dist/*.exe
            ui/electron/dist/*.AppImage
            ui/electron/dist/*.deb
            ui/electron/dist/*.zip

      # Per-platform Discord status post (gated on DISCORD_WEBHOOK_BUILDS).
      # if: always() so we still post when an earlier step failed --
      # contributors watching #ci-builds need to know which platforms
      # broke, not just which succeeded.
      - name: Post desktop build status to Discord
        if: always() && env.DISCORD_WEBHOOK_BUILDS != ''
        env:
          DISCORD_WEBHOOK_BUILDS: ${{ secrets.DISCORD_WEBHOOK_BUILDS }}
          JOB_STATUS: ${{ job.status }}
          TAG: ${{ github.ref_name }}
          OS: ${{ matrix.os }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          # Map matrix.os to a friendly platform name + colour.
          case "$OS" in
            macos-latest)   PLATFORM="macOS"   ;;
            ubuntu-latest)  PLATFORM="Linux"   ;;
            windows-latest) PLATFORM="Windows" ;;
            *)              PLATFORM="$OS"     ;;
          esac
          # Color via Discord embed: ok = brand reed, fail = destructive red.
          case "$JOB_STATUS" in
            success)   COLOR=8030573; ICON="OK"    ;;
            failure)   COLOR=11026010; ICON="FAIL" ;;
            cancelled) COLOR=10920880; ICON="CANCEL" ;;
            *)         COLOR=11045300; ICON="$JOB_STATUS" ;;
          esac
          PAYLOAD=$(jq -nc \
            --arg title "[$ICON] $PLATFORM build for $TAG" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg footer "${{ github.repository }} . native-release.yml . build-desktop" \
            '{
              username: "Heron Builds",
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                footer: { text: $footer }
              }]
            }')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK_BUILDS" \
            -o /dev/null --max-time 30 \
            || echo "::warning::Discord webhook POST failed (build status, $PLATFORM)."

  build-ios:
    name: Build iOS (TestFlight)
    needs: preflight
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write # gh release upload (TestFlight + GitHub Release)
      id-token: write # SLSA / Sigstore provenance
      attestations: write # GitHub attestations API
    steps:
      - name: Harden runner
        # G4 -- iOS build runner. Handles Apple ASC API key + signing
        # cert; the highest-privilege runner in this workflow. Audit
        # mode to observe what xcodebuild + fastlane reach out to during
        # the rollout.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # macos-26 ships Xcode 26 (the iOS 26 SDK App Store now requires) as its
      # default. If the image also carries a newer versioned Xcode 26.x, prefer
      # it; otherwise the default is already correct. Logged for the record.
      - name: Use Xcode 26 (iOS 26 SDK)
        run: |
          XC=$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort -V | tail -1)
          [ -n "$XC" ] && sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      # mise pins Node + pnpm + Ruby together so Fastlane uses the same
      # Ruby version we develop against locally.
      # zizmor/cache-poisoning -- same release-only-trigger rationale
      # as the build-desktop job above (this workflow runs only on
      # maintainer-pushed tags / workflow_call from release.yml).
      - name: Setup mise (Node + pnpm + Ruby from .mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4 # zizmor: ignore[cache-poisoning]
        with:
          experimental: true
          cache: true

      # Cache pnpm store + Cocoapods caches.
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      # zizmor: ignore[cache-poisoning] -- pnpm integrity-verifies from
      # the lockfile that keys this cache; see build-desktop job notes.
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # Capacitor 8 uses Swift Package Manager (no Cocoapods). Cache
      # Xcode's derived data + the SPM resolved-packages cache.
      # zizmor: ignore[cache-poisoning] -- SPM dependencies are SHA-
      # pinned in Package.resolved (which keys the cache); xcodebuild
      # re-verifies on restore.
      - name: Cache Xcode DerivedData + SPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: spm-derived-${{ runner.os }}-${{ hashFiles('ui/ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: |
            spm-derived-${{ runner.os }}-

      # Bundler installs Fastlane + plugins pinned in Gemfile.lock.
      # Ruby version comes from `.ruby-version` in ui/ios/App/.
      # zizmor: ignore[cache-poisoning] -- bundler verifies gems
      # against the Gemfile.lock checksums; the lockfile is committed
      # and changes only via PR.
      - name: Setup Ruby + bundler-cache (Fastlane gems)
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.308.0 # zizmor: ignore[cache-poisoning]
        with:
          bundler-cache: true
          working-directory: ui/ios/App

      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit (static — WebView shell)
        working-directory: ui
        env:
          CAPACITOR: '1'
          PUBLIC_CAPACITOR_BUILD: '1'
        run: pnpm build

      - name: Generate icons
        run: node scripts/native/icons/generate-icons.mjs

      - name: Capacitor sync (ios)
        working-directory: ui
        run: pnpm exec cap sync ios

      # match clones the PRIVATE certs repo over SSH. setup:native registers
      # a repo-scoped deploy key and stores its private half as the
      # MATCH_GIT_PRIVATE_KEY secret; load it so the `git@github.com:...`
      # MATCH_GIT_URL resolves. match runs read-only here (Fastfile
      # readonly: is_ci); the key's write access is used only by the
      # one-time local bootstrap, never on CI.
      - name: Configure SSH for the match certs repo
        env:
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$MATCH_GIT_PRIVATE_KEY" > ~/.ssh/match_ed25519
          chmod 600 ~/.ssh/match_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          {
            echo 'Host github.com'
            echo '  IdentityFile ~/.ssh/match_ed25519'
            echo '  IdentitiesOnly yes'
          } >> ~/.ssh/config

      - name: Build + upload to TestFlight via Fastlane
        working-directory: ui/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # Account-holder Apple ID. The ASC API key authenticates the
          # upload; APPLE_ID is the email ensure_internal_delivery adds to
          # the "Heron Internal" group so the maintainer receives every
          # build on-device. Without it the lane logs "already covers"
          # (empty) and nobody is invited.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          # App Store Connect API key (.p8) -- preferred over legacy
          # APPLE_ID + app-specific password. Required for 2FA-enabled
          # accounts; reused across every Fastlane lane.
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: bundle exec fastlane beta

      - name: Attest build provenance (.ipa)
        # SLSA build provenance for the iOS .ipa, matching what
        # build-electron already does for the DMG / exe / AppImage.
        # Fastlane's beta lane outputs the signed .ipa to
        # `fastlane/builds/heron-<timestamp>.ipa` before TestFlight
        # upload -- we attest that local file before it gets shipped.
        # `continue-on-error: true` mirrors the electron-side attestation:
        # the binary is already uploaded; we want the attestation but
        # don't kill the release over a Sigstore blip.
        if: success() && hashFiles('ui/ios/App/fastlane/builds/*.ipa') != ''
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ui/ios/App/fastlane/builds/*.ipa

      - name: Upload .ipa as release asset
        # Attach the .ipa to the GitHub Release so end users can verify
        # the attestation against the artifact they downloaded from
        # github.com. `gh attestation verify <ipa> --owner kaelys-js`
        # then succeeds. TestFlight is the primary distribution
        # channel; this is for transparency + audit.
        if: success() && hashFiles('ui/ios/App/fastlane/builds/*.ipa') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for ipa in ui/ios/App/fastlane/builds/*.ipa; do
            [ -f "$ipa" ] || continue
            gh release upload "$TAG_NAME" "$ipa" --clobber || \
              echo "::warning::Couldn't attach $ipa to release $TAG_NAME (release may not exist yet)."
          done

      - name: Post iOS build status to Discord
        if: always() && env.DISCORD_WEBHOOK_BUILDS != ''
        env:
          DISCORD_WEBHOOK_BUILDS: ${{ secrets.DISCORD_WEBHOOK_BUILDS }}
          JOB_STATUS: ${{ job.status }}
          TAG: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success)   COLOR=8030573; ICON="OK"    ;;
            failure)   COLOR=11026010; ICON="FAIL" ;;
            cancelled) COLOR=10920880; ICON="CANCEL" ;;
            *)         COLOR=11045300; ICON="$JOB_STATUS" ;;
          esac
          PAYLOAD=$(jq -nc \
            --arg title "[$ICON] iOS / iPadOS / watchOS build for $TAG" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg footer "${{ github.repository }} . native-release.yml . build-ios" \
            '{
              username: "Heron Builds",
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                footer: { text: $footer }
              }]
            }')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK_BUILDS" \
            -o /dev/null --max-time 30 \
            || echo "::warning::Discord webhook POST failed (iOS build status)."

  # Android Play Store build + upload. Gated on PLAY_STORE_JSON_KEY so
  # the workflow stays green while the maintainer is still onboarding
  # Play Console (the only Android distribution channel -- direct .apk
  # isn't distributed). Runs on ubuntu-latest because the Android
  # Gradle Plugin builds cleanly on Linux + macOS is 10x more expensive.
  build-android:
    name: Build Android (Play Store internal track)
    needs: preflight
    # Repo variable PLAY_STORE_ENABLED gates this job. Set to "true" once
    # the keystore + Play Console service-account JSON are configured.
    # Manual `workflow_dispatch` runs always execute for testing.
    # Set via: `gh variable set PLAY_STORE_ENABLED --body 'true'`
    if: ${{ vars.PLAY_STORE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # gh release upload (.aab attestation)
      id-token: write # SLSA / Sigstore provenance
      attestations: write # GitHub attestations API
    steps:
      - name: Harden runner
        # G4 -- Android build runner. Handles Play Console service-account
        # key + keystore signing. Audit mode for rollout observability.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Job-local preflight for Android-specific secrets. The top-level
      # `preflight` job only validates iOS + macOS secrets so a fresh
      # fork without Android setup stays green; we validate Android
      # secrets here once the maintainer has flipped PLAY_STORE_ENABLED
      # = true. Fails fast with a clear list of missing secrets instead
      # of letting the build run for 30min and silently no-op the upload.
      - name: Android secret preflight
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for var in PLAY_STORE_JSON_KEY ANDROID_KEYSTORE_BASE64 \
                     ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS \
                     ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Android build blocked -- these secrets are missing:"
            for m in "${missing[@]}"; do echo "::error::  - $m"; done
            echo ""
            echo "Either:"
            echo "  • configure the secrets (pnpm setup:native walks through it), OR"
            echo "  • disable: gh variable set PLAY_STORE_ENABLED --body 'false'"
            exit 1
          fi
          echo "✅ all Android secrets present"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Same mise pin as iOS for Node + pnpm + Ruby consistency.
      # zizmor: ignore[cache-poisoning] -- maintainer-only-trigger; see
      # build-desktop notes for full rationale.
      - name: Setup mise (Node + pnpm + Ruby from .mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4 # zizmor: ignore[cache-poisoning]
        with:
          experimental: true
          cache: true

      # JDK 17 for Android Gradle Plugin 8.x (AGP 8.0+ requires JDK 17).
      # actions/setup-java is in the org's allowed-actions list
      # (actions/*) so no allowlist extension required.
      - name: Setup JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4.7.0
        with:
          distribution: temurin
          java-version: '17'

      # Inline Android SDK install -- avoids adding a non-actions/*
      # owner (e.g. android-actions/setup-android) to the allow-list.
      # SDK lives under ~/android-sdk; PATH + ANDROID_HOME exported via
      # GITHUB_ENV so subsequent steps see them.
      - name: Install Android SDK (cmdline-tools + platform 34 + build-tools 34)
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl -fsSL -o /tmp/cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses >/dev/null
          sdkmanager 'platform-tools' 'platforms;android-34' 'build-tools;34.0.0'
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

      # Cache pnpm store + Gradle cache. Gradle cache restoration is the
      # biggest CI-time win on Android (cold = 10+ min, warm = 2-3 min).
      # zizmor: ignore[cache-poisoning] -- gradle integrity-verifies
      # dependencies against pom checksums; pnpm verifies via lockfile.
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ui/android/**/*.gradle', 'ui/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Bundler for Fastlane gems (the same Gemfile.lock as iOS pinning
      # fastlane + supply). zizmor: ignore[cache-poisoning] -- bundler
      # verifies Gemfile.lock checksums.
      - name: Setup Ruby + bundler-cache (Fastlane gems)
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.308.0 # zizmor: ignore[cache-poisoning]
        with:
          bundler-cache: true
          working-directory: ui/android

      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit (static — Capacitor WebView shell)
        working-directory: ui
        env:
          CAPACITOR: '1'
          PUBLIC_CAPACITOR_BUILD: '1'
        run: pnpm build

      - name: Generate icons
        run: node scripts/native/icons/generate-icons.mjs

      - name: Capacitor sync (android)
        working-directory: ui
        run: pnpm exec cap sync android

      # Decode the release keystore from base64 -- the .keystore binary
      # can't live in git. Lives at ui/android/heron-release.keystore for
      # the duration of the build then gets cleaned up implicitly when
      # the runner self-destructs.
      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > ui/android/heron-release.keystore
          test -s ui/android/heron-release.keystore || { echo "::error::Decoded keystore is empty"; exit 1; }

      # build.gradle reads release signing material from keystore.properties
      # (rootProject = ui/android), NOT from env. Without this file the
      # release build silently falls back to debug signing and Play rejects
      # the AAB. storeFile is absolute so build.gradle's file() (resolved
      # relative to the app/ module) still finds it.
      - name: Write keystore.properties (release signing)
        if: ${{ hashFiles('ui/android/heron-release.keystore') != '' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          {
            echo "storeFile=$(pwd)/ui/android/heron-release.keystore"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > ui/android/keystore.properties
          echo "wrote ui/android/keystore.properties"

      # Write the Play Console service-account JSON to disk. supply (the
      # Fastlane Play Store action) reads it via PLAY_STORE_JSON_KEY_PATH.
      - name: Decode Play Console service-account JSON
        if: ${{ env.PLAY_STORE_JSON_KEY != '' }}
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          set -euo pipefail
          printf "%s" "$PLAY_STORE_JSON_KEY" | base64 --decode > /tmp/play-store-key.json
          test -s /tmp/play-store-key.json || { echo "::error::Decoded service-account key is empty"; exit 1; }
          echo "PLAY_STORE_JSON_KEY_PATH=/tmp/play-store-key.json" >> "$GITHUB_ENV"

      - name: Build + upload to Play Store internal track via Fastlane
        working-directory: ui/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # supply reads this for Play Console auth.
          SUPPLY_JSON_KEY: ${{ env.PLAY_STORE_JSON_KEY_PATH }}
        run: bundle exec fastlane internal

      - name: Attest build provenance (.aab)
        # SLSA build provenance for the Android App Bundle, matching the
        # .ipa attestation in build-ios above. continue-on-error mirrors
        # the iOS path: don't kill the release over a Sigstore blip.
        if: success() && hashFiles('ui/android/app/build/outputs/bundle/release/*.aab') != ''
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ui/android/app/build/outputs/bundle/release/*.aab

      - name: Upload .aab as release asset
        # Attach the .aab to the GitHub Release for transparency + audit
        # (`gh attestation verify <aab> --owner kaelys-js`). Play Store
        # is the primary distribution channel; the .aab on the Release
        # is for verification, not user download.
        if: success() && hashFiles('ui/android/app/build/outputs/bundle/release/*.aab') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for aab in ui/android/app/build/outputs/bundle/release/*.aab; do
            [ -f "$aab" ] || continue
            gh release upload "$TAG_NAME" "$aab" --clobber || \
              echo "::warning::Couldn't attach $aab to release $TAG_NAME (release may not exist yet)."
          done

      - name: Post Android build status to Discord
        if: always() && env.DISCORD_WEBHOOK_BUILDS != ''
        env:
          DISCORD_WEBHOOK_BUILDS: ${{ secrets.DISCORD_WEBHOOK_BUILDS }}
          JOB_STATUS: ${{ job.status }}
          TAG: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success)   COLOR=8030573; ICON="OK"    ;;
            failure)   COLOR=11026010; ICON="FAIL" ;;
            cancelled) COLOR=10920880; ICON="CANCEL" ;;
            *)         COLOR=11045300; ICON="$JOB_STATUS" ;;
          esac
          PAYLOAD=$(jq -nc \
            --arg title "[$ICON] Android build for $TAG" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg footer "${{ github.repository }} . native-release.yml . build-android" \
            '{
              username: "Heron Builds",
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                footer: { text: $footer }
              }]
            }')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK_BUILDS" \
            -o /dev/null --max-time 30 \
            || echo "::warning::Discord webhook POST failed (Android build status)."
