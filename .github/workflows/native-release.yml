name: native-release

# Cross-platform native builds -- desktop (DMG / .exe / .AppImage) + iOS (TestFlight).
#
# Triggered three ways:
#   1. Tag push (manual escape hatch -- `pnpm release patch` still works).
#   2. workflow_dispatch from the GitHub UI.
#   3. workflow_call from release.yml after release-please cuts a new
#      version. This is the primary path: every merged feat/fix commit
#      eventually graduates into a release that fires native-release.
#
# Secrets required (configure in GitHub repo settings → Secrets):
#   APPLE_TEAM_ID            -- found in developer.apple.com
#   MAC_CERTIFICATE          -- base64-encoded Developer ID Application .p12
#   MAC_CERTIFICATE_PASSWORD -- the .p12 export password
#   IOS_CERTIFICATE          -- base64-encoded Apple Distribution .p12
#   IOS_CERTIFICATE_PASSWORD -- the .p12 export password
#   IOS_PROVISIONING_PROFILE -- base64-encoded .mobileprovision
#
#   App Store Connect API auth (preferred over legacy app-specific-password):
#   APP_STORE_CONNECT_KEY_ID       -- the 10-char key ID
#   APP_STORE_CONNECT_ISSUER_ID    -- UUID issuer id
#   APP_STORE_CONNECT_PRIVATE_KEY  -- full .p8 contents (base64-encoded)
#
#   GITHUB_TOKEN             -- auto-provided by Actions
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version tag to build (e.g. 1.7.0). Required when called.'
        required: true
        type: string
    # zizmor/secrets-inherit -- enumerate the secrets the called
    # workflow consumes instead of `secrets: inherit` in release.yml.
    # When a new signing secret is added to a job below, declare it
    # here AND mirror it in release.yml's `secrets:` block.
    secrets:
      APPLE_TEAM_ID:
        required: true
      MAC_CERTIFICATE:
        required: true
      MAC_CERTIFICATE_PASSWORD:
        required: true
      IOS_CERTIFICATE:
        required: true
      IOS_CERTIFICATE_PASSWORD:
        required: true
      IOS_PROVISIONING_PROFILE:
        required: true
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_PRIVATE_KEY:
        required: true

# Workflow-level is read-only -- each job declares the writes it
# genuinely needs (contents: write to attach binaries, id-token /
# attestations for Sigstore provenance). Keeps Scorecard's
# TokenPermissions check happy and prevents a newly-added job from
# silently inheriting release-time writes.
permissions:
  contents: read

# Two release tags landing in quick succession waste 30min of CI per
# job. Only one native-release run per ref at a time. We don't cancel
# in-progress because half-uploaded TestFlight builds are a mess.
concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fail-fast preflight: verify every required secret is configured BEFORE
  # spending 30 minutes on a doomed iOS / desktop build that'll explode at
  # the signing step. This is the CI mirror of `pnpm doctor:native`. If you
  # see this job red, you forgot `pnpm setup:native`.
  preflight:
    name: Preflight — native-release secrets present
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Harden runner
        # G4 -- defense-in-depth against compromised actions. `audit` mode
        # surfaces unexpected egress in the run logs; promote to `block`
        # after 2 weeks of green runs once the allowed-endpoints list is
        # known-good. Especially valuable on this job because the secrets
        # block above grants access to Apple signing certs + ASC API key.
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Required secret check
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          missing=()
          for var in APPLE_TEAM_ID MAC_CERTIFICATE MAC_CERTIFICATE_PASSWORD \
                     IOS_CERTIFICATE IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE \
                     APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::native-release blocked — these secrets are missing:"
            for m in "${missing[@]}"; do echo "::error::  • $m"; done
            echo ""
            echo "Fix locally:"
            echo "  pnpm setup:native      # interactive wizard"
            echo "  pnpm doctor:native     # verify"
            echo ""
            echo "Or configure manually at:"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✅ all required secrets present"

  build-desktop:
    name: Build ${{ matrix.os }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write # gh release upload
      id-token: write # SLSA / Sigstore provenance
      attestations: write # GitHub attestations API
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - name: Harden runner
        # G4 -- harden every native build runner. The macos leg writes
        # the signing cert to the runner keychain; the windows leg
        # signs with the (forthcoming G18) Azure trusted-signing token.
        # Audit mode for the rollout -- flip to `block` after observing
        # legitimate endpoints.
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # mise installs Node + pnpm versions pinned in .mise.toml so CI
      # uses the same versions developers run locally.
      #
      # zizmor/cache-poisoning: this workflow only runs on tag pushes /
      # workflow_call from release.yml / workflow_dispatch -- ALL three
      # require maintainer write access (PR-based events can't push
      # tags or call this reusable workflow). Cache keys are hashed on
      # repo content (.mise.toml, lockfiles) that's only mutable via
      # merged PRs that already passed PR CI, so a malicious PR can't
      # poison the release-time cache without first getting code merged.
      - name: Setup mise (Node + pnpm from .mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4 # zizmor: ignore[cache-poisoning]
        with:
          experimental: true
          cache: true

      # Cache pnpm's content-addressable store. Restore-keys lets a
      # changed lockfile still reuse most of the previous cache.
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      # zizmor: ignore[cache-poisoning] -- see jdx/mise-action note above.
      # pnpm-lock.yaml is integrity-verified at install time.
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # Cache electron-builder's intermediate downloads (electron
      # binaries, app-builder, etc.) -- saves ~2min per run.
      # zizmor: ignore[cache-poisoning] -- electron downloads are
      # SHA256-verified by electron-builder against the version pinned
      # in ui/electron/package.json (which keys the cache).
      - name: Cache electron-builder downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~\AppData\Local\electron-builder\Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('ui/electron/package.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      # Single root install covers every workspace (ui + ui/electron).
      # The preinstall guard refuses npm/yarn/bun -- pnpm only.
      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit (Node adapter — embedded server entry)
        working-directory: ui
        run: pnpm build

      - name: Build SvelteKit (static — WebView shell)
        working-directory: ui
        env:
          CAPACITOR: '1'
          PUBLIC_CAPACITOR_BUILD: '1'
        run: pnpm build

      - name: Generate icons
        run: node scripts/native/icons/generate-icons.mjs

      - name: Capacitor sync (electron)
        working-directory: ui
        run: pnpm exec cap sync electron

      - name: Compile electron TS
        working-directory: ui/electron
        run: pnpm run build

      # macOS-only: import signing cert before electron-builder runs.
      - name: Import macOS signing certs
        if: matrix.os == 'macos-latest'
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$MAC_CERTIFICATE" ]; then
            echo "$MAC_CERTIFICATE" | base64 --decode > /tmp/cert.p12
            security create-keychain -p "" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "" build.keychain
            security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
            echo "Signing cert imported"
          else
            echo "No signing cert — building unsigned (Gatekeeper warning expected)"
          fi

      - name: Run electron-builder (publishes to GitHub Release on tag)
        working-directory: ui/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Notarization uses the App Store Connect API key when present;
          # otherwise electron-builder falls back to APPLE_ID +
          # app-specific password if those secrets are configured.
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run electron:make

      - name: Verify macOS notarization-staple
        # G17 -- without this step, a silent notarization regression
        # (Apple's notarytool returns success but the staple isn't
        # written) ships a broken DMG. End users get "App is damaged
        # and can't be opened" with no way to fix it themselves.
        # `xcrun stapler validate` confirms the notarization ticket
        # was actually written to the package; `spctl --assess` runs
        # the same check Gatekeeper does at install time.
        if: matrix.os == 'macos-latest'
        working-directory: ui/electron/dist
        run: |
          set -e
          shopt -s nullglob
          for dmg in *.dmg; do
            echo "::group::Verify $dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type install --verbose "$dmg"
            echo "::endgroup::"
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: heron-${{ matrix.os }}
          path: |
            ui/electron/dist/*.dmg
            ui/electron/dist/*.exe
            ui/electron/dist/*.AppImage
            ui/electron/dist/*.deb
            ui/electron/dist/*.zip
            ui/electron/dist/latest*.yml
          if-no-files-found: warn
          retention-days: 90

      - name: Attest build provenance
        # G1 -- SLSA build provenance per binary. End users verify with
        # `gh attestation verify <file> --owner heron`. Signed by
        # Sigstore via OIDC; no per-secret cert management. Failure
        # here doesn't block the release (the binaries are already
        # uploaded by electron-builder above) -- we want the provenance
        # but won't kill a successful build over a Sigstore blip.
        if: success() && hashFiles('ui/electron/dist/*.dmg', 'ui/electron/dist/*.exe', 'ui/electron/dist/*.AppImage') != ''
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ui/electron/dist/*.dmg
            ui/electron/dist/*.exe
            ui/electron/dist/*.AppImage
            ui/electron/dist/*.deb
            ui/electron/dist/*.zip

  build-ios:
    name: Build iOS (TestFlight)
    needs: preflight
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write # gh release upload (TestFlight + GitHub Release)
      id-token: write # SLSA / Sigstore provenance
      attestations: write # GitHub attestations API
    env:
      # Pinned Xcode version -- keeps Swift toolchain consistent with
      # .mise.toml + test.yml's `ios` job. Bump in lockstep.
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - name: Harden runner
        # G4 -- iOS build runner. Handles Apple ASC API key + signing
        # cert; the highest-privilege runner in this workflow. Audit
        # mode to observe what xcodebuild + fastlane reach out to during
        # the rollout.
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # mise pins Node + pnpm + Ruby together so Fastlane uses the same
      # Ruby version we develop against locally.
      # zizmor/cache-poisoning -- same release-only-trigger rationale
      # as the build-desktop job above (this workflow runs only on
      # maintainer-pushed tags / workflow_call from release.yml).
      - name: Setup mise (Node + pnpm + Ruby from .mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4 # zizmor: ignore[cache-poisoning]
        with:
          experimental: true
          cache: true

      # Cache pnpm store + Cocoapods caches.
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      # zizmor: ignore[cache-poisoning] -- pnpm integrity-verifies from
      # the lockfile that keys this cache; see build-desktop job notes.
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # Capacitor 8 uses Swift Package Manager (no Cocoapods). Cache
      # Xcode's derived data + the SPM resolved-packages cache.
      # zizmor: ignore[cache-poisoning] -- SPM dependencies are SHA-
      # pinned in Package.resolved (which keys the cache); xcodebuild
      # re-verifies on restore.
      - name: Cache Xcode DerivedData + SPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 # zizmor: ignore[cache-poisoning]
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: spm-derived-${{ runner.os }}-${{ hashFiles('ui/ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: |
            spm-derived-${{ runner.os }}-

      # Bundler installs Fastlane + plugins pinned in Gemfile.lock.
      # Ruby version comes from `.ruby-version` in ui/ios/App/.
      # zizmor: ignore[cache-poisoning] -- bundler verifies gems
      # against the Gemfile.lock checksums; the lockfile is committed
      # and changes only via PR.
      - name: Setup Ruby + bundler-cache (Fastlane gems)
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.308.0 # zizmor: ignore[cache-poisoning]
        with:
          bundler-cache: true
          working-directory: ui/ios/App

      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit (static — WebView shell)
        working-directory: ui
        env:
          CAPACITOR: '1'
          PUBLIC_CAPACITOR_BUILD: '1'
        run: pnpm build

      - name: Generate icons
        run: node scripts/native/icons/generate-icons.mjs

      - name: Capacitor sync (ios)
        working-directory: ui
        run: pnpm exec cap sync ios

      - name: Build + upload to TestFlight via Fastlane
        working-directory: ui/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          # App Store Connect API key (.p8) -- preferred over legacy
          # APPLE_ID + app-specific password. Required for 2FA-enabled
          # accounts; reused across every Fastlane lane.
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: bundle exec fastlane beta
