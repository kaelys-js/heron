name: PR licenses comment
# Posts the heron-pr-licenses sticky -- runs license-checker-rseidelsohn
# over the pnpm tree and flags any NEW copyleft or unknown licenses
# introduced in this PR vs main.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'

permissions: {}

concurrency:
  group: licenses-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post heron-pr-licenses sticky
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true
          cache: true
      - name: Install deps + license-checker
        run: |
          pnpm install --frozen-lockfile
          npx --yes license-checker-rseidelsohn --json --excludePrivatePackages 2>/dev/null > licenses-current.json
          # Belt-and-suspenders against pnpm/npm warning leakage.
          head -c1 licenses-current.json | grep -qE '[\[{]' || echo '{}' > licenses-current.json

      - name: Baseline licenses from main
        run: |
          git fetch origin main --depth 1
          git checkout origin/main -- pnpm-lock.yaml
          pnpm install --frozen-lockfile
          npx --yes license-checker-rseidelsohn --json --excludePrivatePackages 2>/dev/null > licenses-baseline.json || true
          head -c1 licenses-baseline.json | grep -qE '[\[{]' || echo '{}' > licenses-baseline.json
          # Restore PR head
          git checkout HEAD -- pnpm-lock.yaml
          pnpm install --frozen-lockfile

      - name: Format licenses sticky
        run: node .github/scripts/sticky/format-licenses.mjs licenses-current.json licenses-baseline.json --out body.md

      - name: Stage licenses summary
        run: |
          if [ -f body.md ]; then cp body.md licenses.md; fi

      - name: Upload licenses summary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: summary-licenses
          path: licenses.md
          if-no-files-found: ignore
          retention-days: 7
