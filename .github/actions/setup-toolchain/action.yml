name: Setup toolchain
description: |
  Composite action that handles the repeated mise + pnpm + caches
  prelude used by every JS-touching workflow. Saves ~30 lines of
  boilerplate per workflow + ensures cache keys + tool versions stay
  in sync across the whole CI matrix.

  HP9 — replaces 5 copies of the same setup block across test.yml,
  format.yml, codeql.yml, lighthouse.yml, bundle-size.yml. Updates to
  Node/pnpm/Ruby/Swift versions land in one place (.mise.toml +
  pnpm-workspace.yaml); this action picks them up automatically.

  Inputs:
    install_deps  (default true)  — run `pnpm install --frozen-lockfile`
    pnpm_cache    (default true)  — restore the pnpm store cache
    turbo_cache   (default false) — restore the Turbo cache
    apply_brand   (default false) — run `pnpm brand` after install
    install_python_deps (default true) — `pip install -r scripts/requirements.txt`
                                          for the mise-pinned Python interp.
                                          Required by any workflow that boots
                                          the dashboard (orchestrator spawns
                                          scan/apply Python children that
                                          import `cryptography`).

  Usage:

    - name: Setup toolchain
      uses: ./.github/actions/setup-toolchain
      with:
        apply_brand: true
        turbo_cache: true

inputs:
  install_deps:
    description: Run `pnpm install --frozen-lockfile`
    required: false
    default: "true"
  pnpm_cache:
    description: Restore the pnpm store cache
    required: false
    default: "true"
  turbo_cache:
    description: Restore the Turbo task-graph cache
    required: false
    default: "false"
  apply_brand:
    description: Run `pnpm brand` after install (generates Brand.ts etc.)
    required: false
    default: "false"
  install_python_deps:
    description: pip install scripts/requirements.txt against mise-pinned python
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup mise (Node + pnpm versions from .mise.toml)
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

    - name: Cache pnpm store
      if: inputs.pnpm_cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.local/share/pnpm/store/v3
        # Cache key includes the lockfile so a bump invalidates;
        # restore-keys fall back to broader prefixes for warm hits
        # on incremental pushes.
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Cache Turbo
      if: inputs.turbo_cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          .turbo
          ui/.turbo
          ui/electron/.turbo
        key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ github.ref_name }}-
          turbo-${{ runner.os }}-main-
          turbo-${{ runner.os }}-

    - name: Install dependencies
      if: inputs.install_deps == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Install Python dependencies (cryptography etc.)
      if: inputs.install_python_deps == 'true'
      shell: bash
      # The dashboard's orchestrator spawns scripts/scan/*.py + scripts/
      # apply/*.py children that import `cryptography` (via
      # scripts/lib/user_secrets.py). Without this step the children
      # crash with `ModuleNotFoundError: No module named 'cryptography'`
      # at boot, polluting the browser console -> Lighthouse asserts +
      # E2E Playwright tests both fail with second-order errors that
      # look like UI bugs but are actually a missing-pip-install.
      # `python -m pip` instead of bare `pip` guarantees the
      # mise-managed interpreter (3.13.13) is the one we install into,
      # not whatever stray pip the runner image happened to ship.
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r scripts/requirements.txt
        python -c "from cryptography.hazmat.primitives.ciphers.aead import AESGCM; print('cryptography import OK')"

    - name: Apply brand
      if: inputs.apply_brand == 'true'
      shell: bash
      # The script is `brand:apply`, not `brand` -- the latter doesn't
      # exist at root and pnpm errors with "Command 'brand' not found".
      run: pnpm brand:apply
