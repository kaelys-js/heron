# yaml-language-server: $schema=https://raw.githubusercontent.com/actions/labeler/main/schema.json
# actions/labeler v5 -- auto-labels PRs based on changed-files globs.
#
# Schema: matchers are { changed-files: [ ... ] } | { head-branch: [ ... ] }
# | { base-branch: [ ... ] }. The runner OR's items within a list and
# AND's the matcher groups.
#
# Each label key here MUST also exist as a real label in the repo
# (Settings → Labels) or the action silently skips it.
#
# Adding a label: create the label in GitHub first, then add a stanza
# here. Glob examples: `**/*.svelte`, `ui/src/lib/server/**`, `*.md`.

"🔴 core-architecture":
  - changed-files:
      - any-glob-to-any-file:
          - CLAUDE.md
          - docs/DATA_CONTRACT.md
          - modes/_shared.md

"⚠️ agent-behavior":
  - changed-files:
      - any-glob-to-any-file:
          - modes/*.md
          - modes/**/*.md
          - .claude/skills/**

"🔧 scripts":
  - changed-files:
      - any-glob-to-any-file:
          - "*.mjs"
          - scripts/**

"📄 docs":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - "README*.md"
          - .github/CONTRIBUTING.md
          - .github/CODE_OF_CONDUCT.md
          - .github/SECURITY.md
          - .github/SUPPORT.md
          - docs/GOVERNANCE.md

"🌐 i18n":
  - changed-files:
      - any-glob-to-any-file:
          - "README.*.md"
          - modes/de/**
          - modes/fr/**
          - modes/ja/**
          - modes/ru/**

"📦 dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - package-lock.json

"⚙️ ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
