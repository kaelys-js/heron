# yaml-language-server: $schema=https://json.schemastore.org/github-issue-config.json
# Issue-template chooser config -- surfaced as the "New issue" page on
# the repo. `blank_issues_enabled: false` forces every reporter through
# one of the structured templates (bug_report / feature_request /
# i-got-hired) or one of the contact_links below.

blank_issues_enabled: false
contact_links:
  - name: Security vulnerability (PRIVATE)
    url: https://github.com/kaelys-js/heron/security/advisories/new
    about: ⚠️ NEVER report security issues here publicly. Use GitHub Private Vulnerability Reporting instead.
  - name: Setup / how-to question
    url: https://discord.gg/8pRpHETxa4
    about: Faster than opening an issue. Real humans, real-time.
  - name: GitHub Discussions
    url: https://github.com/kaelys-js/heron/discussions
    about: Ideas, Q&A, show-and-tell, community conversations.
  - name: Documentation
    url: https://github.com/kaelys-js/heron#readme
    about: Read the README before opening an issue — your question might already be answered.
