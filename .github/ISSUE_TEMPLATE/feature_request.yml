# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
name: Feature request
description: Suggest a new feature, capability, or enhancement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal. Big-picture ideas / brainstorming → [Discussions](../../discussions). This template is for **scoped, actionable** feature requests.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues + discussions and this hasn't been proposed.
          required: true
        - label: I read the [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain does this solve? Be concrete.
      placeholder: "When I do X, I have to manually do Y because career-ops doesn't support Z."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should career-ops do? Sketch the UX, command, or flow.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Why is this better than working around it / using existing features?

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Dashboard (SvelteKit)
        - Native (iOS / Android / macOS / Windows / Linux)
        - Apple Watch
        - Widgets
        - Scoring / Evaluation
        - PDF / CV generation
        - Portal scanner (Greenhouse / Ashby / Lever / Workday / …)
        - LinkedIn Easy Apply
        - Autonomous apply pipeline
        - Multi-user / RBAC
        - Notifications
        - Localization / language modes
        - Accessibility
        - Developer experience / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Estimated scope
      options:
        - Tiny (≤ 1 day, single file)
        - Small (1-3 days)
        - Medium (1-2 weeks)
        - Large (multi-week, architecture-level)
        - Don't know
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Are you willing to help?
      options:
        - label: I can submit a PR for this.
        - label: I can test a PR for this.
        - label: I can write docs / examples.
