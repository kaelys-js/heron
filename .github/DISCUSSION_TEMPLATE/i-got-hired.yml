title: 'I got hired'
labels: ['hired-story']
body:
  - type: markdown
    attributes:
      value: |
        Congrats! Did Heron help you land a role? Share the story so other job-seekers
        can learn from your path.

        This template mirrors the (now-deprecated) issue form. Discussions are a better
        fit -- conversational, no resolution to track, easy to follow + bookmark.

  - type: input
    id: company
    attributes:
      label: Company you joined
      description: The company that hired you (or the type if you'd rather not name them).
      placeholder: Acme Corp / FAANG / European fintech
    validations:
      required: true

  - type: input
    id: role
    attributes:
      label: Role
      placeholder: Senior Backend Engineer / Staff PM / Founding Designer
    validations:
      required: true

  - type: dropdown
    id: pipeline-source
    attributes:
      label: How did Heron help?
      multiple: true
      options:
        - Discovered the role via the scanner
        - Evaluation report convinced me it was worth applying
        - CV / cover letter generated by Heron
        - Interview prep notes
        - Negotiation script
        - Other (explain below)
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      description: How many days / weeks from first Heron evaluation to signed offer? What was the funnel like?
      placeholder: |
        - Discovered 2026-03-01 via portal scan
        - Evaluated 4.5/5 -- applied same day
        - Recruiter screen 2026-03-07
        - Onsite 2026-03-15
        - Offer 2026-03-22

  - type: textarea
    id: what-worked
    attributes:
      label: What worked
      description: The specific Heron features / habits that helped most.

  - type: textarea
    id: what-didnt
    attributes:
      label: What didn't (so we can improve)
      description: Anything Heron got wrong, missed, or could do better next time?

  - type: textarea
    id: advice
    attributes:
      label: Advice for other job seekers
      description: One paragraph of advice you'd give yourself at the start of the search.
