# Dependabot v2 — automated dependency updates.
#
# What's covered:
#   • npm (pnpm)   — root + workspace (ui, ui/electron) via single root scan
#   • gomod        — /dashboard if it exists; security-only when dormant
#   • github-actions — every workflow file across .github/workflows/
#   • bundler      — /ui/ios/App for Fastlane (CocoaPods replacement on RubyGems)
#   • swift        — /ui/ios/App/CapApp-SPM for the Swift Package Manager bundle
#
# Update strategy: weekly. Frequent enough to catch CVEs fast, rare enough
# to keep PR noise manageable. We GROUP updates by ecosystem so e.g. all
# Capacitor packages bump in one PR instead of 12.
#
# Labels + reviewers are scoped per ecosystem so CODEOWNERS / branch
# protection picks up the right review path.
version: 2

updates:
  # ── JS/TS — pnpm (root drives the whole workspace) ─────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      capacitor:
        patterns:
          - "@capacitor/*"
          - "@capacitor-community/*"
      sveltekit:
        patterns:
          - "@sveltejs/*"
          - "svelte"
          - "svelte-check"
          - "vite"
          - "@tailwindcss/*"
      auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "@types/better-sqlite3"
          - "better-sqlite3"
      types:
        patterns:
          - "@types/*"
      electron:
        patterns:
          - "electron"
          - "electron-*"
      dev-tools:
        patterns:
          - "@biomejs/*"
          - "biome"
          - "turbo"
          - "prettier"
          - "prettier-plugin-*"
          - "lefthook"
          - "tsx"
          - "typescript"
    ignore:
      # Don't auto-bump @typescript/native-preview — it's a dev preview
      # with daily releases; manual bumps only when we're ready to test.
      - dependency-name: "@typescript/native-preview"

  # ── Go — dashboard service (dormant) ────────────────────────────────
  # If /dashboard later becomes active again, switch from security-only to
  # daily/weekly version updates.
  - package-ecosystem: "gomod"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions — pin every action via Dependabot ────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "github/*"

  # ── Ruby (Bundler) — Fastlane on iOS ────────────────────────────────
  - package-ecosystem: "bundler"
    directory: "/ui/ios/App"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ios"
      - "ruby"
    commit-message:
      prefix: "chore(ios)"
    groups:
      fastlane:
        patterns:
          - "fastlane"
          - "fastlane-*"
          - "cocoapods"
          - "cocoapods-*"

  # ── Swift Package Manager — iOS Capacitor bundle ────────────────────
  - package-ecosystem: "swift"
    directory: "/ui/ios/App/CapApp-SPM"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ios"
      - "swift"
    commit-message:
      prefix: "chore(ios)"
