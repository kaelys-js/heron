version: 2

# Why this file exists -- and what NOT to expect from it.
#
# Without a dependabot.yml, GitHub Dependabot auto-discovers every
# manifest in the repo and opens version-update PRs against each. That
# worked fine for npm + pip + actions, but it tripped over the iOS
# Fastlane Gemfile pattern:
#
#   plugins_path = File.join(File.dirname(__FILE__), "fastlane", "Pluginfile")
#   eval_gemfile(plugins_path) if File.exist?(plugins_path)
#
# Dependabot's Gemfile parser only supports `eval_gemfile("string-literal")`
# and explicitly rejects variables -- the resulting error
#   "Dependabot only supports uninterpolated string arguments to
#    eval_gemfile. Got 'plugins_path'"
# turned the `bundler in /ui/ios/App` job red on every iOS gem update.
#
# Once a dependabot.yml exists, Dependabot ONLY runs against the
# ecosystems listed here. So this file's purpose is to enumerate the
# manifests we WANT tracked + omit the iOS Gemfile, accepting the
# trade-off that the iOS Fastlane gems get manual bumps. The iOS deps
# (fastlane, cocoapods, xcov, slather) are all major-pinned in the
# Gemfile itself with comments documenting the bump policy, so manual
# is the right level of touch here.

updates:
  # ── npm: root only (pnpm workspace limitation) ────────────────────
  # Dependabot's pnpm support refuses to update package.json files
  # that sit inside a pnpm workspace tree -- the runner errors with
  #   "Updating workspaces from inside a workspace subdirectory is
  #    not supported. Both pnpm-lock.yaml and pnpm-workspace.yaml
  #    exist in a parent directory. Dependabot should only update
  #    from the root workspace."
  # So we declare only the root manifest. The single root run picks
  # up every workspace dep because pnpm-workspace.yaml's `catalog`
  # block is the source-of-truth version for every dep -- Dependabot
  # rewrites the catalog entry there, and `pnpm install` propagates
  # the new version to each workspace package on the next install.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    # Supply-chain soak: don't open a PR until the release is N days old, so
    # a compromised/yanked publish has time to surface. This delay IS the
    # "auto-merge after x days" -- once the PR exists it's already aged, and
    # .github/workflows/dependabot-auto-merge.yml merges patch/minor on green
    # CI. Majors carry no cooldown so they surface promptly for manual review.
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 2
    # Bundle non-major bumps into one PR to cut review volume; majors stay
    # separate (one PR each) so they're reviewed + merged by hand.
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── pip: root pyproject + scripts/requirements ────────────────────
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 2
    groups:
      pip-root-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: pip
    directory: "/scripts"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 2
    groups:
      pip-scripts-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions: every workflow under .github/workflows/ ───────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 2
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── bundler: ROOT ONLY (rufo formatter). The iOS Gemfile at
  # ui/ios/App/Gemfile is intentionally NOT tracked -- see the file
  # header for the eval_gemfile-with-variable parser limitation.
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ruby"
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 2
    groups:
      bundler-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
