# mise — runtime version manager.
#
# Anyone with mise installed + shell-integrated will automatically get
# the right Node/pnpm/Ruby versions when they `cd` into this repo.
# No manual `nvm use`, no version drift between contributors.
#
# Install mise:    brew install mise
# Activate shell:  echo 'eval "$(mise activate zsh)"' >> ~/.zshrc   # bash: ~/.bashrc
# Apply versions:  mise install                                      # one-time, then auto
#
# To bump:         mise use node@lts          # pins to current LTS line
#                  mise use pnpm@latest       # pins to current latest pnpm
#                  mise use ruby@latest       # pins to current latest ruby
#
# CI uses `mise install` in the matrix — see .github/workflows/test.yml.

[tools]
# ── Runtimes ─────────────────────────────────────────────────────────
# Node — pinned to the absolute latest "current" line release. Bump via
# `mise use node@latest` and run the verification gauntlet (`pnpm check`,
# `pnpm build`, `pnpm test`) before committing.
node = "26.1.0"
# pnpm 11 (latest). Matches the `packageManager` field in package.json,
# which is the source of truth Corepack / pnpm-self-install honor.
pnpm = "11.1.0"
# Ruby 3.3.x for Fastlane + rufo. Must match ui/ios/App/.ruby-version
# so `cd ui/ios/App` doesn't switch Rubies mid-build.
ruby = "3.3.5"
# Python — used by ruff (installed below) AND by the apply-*.py / scan-*.py
# scripts that drive the Playwright portal automation.
python = "3.13"

# ── Formatters / Linters (managed by mise so fresh-clone works) ──────
# Every formatter the lefthook + CI gates use must be installable from
# mise alone — no `brew install` step required for a fresh checkout.
actionlint = "1.7"   # GH Workflow validator + shellcheck
ruff = "0.7"         # Python formatter + linter
shfmt = "3.10"       # POSIX shell formatter
swiftlint = "0.57"   # Swift lint gate
swiftformat = "0.55" # Swift formatter
ktlint = "1.5"       # Kotlin formatter
yamllint = "1.36"    # YAML syntax + style
taplo = "0.10"       # TOML formatter + linter (pyproject.toml + .mise.toml)
# dotenv-linter — installed via ubi (universal binary installer) because
# there's no native mise plugin. Lints .env*.example template files for
# duplicate keys / leading-space typos / quote inconsistency.
"ubi:dotenv-linter/dotenv-linter" = "4.0.0"

[env]
# Project-scoped env vars — applied when shell-activated mise enters this dir.
COREPACK_ENABLE_STRICT = "0"          # mise manages pnpm, not corepack
NODE_OPTIONS = "--enable-source-maps"
# Refuse legacy npm/yarn/bun via the preinstall guard in scripts/ensure-pnpm.mjs.
# Override only when bootstrapping a CI runner that lacks pnpm.
ALLOW_NON_PNPM = "0"

[settings]
# Faster install path — uses precompiled binaries when available
experimental = true
# Don't auto-install missing tool versions on `mise activate` — explicit
# `mise install` is safer for collaborators who might not realize a
# multi-GB Ruby compile is queued.
auto_install = false
# Lockfile — once mise.lock exists, mise refuses to install versions
# that don't match (signed SHAs). First `mise install` creates it.
lockfile = true
# Ignore legacy version files (.nvmrc, .node-version, .ruby-version) for
# Node — let the [tools] block in this file be the single source of truth.
# Exception: ui/ios/App/.ruby-version stays read so Bundler picks it up.
idiomatic_version_file_enable_tools = ["ruby"]
# Don't trust child .mise.toml files in subdirectories unless explicitly
# allow-listed (`mise trust`). Defence against malicious subprojects.
paranoid = false
