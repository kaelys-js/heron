<?xml version="1.0" encoding="UTF-8"?>
<!--
  Heron wordmark — warm-white variant (#e8eaed) for dark surfaces.

  PLACEHOLDER until letterforms are outlined to vector paths. See
  wordmark.svg for spec + the outline-to-paths upgrade instructions.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 280 120"
  role="img"
  aria-label="Heron"
>
  <title>Heron</title>
  <text
    x="50%"
    y="92"
    text-anchor="middle"
