<?xml version="1.0" encoding="UTF-8"?>
<!--
  Heron wordmark — Heron Slate variant (#4a5b6d).
  Default for light surfaces.

  PLACEHOLDER until letterforms are outlined to vector paths. Until then,
  this SVG depends on Fraunces being loaded by the renderer. The web UI
  loads Fraunces self-hosted, so this works in-product. For press kits /
  external embeds / contexts where you can't guarantee Fraunces loads,
  run this through a vector editor or Claude Design with the prompt:
  "Outline this Fraunces 'Heron' wordmark to vector <path> elements,
  preserving the bold weight (wght=700), sharp soft axis (SOFT=0), and
  display optical size (opsz=96)."
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 280 120"
  role="img"
  aria-label="Heron"
>
  <title>Heron</title>
  <text
    x="50%"
    y="92"
    text-anchor="middle"
    fill="#4a5b6d"
    font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Baskerville, 'Times New Roman', Times, Georgia, serif"
    font-size="96"
    font-weight="700"
    font-optical-sizing="auto"
    font-variation-settings="'opsz' 96, 'SOFT' 0, 'wght' 700"
    letter-spacing="-0.02em"
  >Heron</text>
</svg>
