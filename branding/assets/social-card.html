  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      position: relative;
      background: #0e1014;
      color: #e8eaed;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-feature-settings: 'ss01', 'cv11';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    /* Single chromatic punctuation mark — top-left accent stripe */
    .accent-stripe {
      position: absolute;
      top: 60px;
      left: 80px;
      width: 64px;
      height: 4px;
      background: #c89b4a;
      border-radius: 2px;
    }

    /* Content column — left-aligned, leaves right ~360px for mascot */

      position: absolute;
      top: 110px;
      left: 80px;
      right: 400px;
      display: flex;
      flex-direction: column;
    }

    .tagline {
      font-family: 'Fraunces', 'Iowan Old Style', 'Apple Garamond', Baskerville, 'Times New Roman', Times, Georgia, serif;
      font-weight: 700;
      font-size: 104px;
      line-height: 1.04;
      letter-spacing: -0.025em;
      font-optical-sizing: auto;
      font-variation-settings: 'opsz' 104, 'SOFT' 0, 'wght' 700;
      color: #e8eaed;
    }

    .wordmark {
      margin-top: 56px;
      font-family: 'Fraunces', 'Iowan Old Style', 'Apple Garamond', Baskerville, 'Times New Roman', Times, Georgia, serif;
      font-weight: 700;
      font-size: 56px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-optical-sizing: auto;
      font-variation-settings: 'opsz' 56, 'SOFT' 0, 'wght' 700;
      color: #c89b4a;
    }

    .subline {
      margin-top: 14px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      font-size: 28px;
      line-height: 1.45;
      letter-spacing: -0.005em;
      color: #a8b0bb;
      max-width: 640px;
    }

    /* URL strip at footer-left — quiet brand identifier, not a CTA */
    .url-strip {
      position: absolute;
      left: 80px;
      bottom: 60px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 0.04em;
      color: #6b7585;
      text-transform: lowercase;
    }

    /* Mascot — quiet presence on the right, recedes to 92% opacity */
    .mascot {
      position: absolute;
      top: 50%;
      right: 96px;
      transform: translateY(-50%);
      width: 280px;
      height: auto;
      opacity: 0.92;
      color: #4a5b6d;
    }
  </style>
