<?xml version="1.0" encoding="UTF-8"?>
<!--
  Heron mark — slate variant (Heron Slate body, warm-white eye).

  Default mark variant. Use on light backgrounds (the warm-paper
  register defined in COLORS.md::light tokens).

  Spec source: branding/MASCOT.md
  viewBox 5:7 vertical (per spec); compact teardrop body, soft S-curve
  neck, sharp angular beak ~ 1× head diameter, single eye dot as focal
  point, long thin legs with slight knee bend + small foot terminators.

  Tier 1 mark (silhouette + minimal eye dot). For favicon, app icon,
  watch face, dock badge, web nav, inline UI at ≤ 64px.

  Designed with Claude per the MASCOT.md "Production prompt for Claude
  Design" section. Iterate by editing the SVG paths directly; the
  brand-token colors come from brand.json::colors.{primary,
  textOnLight}. Run pnpm brand:apply afterwards to regenerate the
  derived icon sets (favicon, .icns, .ico, manifest sizes).
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 120 160"
  role="img"
  aria-label="Heron"
>
  <title>Heron</title>

  <!-- Body: compact teardrop, narrower at the tail (left), wider at the chest (right under the neck) -->
  <path
    d="M 30 86
       C 30 98, 44 104, 60 104
       C 76 104, 84 96, 80 86
       C 78 79, 64 76, 52 78
       C 40 80, 30 82, 30 86 Z"
    fill="#4a5b6d"
  />

  <!-- Neck: soft S-curve (calligraphic ʃ glyph, not angular Z) from body shoulder up to head base -->
  <path
    d="M 72 84
       C 80 70, 58 50, 70 30"
    stroke="#4a5b6d"
    stroke-width="7.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Head: compact ellipse, slightly elongated toward the beak -->
  <ellipse cx="74" cy="22" rx="8" ry="6" fill="#4a5b6d" />

  <!-- Beak: sharp angular triangle, slightly forward; length ≈ 1× head diameter -->
  <path d="M 82 21 L 110 22.5 L 82 24 Z" fill="#4a5b6d" />

  <!-- Eye: single warm-white dot (focal point of attention) -->
  <circle cx="76" cy="20.5" r="1.3" fill="#fffefa" />

  <!-- Legs: long, thin, slightly bent at the knee, planted (not striding) -->
  <path
    d="M 50 104 L 49 128 L 52 153"
    stroke="#4a5b6d"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
  />
  <path
    d="M 66 104 L 65 128 L 68 153"
    stroke="#4a5b6d"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Foot terminators: small horizontal strokes, no toes -->
  <line x1="47" y1="153.5" x2="56" y2="153.5" stroke="#4a5b6d" stroke-width="2.2" stroke-linecap="round" />
  <line x1="63" y1="153.5" x2="72" y2="153.5" stroke="#4a5b6d" stroke-width="2.2" stroke-linecap="round" />
</svg>
