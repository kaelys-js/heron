<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    career-ops master logo. Single source of truth. Edit here.
    `pnpm brand:apply` propagates this into:
      - All platform icons (iOS appiconset, electron .icns/.ico, web manifest sizes)
      - ui/static/favicon.svg (web favicon)
      - electron tray icon
    Color palette is also declared in brand.json under `colors:`. Keep
    them in sync (the verifier checks).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="6.5" y="11" width="19" height="13.5" rx="2.5" fill="none" stroke="#e4e4e7" stroke-width="1.6"/>
  <path d="M12 11v-1.5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2V11" fill="none" stroke="#e4e4e7" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="6.5" y1="17.5" x2="25.5" y2="17.5" stroke="#e4e4e7" stroke-width="1.2" opacity="0.55"/>
  <rect x="14" y="16.4" width="4" height="2.2" rx="0.5" fill="url(#accent)"/>
  <circle cx="24" cy="9" r="2.6" fill="url(#accent)"/>
  <circle cx="24" cy="9" r="1" fill="#0a0a0c"/>
</svg>
