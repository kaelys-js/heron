# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json
# Lefthook -- git hooks manager.
#
# 100% parity model: pre-commit, pre-push, and CI all run the SAME
# `pnpm verify` pipeline (turbo run check build test:coverage lint
# format:check verify:gates lint:native). Turbo's content-hash cache makes
# the repeats cheap -- after a commit runs verify, the pre-push verify is
# all cache hits. The ONLY checks that run exclusively in CI are E2E,
# Lost Pixel, CodeQL, Scorecard, zizmor, and dependency-review.
#
# Bypass the entire suite with: SKIP_LEFTHOOK=1 git commit/push.
# Use sparingly -- CI re-runs everything anyway.

# ── pre-commit ──────────────────────────────────────────────────────
# PIPED (sequential), NOT parallel: the auto-format WRITERS (01-08) must
# finish + re-stage BEFORE `99-verify` runs its format:check / lint-native
# --check passes, otherwise the check races the writer (the old
# prettier-svelte / shfmt-check flakiness). Numeric prefixes pin the order
# regardless of how lefthook sorts. The check-only hooks that used to live
# here (typecheck, *-check, swiftlint, no-slop, comment-style, english-only,
# modes, exact-versions, oxlint, version-sync, markdownlint, yamllint,
# actionlint, plist/xml/dotenv/tiny-config validators, fonts, format-sync)
# are all subsumed by `99-verify` now, so they are NOT duplicated here.
pre-commit:
  piped: true
  skip:
    - rebase
    - merge
  commands:
    "01-format-pipeline":
      # SERIAL apply-brand -> biome-format -> sort-pkg -> biome-format-check.
      # Combined into one command so the steps run in strict order. The glob
      # is the UNION of every step's interest.
      glob: "{branding/*,*.{ts,tsx,js,mjs,cjs,json,jsonc,css,webmanifest},**/package.json}"
      run: |
        set -e
        BRAND_CHANGED=$(echo "{staged_files}" | grep -E '(^|/)branding/' || true)
        if [ -n "$BRAND_CHANGED" ]; then
          node scripts/native/apply-brand.mjs --stage > /dev/null 2>&1 || true
        fi
        STAGED_BIOME=$(git diff --cached --name-only --diff-filter=d | grep -E '\.(ts|tsx|js|mjs|cjs|json|jsonc|css|webmanifest)$' || true)
        if [ -n "$STAGED_BIOME" ]; then
          echo "$STAGED_BIOME" | xargs pnpm exec biome format --write
          echo "$STAGED_BIOME" | xargs git add
        fi
        STAGED_PKGS=$(git diff --cached --name-only --diff-filter=d | grep -E '(^|/)package\.json$' || true)
        if [ -n "$STAGED_PKGS" ]; then
          echo "$STAGED_PKGS" | xargs pnpm exec sort-package-json
          echo "$STAGED_PKGS" | xargs git add
        fi
        STAGED_CHECK=$(git diff --cached --name-only --diff-filter=d | grep -E '\.(ts|tsx|js|mjs|cjs|json|jsonc|css|webmanifest)$' || true)
        if [ -n "$STAGED_CHECK" ]; then
          echo "$STAGED_CHECK" | xargs pnpm exec biome format
        fi
      stage_fixed: true

    "02-prettier-svelte":
      # Biome doesn't support .svelte; prettier-plugin-svelte does. Write ->
      # re-stage -> check in one step. The awk strips the leading `ui/` from
      # each repo-relative path (anchored to ^ui/ so a mid-path `ui/` stays).
      glob: "*.svelte"
      run: |
        FILES=$(echo {staged_files} | awk '{for(i=1;i<=NF;i++){sub(/^ui\//,"",$i);printf "%s ",$i}}')
        pnpm -C ui exec prettier --write $FILES --ignore-path .prettierignore 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
        pnpm -C ui exec prettier --check $FILES --ignore-path .prettierignore
      stage_fixed: true

    "03-ruff-format":
      # Python formatter + auto-fix linter (ruff). The blocking `ruff check`
      # runs in 99-verify (lint-native); this just auto-fixes + re-stages.
      glob: "*.py"
      run: |
        command -v ruff >/dev/null 2>&1 || { echo "skip: ruff not installed (mise install)"; exit 0; }
        ruff format {staged_files} 2>/dev/null || true
        ruff check --fix {staged_files} 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
      stage_fixed: true

    "04-ktlint-format":
      glob: "*.kt"
      run: |
        command -v ktlint >/dev/null 2>&1 || { echo "skip: ktlint not installed (mise install)"; exit 0; }
        ktlint --format {staged_files} 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
      stage_fixed: true

    "05-swiftformat":
      glob: "*.swift"
      run: |
        command -v swiftformat >/dev/null 2>&1 || { echo "skip: swiftformat not installed (mise install)"; exit 0; }
        swiftformat --quiet {staged_files} 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
      stage_fixed: true

    "06-shfmt":
      glob: "*.{sh,bash}"
      run: |
        command -v shfmt >/dev/null 2>&1 || { echo "skip: shfmt not installed (mise install)"; exit 0; }
        shfmt -w -i 2 -ci {staged_files} 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
      stage_fixed: true

    "07-rufo":
      # Ruby formatter via bundler (pinned gem). Glob matches .rb + Gemfile.
      glob: "{*.rb,**/Gemfile,Gemfile}"
      run: |
        command -v bundle >/dev/null 2>&1 || { echo "skip: bundler not on PATH (run mise install)"; exit 0; }
        bundle exec rufo {staged_files} 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
      stage_fixed: true

    "08-taplo":
      # TOML formatter. The blocking `taplo format --check` runs in
      # 99-verify (lint-native); this just auto-fixes + re-stages.
      glob: "*.toml"
      run: |
        command -v taplo >/dev/null 2>&1 || { echo "skip: taplo not installed (mise install)"; exit 0; }
        taplo format {staged_files} 2>/dev/null || true
        git add {staged_files} 2>/dev/null || true
      stage_fixed: true

    # ── Security + policy: staged-diff / identity scans that are inherently
    #    git-aware (not whole-repo), so they stay separate from 99-verify. ──
    "10-no-secrets":
      # Cheap regex guard -- block obvious secrets from being committed.
      glob: "*.{ts,tsx,js,mjs,cjs,svelte,json,yaml,yml,md,env,toml,sh,py,rb}"
      run: |
        if grep -lE '(sk-ant-[A-Za-z0-9-]{40,}|sk-[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|xoxb-[0-9]{10,}-[0-9]{10,}-[A-Za-z0-9]{20,}|sk_live_[A-Za-z0-9]{20,}|-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----)' {staged_files} 2>/dev/null; then
          echo "✗ Secret pattern detected in staged files"
          echo "  Patterns: Anthropic / OpenAI / GitHub PAT / AWS / Google / Slack / Stripe / PEM"
          echo "  If this is a false positive, run: SKIP_LEFTHOOK=1 git commit ..."
          exit 1
        fi

    "11-no-deflect":
      # Block deflection vocabulary in staged additions (diff-scoped). Bypass:
      # literal [user-approved-deferral] in the hunk or commit message.
      glob: "*.{ts,tsx,svelte,mjs,mts,js,cjs,kt,swift,rb,go,py,yml,yaml,md}"
      run: node scripts/system/verify-no-deflection.test.mjs && node scripts/system/verify-no-deflection.mjs --staged

    "12-no-personal-identity":
      # Block a personal email / legal name in the commit author/committer
      # identity (denylist stored as SHA-256, never plaintext). No glob:
      # identity is independent of which files are staged.
      run: node scripts/system/verify-no-personal-identity.test.mjs && node scripts/system/verify-no-personal-identity.mjs --identity

    "13-discord-config":
      # Discord reconciler offline gates (unit tests + config schema). Niche;
      # fires only when a discord config / its script is staged.
      glob: "{scripts/system/apply-discord-config.mjs,scripts/system/apply-discord-config.test.mjs,scripts/system/verify-discord-config.mjs,scripts/system/verify-discord-config.test.mjs,.github/discord/config.yml,.github/discord/config.schema.json}"
      run: pnpm discord:config:test && pnpm verify:discord-config:test && pnpm verify:discord-config

    "14-pr-summary":
      # Unit-tests the PR-comment renderer; fires only when it's staged.
      glob: ".github/scripts/sticky/assemble-summary.{mjs,test.mjs}"
      run: pnpm pr:summary:test

    "15-splash":
      # Single-source splash: unit-test the spec + assert every generated
      # surface still matches it. Fires only when the spec, its generators, the
      # verifier, or a generated surface is staged. (99-verify also runs the
      # drift check repo-wide; this gives fast targeted feedback + the unit test.)
      glob: "{scripts/native/splash-spec.mjs,scripts/native/splash-spec.test.mjs,scripts/system/verify-splash-sync.mjs,scripts/native/apply-brand.mjs,scripts/native/icons/generate-icons.mjs,ui/src/app.html,ui/electron/src/splash.ts,ui/src/routes/login/+page.svelte,ui/src/routes/signup/+page.svelte,ui/ios/App/App/Base.lproj/LaunchScreen.storyboard}"
      run: pnpm splash-spec:test && pnpm verify:splash-sync

    "16-icons":
      # Unit-test the icon generator's pure helpers (scaleSvgImage). Fires when
      # the generator or its test is staged.
      glob: "{scripts/native/icons/generate-icons.mjs,scripts/native/icons/generate-icons.test.mjs}"
      run: pnpm icons:test

    "17-brand-css":
      # Brand token system: unit-test the single-block emitter + assert the
      # brand.json palette clears WCAG AA in both modes. Fires when brand.json,
      # the app.css block emitter, the generator, or the contrast guard is
      # staged. (99-verify also runs verify:contrast repo-wide; this is fast
      # targeted feedback + the emitter unit test.)
      glob: "{branding/brand.json,scripts/native/app-css-block.mjs,scripts/native/app-css-block.test.mjs,scripts/native/apply-brand.mjs,scripts/system/verify-contrast.mjs}"
      run: pnpm app-css-block:test && pnpm verify:contrast

    "18-symbolicate":
      # Unit-test the offline client-stack symbolicator's pure helpers. Fires
      # only when the script or its test is staged.
      glob: "{scripts/system/symbolicate.mjs,scripts/system/symbolicate.test.mjs}"
      run: pnpm symbolicate:test

    # ── Full verify pipeline (typecheck + build + tests + every linter +
    #    every gate), turbo-cached. Runs LAST so the writers above have
    #    already formatted + re-staged. SAME command pre-push + CI run. ──
    "99-verify":
      run: pnpm verify

# ── pre-push ────────────────────────────────────────────────────────
# Runs the SAME `verify` pipeline (all cache hits if nothing changed since
# the commit) PLUS the gates that are inherently push/PR/range-scoped and
# therefore can't live in the whole-repo verify task.
pre-push:
  parallel: true
  commands:
    engine-pin:
      # AUTO-FIX engine mismatch via mise. If Node-on-PATH matches the pin,
      # exits instantly; otherwise routes subsequent work through mise.
      run: bash scripts/system/mise-shim.sh node scripts/system/ensure-pnpm.mjs
      fail_text: "Node version doesn't match engines pin. mise isn't installed or lacks the pinned Node -- see message above."

    verify:
      # The full pipeline -- identical to pre-commit's 99-verify and CI's
      # Verify job. Self-heals better-sqlite3 ABI drift before running so a
      # mid-session Node swap doesn't red-bar vitest with a confusing
      # NODE_MODULE_VERSION error. Bypass: SKIP_LEFTHOOK=1 git push.
      run: |
        bash scripts/system/mise-shim.sh sh -c '
          node scripts/native/ensure-native-bindings.mjs --quiet || {
            echo "✗ native bindings unhealthy -- run \`pnpm rebuild:native\` to fix."
            exit 1
          }
          pnpm verify
        '

    pr-preflight:
      # Mirror the server PR-metadata gates locally (shared
      # scripts/system/check-pr-metadata.mjs) so a bad title/body/size fails
      # on push, not after a CI round-trip.
      run: |
        set -eu
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        case "$BRANCH" in
          main|HEAD|dependabot/*|release-please--*) exit 0 ;;
        esac
        PR_TITLE=""
        if command -v gh >/dev/null 2>&1; then
          PR_TITLE=$(gh pr view --json title --jq .title 2>/dev/null || true)
        fi
        if [ -n "$PR_TITLE" ]; then
          PR_BODY=$(gh pr view --json body --jq '.body // ""')
          PR_LABELS=$(gh pr view --json labels --jq '[.labels[].name] | join(",")')
          PR_ADDITIONS=$(gh pr view --json additions --jq '.additions')
          PR_DELETIONS=$(gh pr view --json deletions --jq '.deletions')
          export PR_TITLE PR_BODY PR_LABELS PR_ADDITIONS PR_DELETIONS
          bash scripts/system/mise-shim.sh node scripts/system/check-pr-metadata.mjs local
        else
          PR_TITLE=$(git log -1 --format=%s)
          export PR_TITLE
          bash scripts/system/mise-shim.sh node scripts/system/check-pr-metadata.mjs title-length
          bash scripts/system/mise-shim.sh node scripts/system/check-pr-metadata.mjs title-grammar
          echo "i  No open PR yet -- validated the prospective title only."
        fi

    release-readiness:
      # When pushing a release tag, verify CI can release (secrets present).
      run: |
        TAG_REFS=$(git for-each-ref --format='%(refname:short)' "refs/tags/v*" --no-merged "origin/$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main)" 2>/dev/null | head -3)
        if [ -z "$TAG_REFS" ]; then
          exit 0
        fi
        echo "▸ Release tag(s) detected: $TAG_REFS"
        echo "▸ Running doctor:native to verify CI can release..."
        pnpm doctor:native

    # ── Content gates -- range-scoped (BASE..HEAD), so not in verify. ──
    per-commit-conventional:
      run: bash scripts/system/check-content-gates.sh per-commit-conventional
    file-size-gate:
      run: bash scripts/system/check-content-gates.sh file-size
    path-length-gate:
      run: bash scripts/system/check-content-gates.sh path-length
    file-extensions-gate:
      run: bash scripts/system/check-content-gates.sh file-extensions

    meta-script-tests:
      # Guard the validators BOTH local hooks + CI depend on. Plain Node, <1s.
      run: bash scripts/system/mise-shim.sh node scripts/system/check-pr-metadata.test.mjs && bash scripts/system/mise-shim.sh node scripts/system/screenshot-diff.test.mjs && bash scripts/system/mise-shim.sh node scripts/system/apply-github-config.test.mjs

# ── commit-msg (lightweight) ────────────────────────────────────────
# Conventional Commits format + DCO sign-off + deflection/identity scans
# on the message itself.
commit-msg:
  commands:
    conventional:
      run: |
        msg=$(cat {1})
        if echo "$msg" | grep -qE '^(Merge|Revert|fixup!|squash!|chore\(main\): release)'; then
          exit 0
        fi
        if ! echo "$msg" | grep -qE '^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([a-z0-9_-]+\))?!?: [^A-Z]'; then
          echo "✗ Commit message doesn't follow Conventional Commits."
          echo "  Format: type(scope)!: subject  (subject must start lowercase, <= 100 chars)"
          echo "  Types:  feat fix chore docs style refactor perf test build ci revert"
          echo "  Example: feat(scan): add Workable ATS adapter (not 'feat: Add ...')"
          echo "  Bypass:  SKIP_LEFTHOOK=1 git commit ..."
          exit 1
        fi

    signoff:
      run: |
        msg=$(cat {1})
        if echo "$msg" | grep -qE '^(Merge|Revert|fixup!|squash!|chore\(main\): release)'; then
          exit 0
        fi
        if ! echo "$msg" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
          echo "✗ Commit message lacks a DCO sign-off."
          echo "  Add a 'Signed-off-by: Your Name <you@example.com>' trailer."
          echo "  Easiest fix:  git commit --amend -s  (or use -s on the next commit)"
          echo "  Reference:    https://probot.github.io/apps/dco/"
          echo "  Bypass:       SKIP_LEFTHOOK=1 git commit ..."
          exit 1
        fi

    no-deflect-msg:
      run: |
        msg=$(cat {1})
        if echo "$msg" | grep -qE '^(Merge|Revert|fixup!|squash!|chore\(main\): release)'; then
          exit 0
        fi
        node scripts/system/verify-no-deflection.mjs --message {1}

    no-personal-identity:
      run: |
        msg=$(cat {1})
        if echo "$msg" | grep -qE '^(Merge|Revert|fixup!|squash!|chore\(main\): release)'; then
          exit 0
        fi
        node scripts/system/verify-no-personal-identity.mjs --message {1}
