# yaml-language-server: $schema=https://json.schemastore.org/pnpm-workspace.json
# pnpm workspace — turborepo + lefthook expect this layout.
#
# Why workspaces here? Strictly we don't need them (ui/ and ui/electron/
# aren't separately published), but turbo's task graph and pnpm's
# hoisted node_modules cache work better when the relationship is
# explicit. Plus this lets `pnpm -r ...` run a command across all
# packages.

packages:
  - "ui"
  - "ui/electron"

# pnpm 11 replaces the old `onlyBuiltDependencies` array with `allowBuilds`,
# an explicit map of package → boolean. `true` = run the package's
# install/postinstall script; `false` = block it (default for unlisted).
#
# Don't add packages here without inspecting their install scripts.
# These five each need their script to land precompiled binaries OR
# build native bindings on the user's host:
#   • better-sqlite3   — compiles or downloads prebuilt SQLite + node binding
#   • electron         — downloads + unpacks the Electron runtime
#   • electron-winstaller — Windows installer bundler (transitive of electron-builder)
#   • esbuild          — downloads the platform-specific binary
#   • sharp            — downloads precompiled libvips binaries
#   • msw              — postinstall is a CLI welcome message. The
#                        browser-mode Service Worker is already shipped
#                        at ui/static/mockServiceWorker.js. Refresh it
#                        after a major msw bump with
#                        `pnpm exec msw init ui/static --no-save`.
#                        Block the welcome-noise auto-run.
allowBuilds:
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  msw: false
  sharp: true

# ── Transitive override pinning ─────────────────────────────────────
# pnpm 11 reads `overrides` ONLY from pnpm-workspace.yaml in workspaces.
# Documented at https://pnpm.io/settings#overrides — the `pnpm.overrides`
# key in package.json is silently ignored when a workspace is present.
#
# Each entry below pins a specific transitive away from a known CVE.
overrides:
  # GHSA-67mh-4wv8-2f99 — esbuild dev server lets any website CORS-read
  # the response. Patched in 0.25.0. @esbuild-kit/core-utils still pins
  # 0.18.x; this forces all instances onto a safe version.
  esbuild: ">=0.25.12"
  # GHSA-pxg6-pf52-xh8x — cookie accepts out-of-bounds chars in name/path/
  # domain (CRLF injection). Patched in 0.7.0. @sveltejs/kit 2.59.x still
  # bundles 0.6.0.
  cookie: ">=0.7.0"
  # GHSA-f5x3-32g6-xq36, GHSA-3jfq-g458-7qm9, plus 3 sibling CVEs — tar
  # path traversal / arbitrary write. Patched in 7.5.7.
  tar: ">=7.5.7"
  # GHSA-px2f-25qx-c2pq — @tootallnate/once is unmaintained and has an
  # incorrect control flow advisory. Last published version was 1.x;
  # forks bundle 2.x which is what agent-base now uses.
  "@tootallnate/once": ">=2.0.0"

# ── Peer dependency rules ──────────────────────────────────────────
peerDependencyRules:
  # Better Auth optionally peers on react/@types/react for its React SDK
  # — we don't use that. Suppress the missing-peer warnings.
  ignoreMissing:
    - "@types/react"
    - react

# ── Catalog — single source of truth for cross-workspace deps ──────
# pnpm 9.5+ feature. Any workspace can reference these via
# `"<pkg>": "catalog:"` in its package.json and pnpm install resolves
# to the version below. Removes the entire class of "root has X@1,
# ui has X@2" drift bugs — alignment is structural, not test-enforced.
#
# Add a dep here when it's used by ≥ 2 workspaces. Single-workspace
# deps stay in that workspace's package.json with their literal version.
catalog:
  # Test infra — used in root + ui + ui/electron
  "@vitest/coverage-v8": 4.1.6
  vitest: 4.1.6
  # E2E / playwright — root scripts + ui tests
  playwright: 1.60.0
  # Env loading — root scripts + ui runtime
  dotenv: 17.4.2
  # TypeScript toolchain — ui + ui/electron
  typescript: 6.0.3
  # Electron desktop — staying on the last CJS-compatible majors.
  # electron-is-dev 3.x and electron-serve 2.x are ESM-only; the
  # Electron main process is CJS (`ui/electron/tsconfig.json` says
  # `"module": "NodeNext"` and the built `main` field is CJS for
  # electron-builder compatibility). Importing ESM-only deps from
  # CJS throws ERR_REQUIRE_ESM at app boot. Bump these when we
  # migrate ui/electron's main process to ESM, not before.
  electron-is-dev: 2.0.0
  electron-serve: 1.3.0
