# Career-Ops — Canonical States
# Source of truth for career-ops (writer) and dashboard (reader).
# Both systems MUST use these exact states.
#
# Rule: The status field in applications.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the date column.

states:
  - id: evaluated
    label: Evaluated
    aliases: [evaluada]
    description: Offer evaluated with report, pending decision
    dashboard_group: evaluated

  - id: applied
    label: Applied
    aliases: [aplicado, enviada, aplicada, sent]
    description: Application submitted
    dashboard_group: applied

  - id: responded
    label: Responded
    aliases: [respondido]
    description: Company has responded (not yet interview)
    dashboard_group: responded

  - id: interview
    label: Interview
    aliases: [entrevista]
    description: Active interview process (use sub-stages below for finer tracking)
    dashboard_group: interview

  # Interview sub-stages — finer-grained than the legacy 'Interview' bucket.
  # Pick one of these for new rows; 'Interview' stays as a fallback for
  # legacy data + ambiguous early-stage outreach.
  - id: phonescreen
    label: PhoneScreen
    aliases: [phone-screen, phone screen, phone, recruiter screen, hr screen]
    description: Initial recruiter / hiring-manager phone screen
    dashboard_group: interview

  - id: technical
    label: Technical
    aliases: [tech screen, technical interview, coding interview, tech]
    description: Technical interview (algorithms, system design, live coding)
    dashboard_group: interview

  - id: takehome
    label: TakeHome
    aliases: [take-home, take home, takehome assignment, coding test, coding challenge]
    description: Take-home coding assignment or homework
    dashboard_group: interview

  - id: onsite
    label: Onsite
    aliases: [on-site, on site, virtual onsite, panel, super day, loop]
    description: Multi-round onsite / panel loop
    dashboard_group: interview

  - id: final
    label: Final
    aliases: [final round, exec, vp, hiring committee, hiring manager final, leadership]
    description: Final round / hiring committee / executive interview
    dashboard_group: interview

  - id: offer
    label: Offer
    aliases: [oferta]
    description: Offer received
    dashboard_group: offer

  - id: rejected
    label: Rejected
    aliases: [rechazado, rechazada]
    description: Rejected by company
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    aliases: [descartado, descartada, cerrada, cancelada]
    description: Discarded by candidate or offer closed
    dashboard_group: discarded

  - id: skip
    label: SKIP
    aliases: [no_aplicar, no aplicar, skip, monitor]
    description: Doesn't fit, don't apply
    dashboard_group: skip

  # Autonomous-apply states. The apply-queue drain writes "Queued" when
  # the user clicks Apply, "Applying" while the Playwright script is running,
  # then either "Applied" (success) or "ManualApplyNeeded" (script hit a
  # captcha / anti-bot / unknown field; user needs to finish by hand).
  - id: queued
    label: Queued
    aliases: []
    description: Queued for autonomous apply
    dashboard_group: queued

  - id: applying
    label: Applying
    aliases: []
    description: Autonomous-apply script running
    dashboard_group: applying

  - id: manual-apply-needed
    label: ManualApplyNeeded
    aliases: [manualapplyneeded, manual apply needed]
    description: Autonomous apply blocked (captcha / anti-bot / unknown field); user must finish
    dashboard_group: manual-apply-needed
