# Dev-only electron-updater config (COMMITTED sample).
#
# A packaged build ships its own app-update.yml generated by electron-builder
# from electron-builder.config.json's `publish` block; this file is NEVER used
# there. It exists so a DEV run (`pnpm electron:start`) can exercise the real
# update check + event flow against GitHub Releases without a full packaged
# build: set HERON_DEV_UPDATE=1 and index.ts points autoUpdater at this file via
# forceDevUpdateConfig + updateConfigPath.
#
# Mirrors the publish config (provider github, owner kaelys-js, repo heron).
# Without the HERON_DEV_UPDATE flag, dev keeps the "development build" dialog and
# this file is ignored.
provider: github
owner: kaelys-js
repo: heron
