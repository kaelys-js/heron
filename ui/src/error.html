<!doctype html>
<!--
  Branded fallback shown when SvelteKit's SSR layer can't even render
  +error.svelte — typically when the root layout / hook throws BEFORE
  routing has settled. The framework's default fallback is a stark
  white page with a thin divider and generic "Something broke on our
  end" copy that breaks brand identity AT the moment users are
  already nervous (the app crashed).

  This file replaces that fallback. It mirrors:
    • the dark-first brand palette from app.html / boot-fallback
    • the rocket icon used by every other surface
    • the same loading-shimmer gradient affordance

  Critical: this is RAW HTML — no SvelteKit, no JS bundles, no
  Tailwind. Every visual must be inlined. SvelteKit's `%message%` and
  `%status%` tokens are replaced at error-render time with the actual
  status code + message string. If the error has no message, SvelteKit
  leaves the placeholder text — handled by the CSS `:empty` selector
  on the message line so we degrade to a generic copy.
-->
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>%status% · Heron</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #0e1014;
        color: #e8eaed;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Brand bloom — same recipe as app.html's boot-fallback so the
           transition between "loading" and "crashed" feels continuous. */
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(122, 140, 109, 0.18) 0%,
            rgba(74, 91, 109, 0.12) 32%,
            rgba(200, 155, 74, 0.06) 56%,
            transparent 78%
          ),
          radial-gradient(ellipse at 50% 0%, rgba(200, 155, 74, 0.1) 0%, transparent 60%),
          #0e1014;
      }
      .container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        max-width: 420px;
        padding: 32px 28px;
        border-radius: 18px;
        background: rgba(24, 24, 27, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 48px -12px rgba(0, 0, 0, 0.6);
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 24px rgba(122, 140, 109, 0.35))
          drop-shadow(0 6px 16px rgba(122, 140, 109, 0.2));
      }
      .mark svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .status {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #f87171;
        text-align: center;
        margin-bottom: 8px;
        font-feature-settings: 'tnum';
      }
      .title {
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        margin: 0 0 8px 0;
        letter-spacing: -0.01em;
      }
      .message {
        font-size: 14px;
        line-height: 1.5;
        color: #a1a1aa;
        text-align: center;
        margin: 0 0 24px 0;
      }
      .message:empty::before {
        content: "We've logged it. Try again or head home — the rest of the app should still work.";
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        font-size: 13px;
        font-weight: 500;
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #fafafa;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition:
          background 120ms ease,
          border-color 120ms ease;
      }
      .btn:hover,
      .btn:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.18);
        outline: none;
      }
      .btn.primary {
        background: linear-gradient(135deg, #4a5b6d, #7a8c6d, #c89b4a);
        border-color: rgba(200, 155, 74, 0.55);
        color: white;
      }
      .btn.primary:hover {
        filter: brightness(1.05);
      }
      .footnote {
        font-size: 11px;
        color: #71717a;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" role="alert" aria-live="assertive">
        <div class="mark">
          <!-- Same brand mark as app.html's boot-fallback. Inline so it
               renders without any chunk loaded. -->
          <svg viewBox="0 0 1024 1024" aria-hidden="true">
            <defs>
              <linearGradient id="err-bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#4a5b6d" />
                <stop offset="55%" stop-color="#7a8c6d" />
                <stop offset="100%" stop-color="#c89b4a" />
              </linearGradient>
            </defs>
            <rect width="1024" height="1024" rx="232" fill="url(#err-bg)" />
            <rect x="0" y="0" width="1024" height="512" rx="232" fill="#ffffff" opacity="0.06" />
            <g
              transform="translate(192,192) scale(26.667)"
              fill="none"
              stroke="#ffffff"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
              <path
                d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09"
              />
              <path
                d="M9 12a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.4 22.4 0 0 1-4 2z"
              />
              <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 .05 5 .05" />
            </g>
          </svg>
        </div>
        <div class="status">Error · %status%</div>
        <h1 class="title">Something broke on our end</h1>
        <p class="message">%message%</p>
        <div class="actions">
          <a href="/" class="btn primary">Reload Heron</a>
          <button class="btn" onclick="history.back()">Go back</button>
        </div>
        <p class="footnote">If this keeps happening, sign back in or restart the app.</p>
      </div>
    </div>
  </body>
</html>
