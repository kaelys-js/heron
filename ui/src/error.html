<!doctype html>
<!--
  Branded fallback shown when SvelteKit's SSR layer can't even render
  +error.svelte — typically when the root layout / hook throws BEFORE
  routing has settled. The framework's default fallback is a stark
  white page with a thin divider and generic "Something broke on our
  end" copy that breaks brand identity AT the moment users are
  already nervous (the app crashed).

  This file replaces that fallback. It mirrors:
    • the dark-first brand palette from app.html / boot-fallback
    • the brand mark used by every other surface (kept in sync with
      branding/logo.svg by apply-brand's AUTO-GENERATED:brand-mark marker)
    • the same loading-shimmer gradient affordance

  Critical: this is RAW HTML — no SvelteKit, no JS bundles, no
  Tailwind. Every visual must be inlined. SvelteKit's `%sveltekit.error.message%` and
  `%sveltekit.status%` tokens are replaced at error-render time with the actual
  status code + message string. If the error has no message, SvelteKit
  leaves the placeholder text — handled by the CSS `:empty` selector
  on the message line so we degrade to a generic copy.
-->
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>%sveltekit.status% · Heron</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #0e1014;
        color: #e8eaed;
        /* Match the app's --font-sans (Inter) so the fallback reads identically to
           the in-app ErrorScreen when Inter is cached; graceful system fallback
           otherwise (no @font-face — a no-network fallback shouldn't fetch fonts). */
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Brand bloom — the SAME dawn-sky recipe as BloomBackground.svelte /
           ErrorScreen, so the static SSR-crash fallback shares ONE visual base
           with the in-app error pages and login. */
        background:
          radial-gradient(135% 100% at 50% 50%, transparent 46%, rgba(0, 0, 0, 0.42) 100%),
          radial-gradient(
            120% 85% at 50% 116%,
            rgba(200, 155, 74, 0.17) 0%,
            rgba(200, 155, 74, 0.06) 30%,
            transparent 58%
          ),
          radial-gradient(135% 95% at 50% 104%, rgba(122, 140, 109, 0.1) 0%, transparent 62%),
          linear-gradient(180deg, #090b0f 0%, #0e1014 44%, #11151c 100%);
      }
      .container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
        box-sizing: border-box;
      }
      .content {
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 24px rgba(122, 140, 109, 0.35))
          drop-shadow(0 6px 16px rgba(122, 140, 109, 0.2));
      }
      .mark svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .status {
        font-family:
          'IBM Plex Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas,
          'Liberation Mono', monospace;
        font-size: 48px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.02em;
        color: #a8b0bb;
        text-align: center;
        margin-bottom: 6px;
        font-feature-settings: 'tnum';
      }
      .title {
        /* Match the app's @layer base heading rule (app.css): bare <h1> renders
           in Fraunces serif, NOT the Inter body font — that's why the in-app
           ErrorScreen title and this fallback looked different. No @font-face
           here (fallback fetches no fonts); the serif fallbacks keep it a serif. */
        font-family:
          'Fraunces', 'Iowan Old Style', 'Apple Garamond', Baskerville, 'Times New Roman', Times,
          Georgia, serif;
        font-optical-sizing: auto;
        font-size: 24px;
        font-weight: 600;
        text-align: center;
        margin: 0 0 8px 0;
        letter-spacing: -0.015em;
      }
      .message {
        font-size: 14px;
        line-height: 1.5;
        color: #a8b0bb;
        text-align: center;
        margin: 0 0 24px 0;
      }
      .message:empty::before {
        content: "We've logged it. Try again or head home — the rest of the app should still work.";
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      /* Match the in-app shadcn Button EXACTLY (it's what ErrorScreen renders):
         h-8 (32px) · px-2.5 (10px) · gap-1.5 (6px) · text-sm (14px) · font-medium
         · rounded-lg (--radius 0.625rem = 10px). Base = the `outline` variant
         (used by "Go home"); .primary + .ghost override below. Colors are the
         resolved DARK-theme tokens (--primary #c89b4a / --primary-foreground
         #14181f / --input #232a35 / --muted #1a1f29 / --foreground #e8eaed). */
      .btn {
        font-size: 14px;
        font-weight: 500;
        height: 32px;
        padding: 0 10px;
        border-radius: 10px;
        border: 1px solid #232a35;
        background: rgba(35, 42, 53, 0.3);
        color: #e8eaed;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        width: 100%;
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          filter 120ms ease;
      }
      .btn:hover,
      .btn:focus-visible {
        background: rgba(35, 42, 53, 0.5);
        outline: none;
      }
      .btn.primary {
        background: #c89b4a;
        border-color: #c89b4a;
        color: #14181f;
      }
      .btn.primary:hover {
        filter: brightness(1.05);
      }
      .btn.ghost {
        background: transparent;
        border-color: transparent;
        color: #a8b0bb;
      }
      .btn.ghost:hover,
      .btn.ghost:focus-visible {
        background: rgba(26, 31, 41, 0.5);
        color: #e8eaed;
      }
      .btn-ic {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .footnote {
        font-size: 11px;
        color: #71717a;
        text-align: center;
        margin-top: 20px;
      }
      /* Support reference: a copyable blob (status · time · UA) so a user can
         hand support something concrete even on the catastrophic SSR fallback.
         Client-side only (no server log id available here). */
      .reference {
        margin-top: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 12px;
        color: #71717a;
      }
      .ref-code {
        font-family:
          'IBM Plex Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, Consolas,
          'Liberation Mono', monospace;
        color: #a8b0bb;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        padding: 2px 6px;
      }
      .ref-copy {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 0;
        background: transparent;
        color: #a8b0bb;
        font: inherit;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 6px;
      }
      .ref-copy:hover,
      .ref-copy:focus-visible {
        color: #fafafa;
        background: rgba(255, 255, 255, 0.06);
        outline: none;
      }
      .ref-ic-wrap {
        position: relative;
        width: 14px;
        height: 14px;
        display: inline-flex;
      }
      .ref-ic {
        position: absolute;
        inset: 0;
        width: 14px;
        height: 14px;
        transition:
          transform 180ms ease,
          opacity 180ms ease;
      }
      .ref-ic-check {
        color: #34d399;
        transform: scale(0);
        opacity: 0;
      }
      .ref-copy.copied .ref-ic-copy {
        transform: scale(0);
        opacity: 0;
      }
      .ref-copy.copied .ref-ic-check {
        transform: scale(1);
        opacity: 1;
      }
      .sr-live {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
      @media (prefers-reduced-motion: reduce) {
        .ref-ic {
          transition: none;
        }
      }
      /* Developer details — DEV only (shown by the inline script when the message
         carries a stack). Mirrors the in-app +error.svelte disclosure: rotating
         chevron + status chip + copyable mono stack block. Hidden by default. */
      .dev-details {
        margin: 18px auto 0;
        width: 100%;
        max-width: 360px;
        text-align: left;
        border: 1px solid rgba(35, 42, 53, 0.8);
        border-radius: 8px;
        background: rgba(26, 31, 41, 0.3);
      }
      .dd-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        list-style: none;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 500;
        color: #a8b0bb;
      }
      .dd-summary::-webkit-details-marker {
        display: none;
      }
      .dd-chevron {
        transition: transform 150ms ease;
      }
      .dev-details[open] .dd-chevron {
        transform: rotate(90deg);
      }
      .dd-chip {
        margin-left: auto;
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        color: #e8eaed;
        background: #1a1f29;
        border-radius: 4px;
        padding: 2px 6px;
      }
      .dd-body {
        border-top: 1px solid rgba(35, 42, 53, 0.8);
        padding: 10px 12px;
      }
      .dd-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 11px;
        color: #a8b0bb;
      }
      .dd-pre {
        max-height: 256px;
        overflow: auto;
        margin: 0;
        padding: 10px;
        border-radius: 6px;
        background: rgba(14, 16, 20, 0.6);
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(232, 234, 237, 0.8);
        white-space: pre-wrap;
        word-break: break-word;
      }
      @media (prefers-reduced-motion: reduce) {
        .dd-chevron {
          transition: none;
        }
      }
    </style>
  </head>

            <span class="dd-chip" id="dd-chip"></span>

          <div class="dd-body">
            <div class="dd-bar">
              <span>Stack trace</span>
              <button type="button" id="dd-copy" class="ref-copy" aria-label="Copy stack trace">
                <span class="ref-ic-wrap" aria-hidden="true">
                  <svg
                    class="ref-ic ref-ic-copy"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                  <svg
                    class="ref-ic ref-ic-check"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                </span>
                <span id="dd-copy-text">Click to copy</span>
              </button>
            </div>
            <pre class="dd-pre" id="dd-pre"></pre>
          </div>
        </details>
        <p class="footnote">If this keeps happening, sign back in or restart the app.</p>
      </div>
    </div>
    <script>
      (function () {
        // handleError bakes "<human> · ref <uuid>" into the message (the only
        // field SvelteKit templates into error.html), plus a DEV-only
        // "\n::stack::\n<stack>". Parse them out, clean the visible message, show
        // err_<short> + (in dev) the stack disclosure — matching ErrorScreen.
        var msgEl = document.querySelector('.message');
        var raw = msgEl ? msgEl.textContent : '';
        var parts = raw.split('\n::stack::\n');
        var head = parts[0];
        var stack = parts.length > 1 ? parts.slice(1).join('\n::stack::\n') : '';

        var m = head.match(/^([\s\S]*?)\s*·\s*ref\s+([0-9a-fA-F-]{8,})\s*$/);
        var fullId = m ? m[2] : '';
        if (msgEl) msgEl.textContent = (m ? m[1] : head).trim();

        var refRow = document.querySelector('.reference');
        var code = document.getElementById('ref-code');
        if (fullId && code) {
          code.textContent = 'err_' + fullId.slice(0, 8);
        } else if (refRow) {
          // No correlated id (a non-handleError fatal) — hide the reference row.
          refRow.style.display = 'none';
        }

        // Copy-button wiring shared by the reference + stack buttons: animate
        // Copy→Check, announce via the live region, revert after 1.6s.
        function wireCopy(btnId, textId, value, idle) {
          var btn = document.getElementById(btnId);
          var label = document.getElementById(textId);
          var live = document.getElementById('copy-live');
          var timer;
          if (!btn || !value) return;
          btn.addEventListener('click', function () {
            function done() {
              btn.classList.add('copied');
              if (label) label.textContent = 'Copied';
              if (live) live.textContent = 'copied';
              clearTimeout(timer);
              timer = setTimeout(function () {
                btn.classList.remove('copied');
                if (label) label.textContent = idle;
                if (live) live.textContent = '';
              }, 1600);
            }
            try {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(value).then(done, function () {});
              } else {
                done();
              }
            } catch (e) {
              /* clipboard unavailable — the value is visible to copy by hand */
            }
          });
        }

        wireCopy('copy-ref', 'copy-text', fullId, 'Click to copy');

        // Dev-details: only present when a stack was embedded (dev builds).
        if (stack) {
          var pre = document.getElementById('dd-pre');
          var chip = document.getElementById('dd-chip');
          var statusEl = document.querySelector('.status');
          var dd = document.getElementById('dev-details');
          if (pre) pre.textContent = stack;
          if (chip && statusEl) chip.textContent = statusEl.textContent.trim();
          if (dd) dd.style.display = '';
          wireCopy('dd-copy', 'dd-copy-text', stack, 'Click to copy');
        }
      })();
    </script>
  </body>
</html>
