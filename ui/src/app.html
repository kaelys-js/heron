<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Paint the brand-dark background before ANY CSS chunk loads, so the
         WebView never momentarily shows the white default bg on first paint
         or on reload. The theme-bootstrap script below flips to light for
         users who chose light explicitly. -->
    <style>
      html,
      body {
        background-color: #0a0a0b;
        color: #e4e4e7;
        margin: 0;
        min-height: 100vh;
        /* Stop iOS WebView from auto-shrinking text on small screens —
           keep the same px sizes the desktop renders so 14px stays 14px
           on iPhone too. */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* Crisper rendering on Retina + matches what desktop Electron uses. */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html.light,
      html.light body {
        background-color: #fafaf9;
        color: #18181b;
      }
    </style>

    <!--
      Theme bootstrap — applied BEFORE Svelte hydrates to avoid the dreaded
      light-mode flash. Reads localStorage:career-ops:theme ('light'|'dark'|'system')
      and falls back to system preference. Mirrors the runtime store in
      src/lib/theme.svelte.ts; keep these in sync.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('career-ops:theme');
          var mode = stored === 'light' || stored === 'dark' ? stored : 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
          // Hint to forms and scrollbars
          root.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>


    <meta name="generator" content="SvelteKit" />

    <!-- Don't index this — local-only dashboard -->
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Theme + color scheme — `theme-color` per scheme so iOS / Android
         status bars and Chrome's toolbar pick the right tint. -->
    <meta name="theme-color" content="#0f0f12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- PWA / installable web app — modern + legacy keys for cross-browser
         pin-to-Home support. `application-name` shows under the icon on
         Windows Start when the user pins the PWA from Edge. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Career Ops" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="career-ops" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!-- Windows Start tile (pinned PWA from Edge / IE) -->
    <meta name="msapplication-TileColor" content="#5b6cff" />
    <meta
      name="msapplication-TileImage"
      content="%sveltekit.assets%/icons/career-ops-256.png"
    />
    <meta name="msapplication-config" content="none" />

    <!-- Icons + manifest. Order matters: more-specific first (browser
         picks the first matching type/size). favicon.ico is included as
         a legacy fallback for older browsers and email-client previews. -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="48x48" href="%sveltekit.assets%/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%sveltekit.assets%/icons/career-ops-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%sveltekit.assets%/icons/career-ops-512.png"
    />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/icons/career-ops-256.png"
    />
    <!-- Safari pinned-tab + macOS Reading List (monochrome silhouette). -->
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#10b981" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- Open Graph — link previews when shared internally or via
         Tailscale magic-DNS. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Career Ops" />
    <meta property="og:title" content="Career Ops" />
    <meta property="og:description" content="Run your job search like a product launch." />
    <meta property="og:image" content="%sveltekit.assets%/icons/career-ops-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Career Ops" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card (summary, same image). -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Career Ops" />
    <meta name="twitter:description" content="Run your job search like a product launch." />
    <meta name="twitter:image" content="%sveltekit.assets%/icons/career-ops-512.png" />

    <!-- Author + copyright -->
    <meta name="author" content="resist.js" />
    <meta name="copyright" content="© 2026 resist.js (original work © 2026 santifer). Licensed under the MIT License." />

    <!-- View Transitions API — opt in to same-origin transitions so
         page navigations get the cross-fade animation in Chrome 111+ /
         Safari 18+. Pair with `view-transition-name` in CSS. -->
    <meta name="view-transition" content="same-origin" />

    <!-- Speculation Rules — prerender same-origin links on hover/touch
         start so they paint instantly. Chrome 121+ honours this; older
         browsers ignore it. -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "where": { "href_matches": "/*" },
            "eagerness": "moderate"
          }
        ]
      }
    </script>

    <!-- Anthropic + Gemini are HOT external endpoints — preconnect saves
         the TLS handshake on first call. Falls back gracefully when the
         user disabled those providers. -->
    <link rel="preconnect" href="https://api.anthropic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.anthropic.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-foreground antialiased">
    <!-- Skip-to-content link for keyboard + screen-reader users. Hidden
         visually until focused; brings focus straight to <main>. -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded focus:bg-primary focus:px-4 focus:py-2 focus:text-primary-foreground focus:shadow-lg"
    >
      Skip to main content
    </a>
    <!-- Boot fallback — always-visible UI before SvelteKit hydrates.
         Visually matches the native Capacitor splash (same dark bg,
         same brand mark, same proportions) so the transition between
         them feels like one continuous frame.

         Design:
         - No text. The brand mark + a subtle three-dot pulse carry the
           "loading" meaning the way native iOS apps do.
         - Icon fades + scales in (300ms, ease-out) so the hand-off from
           the native splash feels alive instead of an instant cut.
         - Soft drop-shadow under the icon for elevation against the
           dark bg — Apple HIG-style "the icon is a floating object".
         - The wrapping <div> has overflow: visible explicitly so the
           drop-shadow + the bouncing dots are never clipped on narrower
           devices (iPhone SE) where some prior implementations cropped
           the right edge of the mark.

         Failure handling: if hydration doesn't complete in 5s, flip to
         a "Something went wrong" panel with Retry + a copy-diagnostics
         button. The blank-screen guard in the script below also fires
         if +layout.svelte's onMount NEVER tags the fallback for removal
         (e.g. parse-error / missing-chunk / CSP block scenarios). -->
    <div
      id="boot-fallback"
      style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 24px; background-color: #0a0a0b; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; z-index: 9999; transition: opacity 300ms ease-out; overflow: visible;"
    >
      <!-- Brand mark wrapper — drop-shadow filter lives here (not on the
           SVG itself) so the gradient/path rendering stays crisp. The
           wrapper has its own width/height so overflow rules don't clip
           the soft shadow halo. -->
      <div
        id="boot-fallback-mark"
        style="width: 128px; height: 128px; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 8px 32px rgba(139, 92, 246, 0.35)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)); opacity: 0; transform: scale(0.92); animation: boot-mark-in 360ms cubic-bezier(0.16, 1, 0.3, 1) forwards;"
      >
        <!-- 128×128 inline brand mark — mirror of branding/logo.svg.
             Lucide `rocket` glyph (ISC License). Gradient ID is scoped
             (`bfb-*`) so it doesn't collide with any other inline SVG. -->
        <svg
          width="128"
          height="128"
          viewBox="0 0 1024 1024"
          aria-hidden="true"
          style="display: block;"
        >
          <defs>
            <linearGradient id="bfb-bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="55%" stop-color="#8b5cf6" />
              <stop offset="100%" stop-color="#a855f7" />
            </linearGradient>
          </defs>
          <rect width="1024" height="1024" rx="232" fill="url(#bfb-bg)" />
          <rect x="0" y="0" width="1024" height="512" rx="232" fill="#ffffff" opacity="0.06" />
          <g
            transform="translate(192,192) scale(26.667)"
            fill="none"
            stroke="#ffffff"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
            <path
              d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09"
            />
            <path
              d="M9 12a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.4 22.4 0 0 1-4 2z"
            />
            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 .05 5 .05" />
          </g>
        </svg>
      </div>

      <!-- Three-dot pulse loading indicator — no text, very iOS-native.
           Each dot fades in/out on a staggered cycle so the row reads
           as a continuous progress signal without any spinning or
           shimmering geometry. -->
      <div
        id="boot-fallback-dots"
        style="display: flex; gap: 8px; align-items: center; opacity: 0; animation: boot-mark-in 400ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;"
        aria-label="Loading"
      >
        <span
          style="width: 7px; height: 7px; border-radius: 50%; background: #8b5cf6; animation: boot-dot 1.2s ease-in-out 0s infinite;"
        ></span>
        <span
          style="width: 7px; height: 7px; border-radius: 50%; background: #8b5cf6; animation: boot-dot 1.2s ease-in-out 0.15s infinite;"
        ></span>
        <span
          style="width: 7px; height: 7px; border-radius: 50%; background: #8b5cf6; animation: boot-dot 1.2s ease-in-out 0.3s infinite;"
        ></span>
      </div>

      <!-- Error panel — hidden by default; the blank-screen guard below
           reveals this after 5s of stalled hydration. Replaces the old
           "Still loading…" text + Reload button with a richer UI that
           includes Retry, a Copy diagnostics button (URL, UA, errors
           captured by window.onerror) and a hint about what to try. -->
      <div
        id="boot-fallback-error"
        style="display: none; flex-direction: column; align-items: center; gap: 12px; max-width: 320px; text-align: center; opacity: 0; transition: opacity 200ms ease-out;"
      >
        <div
          style="font-size: 15px; font-weight: 600; color: #fafafa;"
        >Something went wrong loading the app</div>
        <div style="font-size: 13px; color: #a1a1aa; line-height: 1.5;">
          The interface didn't finish loading. This is usually a network glitch — try again.
        </div>
        <div style="display: flex; gap: 8px; margin-top: 4px;">
          <button
            id="boot-fallback-retry"
            type="button"
            onclick="location.reload()"
            style="padding: 8px 16px; border-radius: 8px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;"
          >
            Try again
          </button>
          <button
            id="boot-fallback-copy"
            type="button"
            style="padding: 8px 14px; border-radius: 8px; border: 1px solid #27272a; background-color: #18181b; color: #e4e4e7; font-size: 13px; cursor: pointer; font-family: inherit;"
          >
            Copy diagnostics
          </button>
        </div>
      </div>

      <style>
        /* Icon fade-in + scale-in for a modern iOS-app feel. */
        @keyframes boot-mark-in {
          from {
            opacity: 0;
            transform: scale(0.92);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }
        /* Staggered three-dot pulse — sized for high-DPI clarity. */
        @keyframes boot-dot {
          0%,
          60%,
          100% {
            transform: scale(1);
            opacity: 0.35;
          }
          30% {
            transform: scale(1.4);
            opacity: 1;
          }
        }
        /* When +layout.svelte removes the #boot-fallback by tagging
           data-hide, fade out gracefully and stop accepting taps. */
        #boot-fallback[data-hide='1'] {
          opacity: 0;
          pointer-events: none;
        }
        /* Error state: hide the dots, swap the brand mark to a slightly
           dimmer version, show the error panel. data-state="error" is set
           by the 5-second guard below. */
        #boot-fallback[data-state='error'] #boot-fallback-dots {
          display: none;
        }
        #boot-fallback[data-state='error'] #boot-fallback-mark {
          filter: drop-shadow(0 4px 16px rgba(239, 68, 68, 0.25))
            drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
        #boot-fallback[data-state='error'] #boot-fallback-error {
          display: flex;
          opacity: 1;
        }
        @media (prefers-reduced-motion: reduce) {
          #boot-fallback-mark,
          #boot-fallback-dots {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
          }
          #boot-fallback-dots span {
            animation: none !important;
            opacity: 1 !important;
          }
        }
      </style>
    </div>
    <script>
      // Capture early errors so the diagnostics button has something
      // useful to copy. The full error-reporter installs later in
      // hydration — this is a lightweight bridge so failures BEFORE
      // hydration get surfaced too.
      (function () {
        var captured = [];
        window.addEventListener('error', function (e) {
          captured.push({
            type: 'error',
            message: String(e.message || e.error || 'unknown'),
            source: (e.filename || '') + ':' + (e.lineno || 0),
          });
        });
        window.addEventListener('unhandledrejection', function (e) {
          captured.push({
            type: 'unhandledrejection',
            message: String(e.reason && e.reason.message ? e.reason.message : e.reason),
          });
        });

        // Blank-screen guard. After 5 seconds without successful
        // hydration (which removes the fallback by setting data-hide),
        // flip to the error state. The user always gets a way out
        // instead of a frozen splash.
        setTimeout(function () {
          var el = document.getElementById('boot-fallback');
          if (!el) return; // hydration succeeded, fallback already gone
          if (el.getAttribute('data-hide') === '1') return; // fading out cleanly
          el.setAttribute('data-state', 'error');
        }, 5000);

        // Wire up Copy diagnostics — assembles URL, UA, and any errors
        // we captured, then writes them to the clipboard. Falls back to
        // alert() if clipboard write fails (e.g. iOS WKWebView clipboard
        // permission denied).
        document.addEventListener('click', function (e) {
          var target = e.target;
          if (!target || target.id !== 'boot-fallback-copy') return;
          var diag = [
            'career-ops — boot diagnostics',
            'time: ' + new Date().toISOString(),
            'url: ' + location.href,
            'ua: ' + navigator.userAgent,
            'errors: ' + (captured.length === 0 ? 'none' : ''),
          ];
          for (var i = 0; i < captured.length; i++) {
            diag.push('  - [' + captured[i].type + '] ' + captured[i].message);
            if (captured[i].source) diag.push('    @ ' + captured[i].source);
          }
          var text = diag.join('\n');
          try {
            navigator.clipboard.writeText(text).then(
              function () {
                target.textContent = 'Copied ✓';
                setTimeout(function () {
                  target.textContent = 'Copy diagnostics';
                }, 1800);
              },
              function () {
                alert(text);
              },
            );
          } catch (_) {
            alert(text);
          }
        });
      })();
    </script>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
