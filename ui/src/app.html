<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Paint the brand-dark background before ANY CSS chunk loads, so the
         WebView never momentarily shows the white default bg on first paint
         or on reload. The theme-bootstrap script below flips to light for
         users who chose light explicitly. -->
    <style>
      html,
      body {
        background-color: #0a0a0b;
        color: #e4e4e7;
        margin: 0;
        min-height: 100vh;
        /* Stop iOS WebView from auto-shrinking text on small screens —
           keep the same px sizes the desktop renders so 14px stays 14px
           on iPhone too. */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* Crisper rendering on Retina + matches what desktop Electron uses. */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html.light,
      html.light body {
        background-color: #fafaf9;
        color: #18181b;
      }
    </style>

    <!--
      Theme bootstrap — applied BEFORE Svelte hydrates to avoid the dreaded
      light-mode flash. Reads localStorage:career-ops:theme ('light'|'dark'|'system')
      and falls back to system preference. Mirrors the runtime store in
      src/lib/theme.svelte.ts; keep these in sync.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('career-ops:theme');
          var mode = stored === 'light' || stored === 'dark' ? stored : 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
          // Hint to forms and scrollbars
          root.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>


    <meta name="generator" content="SvelteKit" />

    <!-- Don't index this — local-only dashboard -->
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Theme + color scheme — `theme-color` per scheme so iOS / Android
         status bars and Chrome's toolbar pick the right tint. -->
    <meta name="theme-color" content="#0f0f12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- PWA / installable web app — modern + legacy keys for cross-browser
         pin-to-Home support. `application-name` shows under the icon on
         Windows Start when the user pins the PWA from Edge. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Career Ops" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="career-ops" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!-- Windows Start tile (pinned PWA from Edge / IE) -->
    <meta name="msapplication-TileColor" content="#5b6cff" />
    <meta
      name="msapplication-TileImage"
      content="%sveltekit.assets%/icons/career-ops-256.png"
    />
    <meta name="msapplication-config" content="none" />

    <!-- Icons + manifest. Order matters: more-specific first (browser
         picks the first matching type/size). favicon.ico is included as
         a legacy fallback for older browsers and email-client previews. -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="48x48" href="%sveltekit.assets%/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%sveltekit.assets%/icons/career-ops-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%sveltekit.assets%/icons/career-ops-512.png"
    />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/icons/career-ops-256.png"
    />
    <!-- Safari pinned-tab + macOS Reading List (monochrome silhouette). -->
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#10b981" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- Open Graph — link previews when shared internally or via
         Tailscale magic-DNS. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Career Ops" />
    <meta property="og:title" content="Career Ops" />
    <meta property="og:description" content="Run your job search like a product launch." />
    <meta property="og:image" content="%sveltekit.assets%/icons/career-ops-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Career Ops" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card (summary, same image). -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Career Ops" />
    <meta name="twitter:description" content="Run your job search like a product launch." />
    <meta name="twitter:image" content="%sveltekit.assets%/icons/career-ops-512.png" />

    <!-- Author + copyright -->
    <meta name="author" content="resist.js" />
    <meta name="copyright" content="© 2026 resist.js (original work © 2026 santifer). Licensed under the MIT License." />

    <!-- View Transitions API — opt in to same-origin transitions so
         page navigations get the cross-fade animation in Chrome 111+ /
         Safari 18+. Pair with `view-transition-name` in CSS. -->
    <meta name="view-transition" content="same-origin" />

    <!-- Speculation Rules — prerender same-origin links on hover/touch
         start so they paint instantly. Chrome 121+ honours this; older
         browsers ignore it. -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "where": { "href_matches": "/*" },
            "eagerness": "moderate"
          }
        ]
      }
    </script>

    <!-- Anthropic + Gemini are HOT external endpoints — preconnect saves
         the TLS handshake on first call. Falls back gracefully when the
         user disabled those providers. -->
    <link rel="preconnect" href="https://api.anthropic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.anthropic.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-foreground antialiased">
    <!-- Skip-to-content link for keyboard + screen-reader users. Hidden
         visually until focused; brings focus straight to <main>. -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded focus:bg-primary focus:px-4 focus:py-2 focus:text-primary-foreground focus:shadow-lg"
    >
      Skip to main content
    </a>
    <!-- Boot fallback — always-visible UI before SvelteKit hydrates.
         Visually matches the native Capacitor splash (same dark bg,
         same brand mark, same proportions) so the transition between
         them feels like one continuous frame. When SvelteKit hydrates
         and removes #boot-fallback in onMount, the fade is from one
         dark surface to another — no white flash, no jump.
         If hydration crashes (parse error, missing chunk, CSP block)
         the fallback stays visible with a Reload button. A 5-second
         timer flips the message to "Still loading…" so the user
         always has a way out. -->
    <div
      id="boot-fallback"
      style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 24px; background-color: #0a0a0b; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; z-index: 9999; transition: opacity 250ms ease-out;"
    >
      <!-- 128×128 inline brand mark — mirror of branding/logo.svg. Keep
           in sync if the master logo changes; the indigo→fuchsia gradient
           IDs are scoped (`bfb-*`) so they don't collide with any other
           inline SVG the app might mount during hydration. -->
      <svg width="128" height="128" viewBox="0 0 1024 1024" aria-hidden="true">
        <defs>
          <linearGradient id="bfb-bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="55%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <rect width="1024" height="1024" rx="232" fill="url(#bfb-bg)"/>
        <rect x="0" y="0" width="1024" height="512" rx="232" fill="#ffffff" opacity="0.06"/>
        <path d="M280 720 L520 480 L640 600 L800 440"
              stroke="#ffffff" stroke-width="84"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M680 360 L800 360 L800 480"
              stroke="#ffffff" stroke-width="84"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <!-- Thin gradient shimmer — replaces the generic spinner. Reads as
           "actively loading" without the dated rotating-arc aesthetic.
           bg-position animation is GPU-friendly so it stays smooth even
           on a slow first paint. -->
      <div style="width: 180px; height: 2px; border-radius: 1px; background: linear-gradient(90deg, transparent 0%, #8b5cf6 50%, transparent 100%); background-size: 200% 100%; animation: boot-shimmer 1.4s ease-in-out infinite;"></div>
      <div id="boot-fallback-msg" style="font-size: 13px; color: #a1a1aa; letter-spacing: 0.02em;">
        Loading…
      </div>
      <button
        id="boot-fallback-retry"
        type="button"
        onclick="location.reload()"
        style="display: none; padding: 10px 18px; border-radius: 8px; border: 1px solid #27272a; background-color: #18181b; color: #e4e4e7; font-size: 14px; cursor: pointer;"
      >
        Reload
      </button>
      <style>
        @keyframes boot-shimmer {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }
        /* When +layout.svelte removes the #boot-fallback element by setting
           the `data-hide` attribute, fade it out gracefully instead of
           cutting. The element is removed from the DOM shortly after the
           transition ends. */
        #boot-fallback[data-hide="1"] {
          opacity: 0;
          pointer-events: none;
        }
      </style>
    </div>
    <script>
      // After 5s, show the Reload button + flip message. If hydration
      // succeeded by then, the whole #boot-fallback div is already gone.
      setTimeout(function () {
        var msg = document.getElementById('boot-fallback-msg');
        var btn = document.getElementById('boot-fallback-retry');
        if (msg) msg.textContent = "Still loading… something might be wrong.";
        if (btn) btn.style.display = '';
      }, 5000);
    </script>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
