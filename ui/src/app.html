<!doctype html>
<!--
  Initial `class="dark"` is the FOUC fix. Without it:
    1. Page loads with no class → Tailwind's :root vars (light) win
    2. Inline script below runs, adds `.dark` for dark-mode users
    3. Tailwind re-resolves → bg flips from light → dark
  Net effect: a visible LIGHT flash before the dark theme settles, most
  obvious on cold-launch when localStorage / matchMedia take longer.
  Shipping the class in the HTML byte-stream means the very first
  composited frame already has the dark variables applied. The inline
  bootstrap script below downgrades to light when the user has
  explicitly chosen 'light' (rare path), so the only flash users see
  is dark → light, which is much less jarring than light → dark on a
  dark-first brand.
-->
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Paint the brand-dark background before ANY CSS chunk loads, so the
         WebView never momentarily shows the white default bg on first paint
         or on reload. The theme-bootstrap script below flips to light for
         users who chose light explicitly. -->
    <style>
      /* Pre-Tailwind paint defaults. Since <html> ships with class="dark"
         (FOUC fix), the dark values are the first-paint values for every
         user. The `:not(.dark)` override applies once the inline script
         has removed `.dark` for explicit-light users — that happens
         BEFORE first paint because the script is synchronous in <head>.

         The `!important` on the body background is intentional: Tailwind
         compiles `body { @apply bg-background; }` which would otherwise
         override these values once the CSS chunk loads. The variable
         (and therefore Tailwind's resolved value) is correct by then,
         but locking the literal here guarantees ZERO flash even if the
         Tailwind chunk takes an extra paint to land. */
      html,
      body {
        background-color: #0e1014;
        color: #e8eaed;
        margin: 0;
        min-height: 100vh;
        /* Stop iOS WebView from auto-shrinking text on small screens —
           keep the same px sizes the desktop renders so 14px stays 14px
           on iPhone too. */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* Crisper rendering on Retina + matches what desktop Electron uses. */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html:not(.dark),
      html:not(.dark) body {
        background-color: #f7f5f0;
        color: #1a1f26;
      }
    </style>

    <!--
      Theme bootstrap — runs BEFORE the body parses so the dark class
      is finalised before paint. `<html>` ships with `class="dark"`
      already (see comment above the html tag), so:
        • dark / system-dark users → no class change, no flash
        • light / system-light users → script REMOVES .dark before any
          CSS chunk has loaded, so the first composited frame is light
      The try/catch falls back to leaving `.dark` in place if anything
      throws (localStorage denied, matchMedia missing), which is the
      safer default for a dark-first brand.

      Mirrors the runtime store in src/lib/theme.svelte.ts — keep these
      two scripts in sync.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('heron:theme');
          var mode = stored === 'light' || stored === 'dark' ? stored : 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          var root = document.documentElement;
          // root already has `class="dark"` from the static HTML. Remove
          // it only when the user has explicitly chosen light (or system
          // resolves to light); otherwise leave it as-is to avoid the
          // FOUC pre-fix used to cause.
          if (resolved === 'light') root.classList.remove('dark');
          else root.classList.add('dark');
          root.style.colorScheme = resolved;
        } catch (e) {
          /* fall back to the pre-applied .dark class (dark-first default) */
        }
      })();
    </script>

    <!--
      On-device diagnostics. Runs FIRST (before the SvelteKit head injection
      and entry module) so it captures module-eval + pre-hydration
      errors that <svelte:boundary> structurally cannot — boundaries only
      catch SYNCHRONOUS render throws, not module-load failures, onMount
      throws, or async/effect rejections. Those are exactly the failure
      classes that blank the iOS WebView: the layout's onMount runs far
      enough to remove #boot-fallback (the boot error surface), and if the
      app tree never paints the user is left on the bare #0e1014 body with
      nothing to read — and on an Apple-Silicon Mac the device WKWebView is
      NOT exposed to Safari's Develop menu, so there's no console either.

      This installs a ring buffer + a self-contained overlay (#heron-diag)
      that SURVIVES the boot-fallback handoff, auto-reveals on a prolonged
      blank screen, and opens via a hidden corner-tap gesture. Ships in
      EVERY build (incl. production TestFlight) on purpose — it's the only
      way to read a boot failure on a physical device. Pure vanilla JS so it
      works offline and independent of SvelteKit.
    -->
    <script>
      (function () {
        var MAX = 300;
        var buf = [];
        var t0 = window.performance && performance.now ? performance.now() : Date.now();
        function ts() {
          var now = window.performance && performance.now ? performance.now() : Date.now();
          return ((now - t0) / 1000).toFixed(3) + 's';
        }
        function fmt(args) {
          var out = [];
          for (var i = 0; i < args.length; i++) {
            var a = args[i];
            try {
              if (a instanceof Error) out.push(String(a.message) + (a.stack ? '\n' + a.stack : ''));
              else if (a && typeof a === 'object') out.push(JSON.stringify(a));
              else out.push(String(a));
            } catch (_) {
              out.push(String(a));
            }
          }
          return out.join(' ');
        }
        function push(kind, msg) {
          try {
            buf.push({ t: ts(), kind: kind, msg: String(msg) });
            if (buf.length > MAX) buf.shift();
            render();
          } catch (_) {}
        }

        // Public API. window.__heronDiag('milestone') records a lifecycle
        // mark; Svelte code calls it via (globalThis).__heronDiag?.(...).
        window.__heronDiag = function (msg) {
          push('mark', msg);
        };
        window.__heronDiag.log = push;
        window.__heronDiag.dump = function () {
          var head = [
            'heron — on-device diagnostics',
            'time: ' + new Date().toISOString(),
            'url: ' + location.href,
            'ua: ' + navigator.userAgent,
            'appReady: ' + (document.documentElement.dataset.appReady || '0'),
            'bootFallback: ' +
              (document.getElementById('boot-fallback')
                ? 'present' +
                  (document.getElementById('boot-fallback').getAttribute('data-state')
                    ? ':' + document.getElementById('boot-fallback').getAttribute('data-state')
                    : '')
                : 'removed'),
            '--------',
          ];
          var lines = buf.map(function (l) {
            return '[' + l.t + '] ' + l.kind + ': ' + l.msg;
          });
          return head.concat(lines).concat(['--------', domSummary()]).join('\n');
        };

        // Snapshot of what the app actually painted into <body> — so a blank
        // screen with JS running (appReady set, but nothing visible) is
        // diagnosable: which body children exist and their layout/visibility.
        function domSummary() {
          if (!document.body) return 'dom: <no body>';
          var kids = Array.prototype.slice.call(document.body.children);
          var out = ['dom: ' + kids.length + ' body children'];
          kids.forEach(function (el) {
            var r = el.getBoundingClientRect();
            var cs = getComputedStyle(el);
            out.push(
              '  <' +
                el.tagName.toLowerCase() +
                (el.id ? '#' + el.id : '') +
                '> ' +
                Math.round(r.width) +
                'x' +
                Math.round(r.height) +
                ' disp=' +
                cs.display +
                ' vis=' +
                cs.visibility +
                ' op=' +
                cs.opacity,
            );
          });
          out.push('body.innerText.len: ' + ((document.body.innerText || '').length));
          return out.join('\n');
        }

        // Does the app tree currently paint anything the user can see? Ignores
        // our own overlays + non-visual nodes. Used by the blank-screen guard.
        function hasVisibleAppContent() {
          if (!document.body) return false;
          // Walk the WHOLE body subtree, not just direct children: SvelteKit
          // mounts under a `display: contents` wrapper (0-sized box), so its
          // real content lives one level down. querySelectorAll('*') flattens
          // that. Require a >1px box so the 1x1 sr-only skip link doesn't count
          // as "content"; skip our own overlays + their subtrees + non-visual
          // nodes.
          var all = document.body.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            var tag = el.tagName;
            if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'TEMPLATE') continue;
            if (el.closest('#heron-diag, #boot-fallback')) continue;
            var r = el.getBoundingClientRect();
            if (r.width > 1 && r.height > 1) {
              var cs = getComputedStyle(el);
              if (
                cs.display !== 'none' &&
                cs.visibility !== 'hidden' &&
                parseFloat(cs.opacity || '1') > 0.01
              ) {
                return true;
              }
            }
          }
          return false;
        }

        // Console passthrough — keep originals, mirror into the buffer.
        ['log', 'info', 'warn', 'error', 'debug'].forEach(function (k) {
          var orig = console[k] ? console[k].bind(console) : function () {};
          console[k] = function () {
            try {
              push(k, fmt(arguments));
            } catch (_) {}
            return orig.apply(null, arguments);
          };
        });

        // The capture <svelte:boundary> can't do: window-level errors +
        // unhandled promise rejections (module-eval, onMount, async).
        window.addEventListener('error', function (e) {
          push(
            'error',
            String((e && e.message) || (e && e.error && e.error.message) || 'error') +
              (e && e.filename ? ' @ ' + e.filename + ':' + (e.lineno || 0) : ''),
          );
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          push(
            'reject',
            String(r && r.message ? r.message : r) + (r && r.stack ? '\n' + r.stack : ''),
          );
        });

        push('mark', 'app.html head parsed');

        // ---- Overlay UI: built once on DOMContentLoaded, never removed ----
        var overlay = null;
        var pre = null;
        var visible = false;

        function render() {
          if (!visible || !pre) return;
          pre.textContent = window.__heronDiag.dump();
          pre.scrollTop = pre.scrollHeight;
        }
        function mkBtn(label) {
          var b = document.createElement('button');
          b.type = 'button';
          b.textContent = label;
          b.style.cssText =
            'padding:8px 12px;border-radius:8px;border:1px solid #3a3a44;background:#1c1f27;' +
            'color:#e8eaed;font:600 13px -apple-system,system-ui,sans-serif;cursor:pointer;min-height:40px;';
          return b;
        }
        function build() {
          if (overlay || !document.body) return;
          overlay = document.createElement('div');
          overlay.id = 'heron-diag';
          overlay.style.cssText = [
            'position:fixed',
            'inset:0',
            'z-index:2147483647', // above #boot-fallback (9999)
            'display:none',
            'flex-direction:column',
            'background:#0b0d11',
            'color:#e8eaed',
            'font:12px ui-monospace,SFMono-Regular,Menlo,monospace',
            'padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom))',
            'box-sizing:border-box',
            'overscroll-behavior:contain',
          ].join(';');

          var bar = document.createElement('div');
          bar.style.cssText =
            'display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;';
          var title = document.createElement('div');
          title.textContent = 'heron diagnostics';
          title.style.cssText = 'font-weight:700;margin-right:auto;font-size:13px;';
          var copyBtn = mkBtn('Copy');
          var reloadBtn = mkBtn('Reload');
          var closeBtn = mkBtn('Close');
          bar.appendChild(title);
          bar.appendChild(copyBtn);
          bar.appendChild(reloadBtn);
          bar.appendChild(closeBtn);

          pre = document.createElement('pre');
          pre.style.cssText =
            'flex:1;margin:0;overflow:auto;white-space:pre-wrap;word-break:break-word;' +
            'background:#14171e;border:1px solid #262a33;border-radius:8px;padding:10px;' +
            '-webkit-overflow-scrolling:touch;';

          overlay.appendChild(bar);
          overlay.appendChild(pre);
          document.body.appendChild(overlay);

          copyBtn.addEventListener('click', function () {
            var text = window.__heronDiag.dump();
            try {
              navigator.clipboard.writeText(text).then(
                function () {
                  copyBtn.textContent = 'Copied ✓';
                  setTimeout(function () {
                    copyBtn.textContent = 'Copy';
                  }, 1500);
                },
                function () {
                  window.prompt('Copy diagnostics:', text);
                },
              );
            } catch (_) {
              window.prompt('Copy diagnostics:', text);
            }
          });
          reloadBtn.addEventListener('click', function () {
            location.reload();
          });
          closeBtn.addEventListener('click', hide);
        }
        function show() {
          build();
          if (!overlay) return;
          visible = true;
          overlay.style.display = 'flex';
          render();
        }
        function hide() {
          visible = false;
          if (overlay) overlay.style.display = 'none';
        }
        window.__heronDiag.show = show;
        window.__heronDiag.hide = hide;

        // Hidden gesture: tap the top-left 44x44pt corner 5x within 3s.
        var taps = [];
        document.addEventListener(
          'pointerdown',
          function (e) {
            if (e.clientX > 44 || e.clientY > 44) return;
            var now = Date.now();
            taps.push(now);
            taps = taps.filter(function (t) {
              return now - t < 3000;
            });
            if (taps.length >= 5) {
              taps = [];
              visible ? hide() : show();
            }
          },
          true,
        );

        // Auto-reveal: a prolonged blank screen. Two failure shapes:
        //   1. the app never signalled ready AND #boot-fallback is gone/error
        //   2. the app DID signal ready but painted nothing the user can see
        //      (JS ran, boot-fallback dismissed, yet the tree is empty/invisible
        //      — the exact "mDNS fires then black" shape on iOS)
        // Either way the user is on a dead screen with no surface — show the log.
        setTimeout(function () {
          var ready = document.documentElement.dataset.appReady === '1';
          var bf = document.getElementById('boot-fallback');
          var bootGone =
            !bf ||
            bf.getAttribute('data-state') === 'error' ||
            bf.getAttribute('data-safety-net') === '1';
          var visible = hasVisibleAppContent();
          if ((!ready && bootGone) || (ready && !visible)) {
            push(
              'mark',
              'auto-reveal: blank screen (appReady=' + ready + ', visibleAppContent=' + visible + ')',
            );
            show();
          }
        }, 6000);

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', build);
        } else {
          build();
        }
      })();
    </script>

    <meta name="generator" content="SvelteKit" />

    <!-- Don't index this — local-only dashboard -->
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- General description + keywords. Even with robots noindex, the
         description shows up in bookmark tooltips, tab previews, and
         PWA-manifest scrapers (Windows Start, Chromebook). Pulled from
         branding/brand.json via apply-brand — edit brand.json, then
         run `pnpm brand:apply`; do NOT edit these literals directly. -->
    <meta
      name="description"
      content="Heron is a thinking partner for career transitions. Local-first job-search platform: pipeline tracking, A-F role evaluation, ATS-optimized CVs, 11-portal scanning, recruiter email triage, interview prep, and opt-in autonomous apply. Runs on macOS, Windows, Linux, iOS, iPadOS, Android, and Apple Watch."
    />
    <meta
      name="keywords"
      content="ai-agent, anthropic, automation, better-auth, capacitor, career, claude, claude-code, drizzle-orm, electron, heron, interview-prep, ios, job-search, local-first, open-source, passkey, resume, svelte, sveltekit, typescript, watchos"
    />

    <!-- Theme + color scheme — `theme-color` per scheme so iOS / Android
         status bars and Chrome's toolbar pick the right tint. -->
    <meta name="theme-color" content="#0e1014" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- PWA / installable web app — modern + legacy keys for cross-browser
         pin-to-Home support. `application-name` shows under the icon on
         Windows Start when the user pins the PWA from Edge. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Heron" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="Heron" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!-- Windows Start tile (pinned PWA from Edge / IE) -->
    <meta name="msapplication-TileColor" content="#4a5b6d" />
    <meta name="msapplication-TileImage" content="%sveltekit.assets%/icons/heron-256.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Icons + manifest. Order matters: more-specific first (browser
         picks the first matching type/size). favicon.ico is included as
         a legacy fallback for older browsers and email-client previews. -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="48x48" href="%sveltekit.assets%/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%sveltekit.assets%/icons/heron-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%sveltekit.assets%/icons/heron-512.png"
    />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/icons/heron-256.png"
    />
    <!-- Safari pinned-tab + macOS Reading List (monochrome silhouette). -->
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#c89b4a" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- Open Graph — link previews when shared internally or via
         Tailscale magic-DNS. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Heron" />
    <meta property="og:title" content="Heron" />
    <meta property="og:description" content="Stand still. Strike well." />
    <meta property="og:image" content="%sveltekit.assets%/icons/heron-512.png" />
    <meta property="og:image:width" content="512" />

    <meta property="og:image:alt" content="Heron" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card (summary, same image). -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Heron" />
    <meta name="twitter:description" content="Stand still. Strike well." />
    <meta name="twitter:image" content="%sveltekit.assets%/icons/heron-512.png" />

      content="© 2026 Heron contributors (original work © 2026 santifer). Licensed under the MIT License."
    />

    <!-- View Transitions API — opt in to same-origin transitions so
         page navigations get the cross-fade animation in Chrome 111+ /
         Safari 18+. Pair with `view-transition-name` in CSS. -->
    <meta name="view-transition" content="same-origin" />

    <!-- Speculation Rules — prerender same-origin links on hover/touch
         start so they paint instantly. Chrome 121+ honours this; older
         browsers ignore it. -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "where": { "href_matches": "/*" },
            "eagerness": "moderate"
          }
        ]
      }
    </script>

    <!-- Anthropic + Gemini are HOT external endpoints — preconnect saves
         the TLS handshake on first call. Falls back gracefully when the
         user disabled those providers. -->
    <link rel="preconnect" href="https://api.anthropic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.anthropic.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-foreground antialiased">
    <!-- Skip-to-content link for keyboard + screen-reader users. Hidden
         visually until focused; brings focus straight to <main>. -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded focus:bg-primary focus:px-4 focus:py-2 focus:text-primary-foreground focus:shadow-lg"
    >
      Skip to main content
    </a>
    <!-- Boot fallback — always-visible UI before SvelteKit hydrates.
         Visually MATCHES the native iOS splash (Splash.imageset, rendered
         by LaunchScreen.storyboard with scaleAspectFill) so the hand-off
         between them is a zero-jump fade.

         Sizing parity:
         - Splash PNG: 2732×2732, icon at 19% of canvas (~519px source).
         - LaunchScreen.storyboard uses scaleAspectFill — on iPhone 17
           Pro Max (440×956pt) the image scales by 0.350, putting the
           icon at ~182pt on screen.
         - Our boot-fallback icon is sized as `min(19vh, 19vw, 240px)`
           which on iPhone 17 Pro Max evaluates to ~182pt → identical
           to the splash. iPad / iPhone SE track the same proportions.

         Design:
         - No halo, no shadow, no text on first paint. Splash PNG has
           none of those, so adding them would create a visible jump
           during the cross-fade. The halo + dots fade IN ~600ms after
           the splash hides (i.e. once the fallback is the only thing
           on screen and the user already perceives the transition as
           complete).
         - Background: #0e1014 — matches brand.json splash.backgroundColor
           and ios.backgroundColor in capacitor.config.ts.

         Failure handling: if hydration doesn't complete within 3500ms
         (just past the native launchShowDuration so the timing lines
         up), flip to a "Something went wrong" panel. The error copy is
         dev-aware: when the WebView is loaded from a Vite-style origin
         (:5173 / :5174 / a LAN-IP host) the message points the user at
         `pnpm dev` instead of generic "network glitch" copy. -->
    <div
      id="boot-fallback"
      style="
        position: fixed;
        inset: 0;
        padding: 24px;
        color: #e8eaed;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
        transition: opacity 300ms ease-out;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: contain;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        /* Brand-bloom background — single radial gradient centered on
                screen, mirroring the SVG bloom baked into Splash.imageset.
                Sits on the same #0e1014 base so iOS native splash → SvelteKit
                boot-fallback → login bloom is one continuous visual identity
                across all three layers. Works at any resolution because
                radial-gradient is a vector primitive. */
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(122, 140, 109, 0.3) 0%,
            rgba(74, 91, 109, 0.18) 32%,
            rgba(200, 155, 74, 0.08) 56%,
            transparent 78%
          ),
          radial-gradient(ellipse at 50% 0%, rgba(200, 155, 74, 0.10) 0%, transparent 60%), #0e1014;
      "
    >
      <!-- Brand mark wrapper — ABSOLUTELY POSITIONED at TRUE viewport center.
           This is critical for vertical-alignment parity with the native
           splash: Splash.imageset PNG is 2732² with the icon at exact image
           center, rendered via scaleAspectFill, so the icon's center == screen
           center. A flex column layout (icon + dots) would centre the COMBINED
           stack, shifting the icon up by ~half the dots-gap-bonus, breaking
           the splash → boot crossfade. We instead position the icon
           absolutely at 50%/50% and position the dots absolutely BELOW so
           they don't move the icon.
           Size: clamp(80px, max(11vh, 11vw), 200px) — mirrors the splash
           PNG's 11% canvas proportion under scaleAspectFill on every device
           (iPhone SE → iPad Pro, portrait and landscape).
           Glow is a subtle, always-on multi-layer drop-shadow tuned to
           match the SVG-filter halo baked into the splash PNG. -->
      <div
        id="boot-fallback-mark"
        style="
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          width: clamp(80px, max(11vh, 11vw), 200px);
          height: clamp(80px, max(11vh, 11vw), 200px);
          display: flex;
          align-items: center;
          justify-content: center;
          filter: drop-shadow(0 0 32px rgba(122, 140, 109, 0.45))
            drop-shadow(0 8px 20px rgba(122, 140, 109, 0.22))
            drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        "
      >
        <!-- Inline brand mark — mirror of branding/logo.svg.
             Lucide bird glyph (ISC License). Gradient ID is scoped
             (`bfb-*`) so it doesn't collide with any other inline SVG.
             width=100%/height=100% so it scales with the wrapper. -->
        <svg
          width="100%"
          height="100%"
          viewBox="0 0 1024 1024"
          aria-hidden="true"
          style="display: block"
        >
          <!-- AUTO-GENERATED:brand-mark gradient-id="bfb-bg" -->
          <defs>
            <linearGradient id="bfb-bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#4a5b6d" />
              <stop offset="55%" stop-color="#7a8c6d" />
              <stop offset="100%" stop-color="#c89b4a" />
            </linearGradient>
          </defs>
          <rect width="1024" height="1024" rx="232" fill="url(#bfb-bg)" />
          <rect x="0" y="0" width="1024" height="512" rx="232" fill="#ffffff" opacity="0.06" />
          <g
            transform="translate(192,192) scale(26.667)"
            fill="none"
            stroke="#ffffff"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 7h.01" />
            <path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20" />
            <path d="m20 7 2 .5-2 .5" />
            <path d="M10 18v3" />
            <path d="M14 17.75V21" />
            <path d="M7 18a6 6 0 0 0 3.84-10.61" />
          </g>
          <!-- /AUTO-GENERATED:brand-mark -->
        </svg>
      </div>

      <!-- Modern orbital-arc loading spinner — replaces the previous
           3-dot pulse with a single thin brand-gradient arc that rotates
           continuously. Same visual language as Notion / Vercel / iOS
           native loaders: minimal, single-element, brand-coloured.
           Positioned absolutely BELOW the icon (gap = half-icon + 32px)
           so it never displaces the icon's true-viewport-center
           position. Fades in 700ms after the splash dissolve. -->
      <div
        id="boot-fallback-dots"
        style="
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, calc(0.5 * clamp(80px, max(11vh, 11vw), 200px) + 32px));
          width: 32px;
          height: 32px;
          opacity: 0;
          animation: boot-fade-in 400ms cubic-bezier(0.16, 1, 0.3, 1) 700ms forwards;
        "
        aria-label="Loading"
        role="progressbar"
      >
        <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" style="display: block">
          <defs>
            <linearGradient id="bfb-spin" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#c89b4a" stop-opacity="0.15" />
              <stop offset="40%" stop-color="#7a8c6d" stop-opacity="0.65" />
              <stop offset="100%" stop-color="#4a5b6d" stop-opacity="1" />
            </linearGradient>
          </defs>
          <!-- Faint track ring so the arc reads as "progress" against
               a defined orbit, not a floating line. -->
          <circle
            cx="16"
            cy="16"
            r="12.5"
            fill="none"
            stroke="rgba(139,92,246,0.12)"
            stroke-width="2.5"
          />
          <!-- Spinning arc — stroke-dasharray makes ~210° of the
               circumference visible; the rest is the gap. The
               `boot-spin` keyframes rotate it around the center. -->
          <circle
            cx="16"
            cy="16"
            r="12.5"
            fill="none"
            stroke="url(#bfb-spin)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-dasharray="46 78"
            style="
              animation: boot-spin 0.9s cubic-bezier(0.65, 0.05, 0.36, 1) infinite;
              transform-origin: 16px 16px;
            "
          />
        </svg>
      </div>

      <!-- Error panel — absolutely positioned so it sits at viewport
           center when the blank-screen guard reveals it (data-state="error").
           Title/body are filled at runtime by the guard so the copy can be
           dev-aware. -->
      <div
        id="boot-fallback-error"
        style="
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          display: none;
          flex-direction: column;
          align-items: center;
          gap: 14px;
          max-width: 340px;
          width: calc(100% - 48px);
          text-align: center;
          opacity: 0;
          transition: opacity 200ms ease-out;
        "
      >
        <div
          id="boot-fallback-error-title"
          style="font-size: 17px; font-weight: 600; color: #fafafa; line-height: 1.35"
        >
          Something went wrong loading the app
        </div>
        <div
          id="boot-fallback-error-body"
          style="font-size: 14px; color: #a1a1aa; line-height: 1.5"
        >
          The interface didn't finish loading. This is usually a network glitch — try again.
        </div>
        <div
          style="
            display: flex;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
            justify-content: center;
          "
        >
          <button
            id="boot-fallback-retry"
            type="button"
            onclick="location.reload()"
            style="
              padding: 10px 18px;
              border-radius: 10px;
              border: none;
              background: linear-gradient(135deg, #4a5b6d, #7a8c6d);
              color: white;
              font-size: 15px;
              font-weight: 600;
              cursor: pointer;
              font-family: inherit;
              min-height: 44px;
            "
          >
            Try again
          </button>
          <button
            id="boot-fallback-copy"
            type="button"
            style="
              padding: 10px 16px;
              border-radius: 10px;
              border: 1px solid #27272a;
              background-color: #14181f;
              color: #e8eaed;
              font-size: 14px;
              cursor: pointer;
              font-family: inherit;
              min-height: 44px;
            "
          >
            Copy diagnostics
          </button>
        </div>
      </div>

      <style>
        /* Boot-fallback scroll-lock is handled INLINE on the element
           itself (touch-action: none + overscroll-behavior: contain).
           We deliberately do NOT force body { position: fixed } here:
           that broke SvelteKit hydration in iOS WKWebView because the
           Svelte runtime expects the body to keep its default static
           positioning. Since #boot-fallback is itself position:fixed
           covering the full viewport, the user can't visually see any
           body scrolling underneath it anyway. When SvelteKit removes
           the fallback, body returns to its normal scrollable state
           with zero CSS thrash. */
        /* Force user-select: none on EVERY descendant of the boot-fallback.
           iOS WKWebView allows long-press text selection on SVGs and divs
           even when the parent has user-select: none, because the property
           doesn't fully inherit through some replaced-content elements
           (notably <svg>). Belt-and-braces: target every descendant +
           include -webkit-touch-callout: none to suppress the iOS magnifier
           on long-press. */
        #boot-fallback,
        #boot-fallback * {
          -webkit-user-select: none !important;
          -moz-user-select: none !important;
          -ms-user-select: none !important;
          user-select: none !important;
          -webkit-touch-callout: none !important;
        }
        /* Plain opacity fade-in for late-arriving accents (spinner). */
        @keyframes boot-fade-in {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
        /* Orbital spinner — rotates the arc around the circle's center.
           cubic-bezier easing gives a subtle accelerate/decelerate that
           reads more "alive" than pure linear. */
        @keyframes boot-spin {
          0% {
            transform: rotate(0deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }
        /* When +layout.svelte removes the #boot-fallback by tagging
           data-hide, fade out gracefully and stop accepting taps. */
        #boot-fallback[data-hide='1'] {
          opacity: 0;
          pointer-events: none;
        }
        /* Error state: hide the dots, swap the brand mark to a dimmer
           red-tinted shadow, show the error panel. data-state="error"
           is set by the blank-screen guard. */
        #boot-fallback[data-state='error'] #boot-fallback-dots {
          display: none;
        }
        #boot-fallback[data-state='error'] #boot-fallback-mark {
          filter: drop-shadow(0 4px 16px rgba(239, 68, 68, 0.25))
            drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
        #boot-fallback[data-state='error'] #boot-fallback-error {
          display: flex;
          opacity: 1;
        }
        @media (prefers-reduced-motion: reduce) {
          #boot-fallback-mark,
          #boot-fallback-dots {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
          }
          #boot-fallback-dots span {
            animation: none !important;
            opacity: 1 !important;
          }
        }
      </style>
    </div>
    <script>
      // #boot-fallback blank-screen UX driver. Error capture + the shared
      // diagnostics buffer now live in the early-head __heronDiag script
      // (which ALSO catches the module-eval failures this body script runs
      // too late to see). This block only flips the boot-fallback into its
      // error / safety-net states; the Copy button reads __heronDiag.dump().
      (function () {
        // Blank-screen guard. After 3.5 seconds without successful
        // hydration (which removes the fallback by setting data-hide),
        // flip to the error state. The user always gets a way out
        // instead of a frozen splash. 3.5s lines up with the native
        // launchShowDuration so the timing feels intentional rather than
        // arbitrary.
        //
        // Copy is dev-aware: when we're loaded from a Vite-style origin
        // (port 5173/5174 or a LAN IP) we tell the user to check the
        // dev server. Production builds keep the generic copy.
        // Tightened from 3500ms to 2500ms. The previous value was tuned
        // to match Capacitor's launchShowDuration but in practice it
        // left users staring at a frozen spinner for almost 4 seconds
        // when the dev/backend server was unreachable. 2.5s is past the
        // 99th-percentile cold hydration window (~1.2s on a slow iPhone)
        // and well below the 4s "is this app broken?" threshold users
        // start to feel anxiety at. The 8s hard-removal safety-net
        // below still catches the edge case where hydration succeeded
        // but the boot-fallback dismiss callback never ran.
        setTimeout(function () {
          var el = document.getElementById('boot-fallback');
          if (!el) return; // hydration succeeded, fallback already gone
          if (el.getAttribute('data-hide') === '1') return; // fading out cleanly
          var host = location.host || '';
          var isDevOrigin =
            /:5173$|:5174$/.test(host) ||
            /^192\.168\./.test(host) ||
            /^10\./.test(host) ||
            /^172\.(1[6-9]|2[0-9]|3[01])\./.test(host) ||
            /^localhost(:|$)/.test(host);
          var title = document.getElementById('boot-fallback-error-title');
          var body = document.getElementById('boot-fallback-error-body');
          if (isDevOrigin) {
            if (title) title.textContent = "Can't reach the dev server";
            if (body)
              body.innerHTML =
                'Couldn\'t connect to <code style="background:#27272a;padding:1px 6px;border-radius:4px;font-size:12px;">' +
                host +
                '</code>. Make sure Vite is running (<code style="background:#27272a;padding:1px 6px;border-radius:4px;font-size:12px;">pnpm dev</code> or <code style="background:#27272a;padding:1px 6px;border-radius:4px;font-size:12px;">pnpm dev:ios --live</code>) and tap Try again.';
          } else {
            if (title) title.textContent = "Can't reach the server";
            if (body)
              body.textContent =
                "The app couldn't connect to the backend. Check your network or try again — the issue may be temporary.";
          }
          el.setAttribute('data-state', 'error');
          if (window.__heronDiag)
            window.__heronDiag('boot-fallback error state shown (hydration stalled 2.5s)');
        }, 2500);

        // Hard safety-net: 8 seconds after the page loads, REMOVE the
        // boot-fallback entirely no matter what. This guarantees that
        // even if SvelteKit hydration silently fails AND the dev-aware
        // error guard above somehow doesn't fire, the user is NEVER
        // trapped on a frozen splash. The SSR-rendered SvelteKit content
        // underneath becomes visible and the user can interact with it
        // (the login form, in the unauth case). 8s is well past every
        // realistic hydration window for this app (~1-2s cold).
        setTimeout(function () {
          var el = document.getElementById('boot-fallback');
          if (!el) return;
          // Tag a marker so post-mortem inspection knows the safety-net
          // kicked in (rather than the planned 700ms onMount removal).
          if (window.__heronDiag)
            window.__heronDiag('boot-fallback safety-net removal fired (8s, hydration never dismissed it)');
          el.setAttribute('data-safety-net', '1');
          el.setAttribute('data-hide', '1');
          setTimeout(function () {
            el.remove();
          }, 300);
        }, 8000);

        // Wire up the boot-fallback's Copy button — dumps the shared
        // __heronDiag buffer (URL, UA, milestones, captured errors) to the
        // clipboard. Falls back to alert() if clipboard write fails (e.g.
        // iOS WKWebView clipboard permission denied).
        document.addEventListener('click', function (e) {
          var target = e.target;
          if (!target || target.id !== 'boot-fallback-copy') return;
          var text = window.__heronDiag
            ? window.__heronDiag.dump()
            : 'heron — boot diagnostics\ntime: ' +
              new Date().toISOString() +
              '\nurl: ' +
              location.href +
              '\nua: ' +
              navigator.userAgent;
          try {
            navigator.clipboard.writeText(text).then(
              function () {
                target.textContent = 'Copied ✓';
                setTimeout(function () {
                  target.textContent = 'Copy diagnostics';
                }, 1800);
              },
              function () {
                alert(text);
              },
            );
          } catch (_) {
            alert(text);
          }
        });
      })();
    </script>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
