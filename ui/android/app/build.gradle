apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
// kotlin-kapt -- runs the AppSearch annotation processor against
// @Document-annotated Kotlin classes (e.g. JobDocument inside
// NativePlugin.kt). Without this, PutDocumentsRequest.addDocuments(...)
// throws at runtime ("Failed to find document class converter
// com.resistjs.heron.$$__AppSearch__NativePlugin$$__JobDocument") because
// the generated converter never lands on the classpath. Plain Java
// classes use the AppSearch javac plugin via the standard
// `annotationProcessor` config; Kotlin classes route through kapt.
apply plugin: 'kotlin-kapt'
apply plugin: 'jacoco'

// JaCoCo configuration. AGP 8.x produces coverage data under
// `build/outputs/code-coverage/connected/` for instrumented tests +
// `build/jacoco/testDebugUnitTest.exec` for JVM unit tests. The
// `jacocoTestReport` task aggregates both into XML for Codecov.
jacoco {
    // JaCoCo agent and report must agree on the .exec format.
    // 0.8.13 matches what AGP 8.13's enableUnitTestCoverage agent emits;
    // 0.8.12 silently produces 0% coverage because the exec records
    // can't be decoded.
    toolVersion = "0.8.13"
}

// Robolectric's SandboxClassLoader loads app classes via its own
// instrumentation pipeline that bypasses the AGP-attached JaCoCo agent.
// Without intervention, the .exec file only records hits for classes
// loaded by the system classloader (Brand, BrandTest), while every
// class touched through a Robolectric test (NativePlugin, NetworkMonitor,
// ErrorReporter via Context) reports 0% coverage.
//
// Fix: configure JacocoTaskExtension on the test task to instrument
// our package explicitly + include classes without SourceFile attributes
// (some Kotlin synthetics omit the attribute and would otherwise be
// dropped).
tasks.withType(Test).configureEach { test ->
    test.extensions.configure(JacocoTaskExtension) { ext ->
        // includes is the most important flag: it tells the agent which
        // classes to consider, regardless of how the classloader's path
        // labels them. com.resistjs.heron.** covers every authored source.
        ext.includes = ["com.resistjs.heron.*"]
        ext.excludes = [
            "jdk.internal.*",
            "*Test",
            "*Test*",
            "**.R\$*",
            "**.BuildConfig",
        ]
        ext.includeNoLocationClasses = true
    }
}

// Marketing version: single source of truth is Release Please ->
// root package.json $.version, read here so Android + iOS ship the same
// X.Y.Z. versionCode (the monotonic build number) is set by the production
// lane at release time, mirroring iOS's epoch CFBundleVersion.
def heronPkgJson = new File(rootProject.projectDir, "../../package.json")
def heronVersionName = heronPkgJson.exists() ? new groovy.json.JsonSlurper().parse(heronPkgJson).version : "1.0"

android {
    namespace = "com.resistjs.heron"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.resistjs.heron"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName heronVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // ── Release signing ──────────────────────────────────────────
    // Loads from `ui/android/keystore.properties` (gitignored) when
    // present, falls back to debug signing otherwise. The properties
    // file is generated by `pnpm setup:native` and lists:
    //   storeFile=heron-release.keystore
    //   storePassword=...
    //   keyAlias=heron
    //   keyPassword=...
    // CI loads the same values via repo secrets in native-release.yml.
    signingConfigs {
        release {
            def keystorePropertiesFile = rootProject.file("keystore.properties")
            if (keystorePropertiesFile.exists()) {
                def keystoreProperties = new Properties()
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            // JaCoCo coverage collection for JVM unit tests (.exec file
            // under build/jacoco/) + instrumented connected tests
            // (build/outputs/code-coverage/). The jacocoTestReport task
            // below aggregates both into XML for Codecov upload.
            enableUnitTestCoverage = true
            enableAndroidTestCoverage = true
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Only attach the signing config when the keystore properties
            // are present — debug builds + CI without secrets still work.
            if (rootProject.file("keystore.properties").exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    // App Bundle (.aab) is required for Play Store uploads. Keep APK
    // splits enabled so Gradle produces both .apk (sideload-able) and
    // .aab (Play Store).
    bundle {
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }

    // JVM unit tests need Robolectric or default-value coercion.
    // `returnDefaultValues = true` lets Android API calls return 0/null
    // /false stubs without throwing, so tests that don't mock the
    // SharedPreferences / Context / etc. still run.
    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
        }
    }

    // androidTest pulls JUnit 5 (jupiter/platform) in transitively, and
    // six of those jars each bundle META-INF/LICENSE*.md -- a collision
    // that fails test-APK packaging with DuplicateRelativeFileException.
    // Dropping the duplicate license-metadata files is the AGP-recommended
    // fix and is safe: they are dependency license text, not runtime
    // resources (AGP already excludes similar META-INF files by default).
    packaging {
        resources {
            excludes += [
                'META-INF/LICENSE.md',
                'META-INF/LICENSE-notice.md',
            ]
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    // F1 — BiometricPrompt for the Android parity of iOS Face ID. The
    // `androidx.biometric` artifact bundles the Compose-friendly API
    // (FragmentActivity-rooted prompt) and the older AppCompatActivity
    // path; we use the latter since MainActivity extends BridgeActivity.
    implementation "androidx.biometric:biometric:1.2.0-alpha05"
    // F2 — EncryptedSharedPreferences for the Android parity of iOS
    // Keychain. androidx.security wraps a SharedPreferences impl with
    // AES-GCM under a master key managed by the Android Keystore so
    // values survive backups + uninstall correctly.
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    // F3 — Jetpack AppSearch (Android parity of iOS CoreSpotlight).
    // Local on-device index that the OS can surface in the global
    // search bar + the home-screen `Universal Search` widget.
    implementation "androidx.appsearch:appsearch:1.1.0-alpha05"
    implementation "androidx.appsearch:appsearch-local-storage:1.1.0-alpha05"
    implementation "androidx.appsearch:appsearch-platform-storage:1.1.0-alpha05"
    // appsearch-compiler -- annotation processor that generates
    // $$__AppSearch__<class>__<doc> converter classes for @Document-
    // annotated Kotlin data classes (JobDocument in NativePlugin.kt).
    // Without it, PutDocumentsRequest.Builder().addDocuments(docs).build()
    // throws "Failed to find document class converter" at runtime.
    // Routed through `kapt` because JobDocument is Kotlin; the kotlin-kapt
    // plugin is applied at the top of this file.
    kapt "androidx.appsearch:appsearch-compiler:1.1.0-alpha05"
    // Kotlin coroutines — biometric + appsearch both expose suspend
    // APIs; we surface them as Capacitor PluginCall.resolve callbacks
    // so the existing JS surface stays unchanged.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
    // Guava ListenableFuture -> kotlinx coroutines bridge.
    // NativePlugin.kt uses `.await()` on AppSearch's ListenableFuture
    // (LocalStorage.createSearchSessionAsync, session.searchAsync,
    // etc.) which is part of androidx.appsearch's API; the await()
    // suspension function lives in this artifact.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-guava:1.7.3"
    implementation "androidx.concurrent:concurrent-futures-ktx:1.1.0"
    testImplementation "junit:junit:$junitVersion"
    // Kotlin stdlib test assertions (assertEquals / assertTrue with
    // Kotlin-friendly signatures vs JUnit's Java-style).
    testImplementation "org.jetbrains.kotlin:kotlin-test:$kotlinVersion"
    // MockK -- Kotlin-native mocking. Used to stub Context /
    // SharedPreferences / ConnectivityManager in unit tests.
    testImplementation "io.mockk:mockk:1.13.13"
    // Robolectric -- runs Android-dependent code on the JVM with a
    // simulated framework. Required for ErrorReporter (which calls
    // Context.getSharedPreferences) + Brand tests that exercise the
    // PrefsKey integration.
    testImplementation "org.robolectric:robolectric:4.14.1"
    testImplementation "androidx.test:core:1.6.1"
    // kotlinx-coroutines-test -- runTest + StandardTestDispatcher +
    // advanceUntilIdle. Required so the per-CLASS JaCoCo rule sees
    // suspend bodies' continuation classes RESUME (rather than stay
    // suspended at await() forever on Robolectric, which would report
    // 0% on every coroutine-state-machine class and false-positive
    // the per-CLASS gate).
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.7.3"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    // H.G -- instrumented tests need their own copies of the JVM unit
    // test surface (ApplicationProvider lives in :core; ActivityScenario
    // lives in :core too; MockK has a separate :mockk-android artifact
    // because the JVM jar relies on Byte Buddy class-loaders that
    // Dalvik doesn't expose).
    androidTestImplementation "androidx.test:core:1.6.1"
    androidTestImplementation "io.mockk:mockk-android:1.13.13"
    implementation project(':capacitor-cordova-android-plugins')
}

// JaCoCo report task. Aggregates JVM unit-test coverage (.exec) into
// XML format that codecov-action can ingest. Runs after testDebugUnitTest.
//
// Class-set rule: include only com.resistjs.heron.** (production sources).
// Exclude generated R, BuildConfig, Brand (auto-generated by apply-brand),
// and the Capacitor scaffold (MainActivity boilerplate).
afterEvaluate {
    // Shared file filter -- generated + scaffold classes that don't
    // count toward authored-surface coverage. Used by both
    // jacocoTestReport (XML emit) + jacocoTestCoverageVerification
    // (the threshold-enforcing task below).
    def jacocoFileFilter = [
        '**/R.class',
        '**/R$*.class',
        '**/BuildConfig.*',
        '**/Manifest*.*',
        '**/Brand.class',         // auto-generated by apply-brand
        '**/MainActivity.class',  // Capacitor scaffold
        '**/*Test*.*',
    ]

    def jacocoDebugTree = fileTree(
        dir: "${buildDir}/intermediates/javac/debug",
        excludes: jacocoFileFilter
    )
    def jacocoKotlinTree = fileTree(
        dir: "${buildDir}/tmp/kotlin-classes/debug",
        excludes: jacocoFileFilter
    )
    def jacocoMainSrc = "${project.projectDir}/src/main/java"
    def jacocoExecutionData = fileTree(dir: project.buildDir, includes: [
        // AGP 8+ writes JVM unit-test coverage here (the legacy
        // `build/jacoco/` location only applied to AGP <= 7).
        'outputs/unit_test_code_coverage/**/*.exec',
        // Legacy fallback for older AGP versions.
        'jacoco/testDebugUnitTest.exec',
        // Instrumented (connectedCheck) coverage produced by the
        // android-emulator job in .github/workflows/test.yml (H.G).
        // The .ec files merge with the .exec files above so
        // jacocoTestReport emits one combined cobertura.xml under the
        // codecov `android` flag.
        'outputs/code-coverage/**/*.ec',
    ])

    task jacocoTestReport(type: JacocoReport, dependsOn: ['testDebugUnitTest']) {
        group = "Reporting"
        description = "Generate Jacoco coverage reports after running tests."

        reports {
            xml.required = true
            html.required = true
        }

        sourceDirectories.setFrom(files([jacocoMainSrc]))
        classDirectories.setFrom(files([jacocoDebugTree, jacocoKotlinTree]))
        executionData.setFrom(jacocoExecutionData)
    }

    // jacocoTestCoverageVerification -- the LOCAL coverage gate.
    // Codecov's android flag (codecov.yml target: 70%) is the CI-side
    // gate; this is the developer-side mirror. Running
    // `./gradlew :app:jacocoTestCoverageVerification` exits 1 when
    // either of the two rules is breached.
    //
    // Two violation rules:
    //   - BUNDLE: aggregate LINE coverage >= 70% (mirrors codecov.yml
    //     `android` flag). Failing this fails local `./gradlew check`.
    //   - CLASS:  per-class LINE coverage >= 60%. Catches the
    //     "whole-file dark spot" pattern where heavily-tested Brand +
    //     ErrorReporter mask a 0% NativePlugin. Coroutine continuation
    //     synthetics no longer false-positive because the
    //     corresponding tests in NativePluginTest.kt use kotlinx-
    //     coroutines-test's `runTest { advanceUntilIdle }` to resume
    //     await() suspensions deterministically.
    //   - excludes:
    //     - com.resistjs.heron.Brand          (auto-generated by apply-brand)
    //     - com.resistjs.heron.MainActivity   (Capacitor scaffold)
    task jacocoTestCoverageVerification(
        type: JacocoCoverageVerification,
        dependsOn: ['testDebugUnitTest'],
    ) {
        group = "Verification"
        description = "Enforce JaCoCo bundle + per-class line-coverage thresholds."

        sourceDirectories.setFrom(files([jacocoMainSrc]))
        classDirectories.setFrom(files([jacocoDebugTree, jacocoKotlinTree]))
        executionData.setFrom(jacocoExecutionData)

        violationRules {
            rule {
                element = 'BUNDLE'
                limit {
                    counter = 'LINE'
                    value = 'COVEREDRATIO'
                    minimum = 0.70
                }
            }
            rule {
                element = 'CLASS'
                // Per-class gate. Threshold is intentionally lower than
                // the BUNDLE's -- per-class is about catching ZERO-
                // coverage classes, not tightening the per-file bar.
                limit {
                    counter = 'LINE'
                    value = 'COVEREDRATIO'
                    minimum = 0.60
                }
                excludes = [
                    'com.resistjs.heron.Brand',
                    'com.resistjs.heron.MainActivity',
                    // Annotation-processor-generated AppSearch converter
                    // classes (kapt -> appsearch-compiler). They wrap
                    // @Document-annotated user classes (JobDocument);
                    // only the metadata pieces ever get touched at runtime,
                    // so JaCoCo sees them as partially covered. Not user-
                    // authored code -- the same exclude rationale as
                    // Brand.class (auto-generated by apply-brand).
                    'com.resistjs.heron.*AppSearch*',
                ]
            }
        }
    }

    // Wire `:app:check` to run the verification automatically. This
    // makes `./gradlew check` (the standard "is the build healthy"
    // entrypoint) include the coverage gate. CI invokes
    // `:app:jacocoTestReport` explicitly for the XML upload; adding
    // verification to `check` ensures local `./gradlew check` mirrors
    // the CI gate.
    tasks.findByName('check')?.dependsOn('jacocoTestCoverageVerification')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
